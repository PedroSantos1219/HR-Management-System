name: PHP lint

on:
  push:
    paths:
      - '**.php'
      - '.github/workflows/php-lint.yml'
  pull_request:
    paths:
      - '**.php'

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP 8.1
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          coverage: none

      - name: Syntax check every PHP file
        run: |
          set -e
          find . -name '*.php' -not -path './vendor/*' -print0 \
            | xargs -0 -n1 php -l
