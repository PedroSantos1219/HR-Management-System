function SecurityLogsScreen(){
  const [logRows,setLogRows]=useState([]);
  const [byDivision,setByDivision]=useState([]);
  const [sessions,setSessions]=useState([]);
  const [loading,setLoading]=useState(true);
  const [filterDivision,setFilterDivision]=useState('all');
  const [filterEvent,setFilterEvent]=useState('all');
  const [viewShot,setViewShot]=useState(null); // {row, url}

  const DIVISION_NAMES={
    dashboard:'Dashboard',colaboradores:'Colaboradores',sef:'SEF',medicina:'Medicina',
    diuturnidades:'Diuturnidades',cartas:'Cartas Condução',formacao:'Formação',
    epi:'EPIs',fardas:'Fardas',ferias:'Férias',contratos:'Contratos',
    relatorios:'Relatórios',avaliacao:'Avaliações',aniversarios:'Aniversários',
    audit:'Logs Sistema',users:'Utilizadores',backups:'Backups',
    security_logs:'Logs Segurança',login:'Login',desconhecida:'Desconhecida'
  };
  const EVENT_NAMES={
    printscreen:{l:'PrintScreen',c:'#E74C3C'},
    display_media:{l:'Gravação ecrã',c:'#8E44AD'},
    visibility_blur:{l:'Mudança de janela',c:'#F39C12'},
    window_blur:{l:'Perda de foco',c:'#F39C12'}
  };

  function formatDetails(eventType, raw){
    raw = (raw||'').trim();
    if(!raw) return '—';
    if(eventType === 'printscreen'){
      const m = raw.match(/ctrl=(true|false).*alt=(true|false).*shift=(true|false)/);
      if(!m) return 'Tecla Print Screen pressionada.';
      const mods = [];
      if(m[1]==='true')  mods.push('Ctrl');
      if(m[2]==='true')  mods.push('Alt');
      if(m[3]==='true')  mods.push('Shift');
      if(mods.length === 0) return 'Tecla Print Screen pressionada (captura para clipboard).';
      if(m[2]==='true') return 'Alt + Print Screen — captura só da janela activa.';
      return `${mods.join(' + ')} + Print Screen pressionados.`;
    }
    if(eventType === 'window_blur' || eventType === 'visibility_blur'){
      const m = raw.match(/gap_ms=(\d+)/);
      if(!m) return raw;
      const ms = Number(m[1]);
      const secs = (ms/1000).toFixed(ms<2000?1:0);
      const where = eventType === 'visibility_blur' ? 'Separador escondido' : 'Janela perdeu foco';
      const hint = ms < 1500
        ? ' — duração curta, típica da Snipping Tool / Win+Shift+S.'
        : ms < 5000
          ? ' — pode ter mudado de janela ou tirado screenshot externa.'
          : ' — afastou-se do programa por algum tempo.';
      return `${where} durante ${secs}s${hint}`;
    }
    return raw;
  }

  async function load(){
    setLoading(true);
    try{
      const r = await apiCall('get_screenshot_log',{limit:1000});
      setLogRows(r.rows||[]);
      setByDivision(r.byDivision||[]);
    }catch(e){ alert('Erro: '+e.message); }
    try{
      const s = await apiCall('get_user_sessions');
      setSessions(s||[]);
    }catch(e){}
    setLoading(false);
  }
  useEffect(()=>{ load(); },[]);

  async function clearAll(){
    if(!confirm('Apagar TODOS os registos de captura de ecrã? Esta operação não pode ser desfeita.')) return;
    try{ await apiCall('clear_screenshot_log'); await load(); }catch(e){ alert('Erro: '+e.message); }
  }
  async function revokeSession(id){
    if(!confirm('Terminar esta sessão? O utilizador será forçado a iniciar sessão novamente.')) return;
    try{ await apiCall('revoke_session',{sessionId:id}); await load(); }catch(e){ alert('Erro: '+e.message); }
  }

  const filtered = logRows.filter(r=>{
    if(filterDivision!=='all' && r.division!==filterDivision) return false;
    if(filterEvent!=='all' && r.event_type!==filterEvent) return false;
    return true;
  });

  return (
    <div className="sec-logs">
      <div className="sec-logs__header">
        <h2 className="sec-logs__title">🛡️ Logs de Segurança</h2>
        <div className="sec-logs__subtitle">
          Tentativas de captura de ecrã por divisão do programa e sessões activas. Acesso reservado a super-administradores.
        </div>
      </div>

      {loading ? <div className="sec-logs__loading">A carregar…</div> : (
        <>
          {/* Resumo por divisão */}
          <div className="card sec-logs__section">
            <div className="sec-logs__section-title">POR DIVISÃO</div>
            {byDivision.length === 0
              ? <div className="sec-logs__empty">Sem eventos registados.</div>
              : <div className="div-grid">
                  {byDivision.map(d => (
                    <div key={d.division}
                      className={`div-card ${d.division === filterDivision ? 'is-active' : ''}`}
                      onClick={() => setFilterDivision(d.division === filterDivision ? 'all' : d.division)}>
                      <div className="div-card__name">{DIVISION_NAMES[d.division] || d.division}</div>
                      <div className="div-card__count">
                        {d.count} {d.count === 1 ? 'evento' : 'eventos'} · último {d.lastTs ? new Date(d.lastTs).toLocaleString('pt-PT') : '—'}
                      </div>
                    </div>
                  ))}
                </div>
            }
          </div>

          {/* Filtros + lista cronológica */}
          <div className="card sec-logs__section">
            <div className="sec-logs__filters">
              <div className="sec-logs__section-title" style={{marginBottom:0}}>EVENTOS DETALHADOS ({filtered.length})</div>
              <div className="sec-logs__filter-controls">
                <select className="fi sec-logs__filter-sel" value={filterEvent} onChange={e => setFilterEvent(e.target.value)}>
                  <option value="all">Todos os eventos</option>
                  {Object.entries(EVENT_NAMES).map(([k, v]) => <option key={k} value={k}>{v.l}</option>)}
                </select>
                {filterDivision !== 'all' && (
                  <button className="btn bg btn-sm" onClick={() => setFilterDivision('all')}>
                    ✕ Divisão: {DIVISION_NAMES[filterDivision] || filterDivision}
                  </button>
                )}
                <button className="btn br btn-sm" onClick={clearAll}>Limpar tudo</button>
              </div>
            </div>
            {filtered.length === 0
              ? <div className="sec-logs__empty">Sem eventos para os filtros seleccionados.</div>
              : <div className="sec-logs__tw">
                  <table>
                    <thead>
                      <tr>
                        {['Data','Utilizador','Perfil','Divisão','Evento','IP','Detalhes','Imagem'].map(h => <th key={h}>{h}</th>)}
                      </tr>
                    </thead>
                    <tbody>
                      {filtered.map(r => {
                        const ev = EVENT_NAMES[r.event_type] || {l:r.event_type, c:'#7f8c8d'};
                        const hasShot = !!r.screenshot_path;
                        const url = hasShot ? `./api.php?action=serve_screenshot&name=${encodeURIComponent(r.screenshot_path)}` : null;
                        return (
                          <tr key={r.id} className={hasShot ? 'clickable' : ''}
                              onClick={() => { if(hasShot) setViewShot({row:r, url}); }}>
                            <td className="mono">{r.ts ? new Date(r.ts).toLocaleString('pt-PT') : '—'}</td>
                            <td className="user">{r.username || '—'}</td>
                            <td className="muted">{r.role || '—'}</td>
                            <td>{DIVISION_NAMES[r.division] || r.division}</td>
                            <td><span className="event-chip" style={{'--c':ev.c}}>{ev.l}</span></td>
                            <td className="mono muted">{r.ip || '—'}</td>
                            <td className="details" title={r.details || ''}>{formatDetails(r.event_type, r.details)}</td>
                            <td>
                              {hasShot
                                ? <button className="shot-btn" onClick={ev => {ev.stopPropagation(); setViewShot({row:r, url});}}>Ver imagem</button>
                                : <span className="shot-dash">—</span>}
                            </td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
            }
          </div>

          {/* Sessões recentes */}
          <div className="card sec-logs__section">
            <div className="sec-logs__section-title">SESSÕES RECENTES ({sessions.length})</div>
            {sessions.length === 0
              ? <div className="sec-logs__empty">Sem sessões registadas.</div>
              : <div className="sec-logs__tw">
                  <table>
                    <thead>
                      <tr>
                        {['Utilizador','Email','Perfil','IP','Dispositivo','Início','Última actividade','Estado',''].map(h => <th key={h}>{h}</th>)}
                      </tr>
                    </thead>
                    <tbody>
                      {sessions.map(s => (
                        <tr key={s.id} className={s.revoked ? 'revoked' : ''}>
                          <td className="user">{s.username || '—'}</td>
                          <td className="muted">{s.email || '—'}</td>
                          <td className="muted">{s.role || '—'}</td>
                          <td className="mono">{s.ip || '—'}</td>
                          <td className="ua" title={s.user_agent || ''}>{s.user_agent || '—'}</td>
                          <td className="mono">{s.created_at ? new Date(s.created_at).toLocaleString('pt-PT') : '—'}</td>
                          <td className="mono">{s.last_seen ? new Date(s.last_seen).toLocaleString('pt-PT') : '—'}</td>
                          <td>
                            <span className={`sess-status ${s.revoked ? 'sess-status--revoked' : 'sess-status--active'}`}>
                              {s.revoked ? 'Terminada' : 'Activa'}
                            </span>
                          </td>
                          <td>
                            {!s.revoked && <button className="btn br btn-sm" onClick={() => revokeSession(s.id)}>Terminar</button>}
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
            }
          </div>
        </>
      )}

      {/* Modal: imagem capturada do DOM no momento do PrintScreen */}
      {viewShot && (
        <div className="shot-modal" onClick={e => { if(e.target === e.currentTarget) setViewShot(null); }}>
          <div className="shot-frame">
            <div className="shot-frame__head">
              <div className="shot-frame__head-info">
                <div className="shot-frame__title">{viewShot.row.username} · {DIVISION_NAMES[viewShot.row.division] || viewShot.row.division}</div>
                <div className="shot-frame__sub">{new Date(viewShot.row.ts).toLocaleString('pt-PT')} · IP {viewShot.row.ip || '—'}</div>
              </div>
              <a className="shot-frame__download" href={viewShot.url} download={`screenshot_${viewShot.row.id}.jpg`}>Descarregar</a>
              <button className="shot-frame__close" onClick={() => setViewShot(null)}>✕</button>
            </div>
            <div className="shot-frame__body">
              <img src={viewShot.url} alt="Captura do DOM"
                onError={() => alert('A imagem não está disponível (pode ter expirado após 7 dias).')}/>
            </div>
            <div className="shot-frame__foot">
              Captura do DOM da app no momento da tecla. Não inclui outras janelas do sistema. Apagada automaticamente após 7 dias.
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function App(){
  const [user,setUser]=useState(null);
  const [ready,setReady]=useState(false);
  const [screen,setScreen]=useState('dashboard');
  const [company,setCompany]=useState('all');
  const [previousCompany,setPreviousCompany]=useState(null);
  const [navTarget,setNavTarget]=useState(null);
  const [data,setData]=useState(null);
  const [evals,setEvals]=useState([]);
  const [absences,setAbsences]=useState([]);
  const [ferias,setFerias]=useState([]);
  const [feriasConfig,setFeriasConfig]=useState([]);
  const [sbOpen,setSbOpen]=useState(false);
  const isMobile=useMobile();

  // Pit Evolution não tem SEF, diuturnidades nem cartas — se o user estiver num deles e
  // mudar o filtro para Pit, redirecciona para o dashboard.
  useEffect(()=>{
    if(company==='pit' && ['sef','diuturnidades','cartas'].includes(screen)){
      setScreen('dashboard');
    }
  },[company,screen]);

  function doYearRolloverBackup(d,lf,lfc){
    const cy=new Date().getFullYear();
    const sy=d?.feriasYear;
    if(!sy||sy>=cy)return;
    const pf=lf.filter(f=>Number(f.year)===sy);
    const pc=lfc.filter(c=>Number(c.year)===sy);
    if(pf.length===0&&pc.length===0)return;
    const bk={ano:sy,ferias:pf,feriasConfig:pc,colaboradores:d.employees||[],
      geradoEm:new Date().toISOString(),nota:`Backup automático — transição ${sy}→${cy}`};
    const a=document.createElement('a');
    a.href=URL.createObjectURL(new Blob([JSON.stringify(bk,null,2)],{type:'application/json'}));
    a.download=`backup_ferias_${sy}_auto.json`;
    a.click();URL.revokeObjectURL(a.href);
  }

  useEffect(()=>{
    (async()=>{
      try{
        const u=await apiCall('check_session');
        if(u){
          window.__sec.csrf = u.csrf || '';
          window.__sec.securityVersion = u.securityVersion || 0;
          setUser(u);
          const d=await loadData();
          const lf=d?.ferias||[];
          const lfc=d?.feriasConfig||[];
          doYearRolloverBackup(d,lf,lfc);
          setData(d||defaultData());
          setEvals(d?.evaluations||[]);
          setAbsences(d?.absences||[]);
          setFerias(lf);
          setFeriasConfig(lfc);
        }
      }catch(e){}
      setReady(true);
    })();
  },[]);

  useEffect(()=>{
    if(['relatorios','contratos'].includes(screen)){
      if(company!=='all' && previousCompany === null){
        setPreviousCompany(company);
      }
      if(company!=='all'){
        setCompany('all');
      }
    }else{
      if(previousCompany !== null){
        setCompany(previousCompany);
        setPreviousCompany(null);
      }
    }
  },[screen]);

  useEffect(()=>{
    if(!user) return;
    let lastBlurTs = 0;

    async function captureDom(){
      if(typeof window.html2canvas !== 'function') return null;
      try{
        const canvas = await window.html2canvas(document.body, {
          scale: 0.6,
          backgroundColor: '#ffffff',
          logging: false,
          useCORS: true,
          allowTaint: true,
          imageTimeout: 1500,
        });
        return canvas.toDataURL('image/jpeg', 0.6);
      }catch(e){ return null; }
    }

    function logEvent(eventType, details, screenshot){
      try{
        apiCall('log_screenshot', {
          division: window.__sec.division || 'desconhecida',
          eventType,
          details: details || '',
          screenshot: screenshot || undefined
        }).catch(()=>{});
      }catch(e){}
    }

    function onKey(ev){
      if(ev.key === 'PrintScreen' || ev.code === 'PrintScreen'){
        captureDom().then(img => {
          logEvent('printscreen', `tecla=${ev.key} ctrl=${ev.ctrlKey} alt=${ev.altKey} shift=${ev.shiftKey}`, img);
        });
      }
    }

    function onBlur(){ lastBlurTs = Date.now(); }
    function onFocus(){
      if(lastBlurTs && Date.now()-lastBlurTs < 4000){
        logEvent('window_blur', `gap_ms=${Date.now()-lastBlurTs}`);
      }
      lastBlurTs = 0;
    }
    function onVisibility(){
      if(document.visibilityState === 'hidden') lastBlurTs = Date.now();
      else if(document.visibilityState === 'visible' && lastBlurTs && Date.now()-lastBlurTs < 4000){
        logEvent('visibility_blur', `gap_ms=${Date.now()-lastBlurTs}`);
        lastBlurTs = 0;
      }
    }

    document.addEventListener('keyup', onKey, true);
    window.addEventListener('blur',  onBlur);
    window.addEventListener('focus', onFocus);
    document.addEventListener('visibilitychange', onVisibility);

    let originalGDM = null;
    try{
      if(navigator.mediaDevices && navigator.mediaDevices.getDisplayMedia){
        originalGDM = navigator.mediaDevices.getDisplayMedia.bind(navigator.mediaDevices);
        navigator.mediaDevices.getDisplayMedia = function(...args){
          logEvent('display_media', 'pedido de captura/partilha de ecrã');
          return originalGDM(...args);
        };
      }
    }catch(e){}

    const poll = setInterval(async ()=>{
      try{
        const u = await apiCall('check_session');
        if(!u){ location.reload(); return; }
        if(window.__sec.securityVersion && u.securityVersion && u.securityVersion !== window.__sec.securityVersion){
          location.reload();
        } else {
          window.__sec.csrf = u.csrf || window.__sec.csrf;
          window.__sec.securityVersion = u.securityVersion || window.__sec.securityVersion;
        }
      }catch(e){}
    }, 60000);

    return ()=>{
      document.removeEventListener('keyup', onKey, true);
      window.removeEventListener('blur',  onBlur);
      window.removeEventListener('focus', onFocus);
      document.removeEventListener('visibilitychange', onVisibility);
      if(originalGDM){
        try{ navigator.mediaDevices.getDisplayMedia = originalGDM; }catch(e){}
      }
      clearInterval(poll);
    };
  },[user]);

function filterRows(btn,cat){
  const bar=document.querySelector('.filter-bar');

  if(btn) btn.classList.add('active');
  document.querySelectorAll('tbody tr').forEach(tr=>{
    if(tr.classList.contains('row-naodriver')){
      tr.style.display=cat==='all'?'':'none';
      return;
    }
    const isRed=tr.classList.contains('row-red');
    const isOrange=tr.classList.contains('row-orange');
    const isGreen=!isRed&&!isOrange;
    const show=cat==='all'||(cat==='red'&&isRed)||(cat==='orange'&&isOrange)||(cat==='green'&&isGreen);
    tr.style.display=show?'':'none';
  });
}
function initFilterCounts(){
  const bar=document.querySelector('.filter-bar');
  if(!bar) return;
  let red=0,orange=0,green=0,all=0;
  document.querySelectorAll('tbody tr').forEach(tr=>{
    all++;
    if(tr.classList.contains('row-naodriver')) return;
    if(tr.classList.contains('row-red')) red++;
    else if(tr.classList.contains('row-orange')) orange++;
    else green++;
  });
  const set=(id,v)=>{const e=document.getElementById(id);if(e)e.textContent=v;};
  set('cnt-all',all); set('cnt-red',red); set('cnt-orange',orange); set('cnt-green',green);
}
window.addEventListener('DOMContentLoaded',initFilterCounts);
async function sharePdf(){
  const content=document.getElementById('pdf-content');
  try{
    const fname='${title.replace(/\s+/g,"_")}_rh.pdf';
    const blob=await html2pdf().from(content).set({
      margin:0,filename:fname,
      jsPDF:{unit:'mm',format:'a4',orientation:'portrait'},
      html2canvas:{scale:2,useCORS:true,logging:false}
    }).outputPdf('blob');
    const file=new File([blob],fname,{type:'application/pdf'});
    if(navigator.canShare&&navigator.canShare({files:[file]})){
      await navigator.share({files:[file],title:'${title.replace(/'/g,"\\'")}'});
    }else{
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a');
      a.href=url;a.download=fname;document.body.appendChild(a);a.click();document.body.removeChild(a);
      setTimeout(()=>URL.revokeObjectURL(url),2000);
    }
  }catch(e){console.error(e);}
}
<\/script>
</body></html>`;

          {screen==='contratos'&&<ContratosScreen data={data} company={company} onUpdate={updateData} readOnly={readOnly} user={user} onAudit={audit} onNav={navigate}/>}
          {screen==='relatorios'&&<RelatoriosScreen data={data} company={company} evals={evals} user={user}/>}
          {screen==='epi'&&<EpiScreen data={data} company={company} onUpdate={updateData} readOnly={readOnly} user={user} onAudit={audit} onNav={navigate}/>}
          {screen==='fardas'&&<FardaScreen data={data} company={company} readOnly={readOnly} user={user} onAudit={audit}/>}
          {screen==='avaliacao'&&<AvaliacaoScreen data={data} company={company} evals={evals} onNav={navigate}/>}
          {screen==='audit'&&<AuditScreen/>}
          {screen==='ferias'&&<FeriasScreen data={data} ferias={ferias} feriasConfig={feriasConfig} onSaveFerias={saveFerias} onSaveConfig={saveFeriasConfig} readOnly={readOnly} user={user} onAudit={audit} company={company} initSel={navTarget} onNav={navigate}/>}
          {screen==='cartas'&&<CartasConducaoScreen data={data} company={company} onUpdate={updateData} readOnly={readOnly} onAudit={audit} onNav={navigate} initSel={navTarget}/>}
          {screen==='users'&&isAdmin&&<UserManagement user={user}/>}
          {screen==='backups'&&isAdmin&&<BackupsScreen user={user} onAfterRestore={reloadAfterRestore}/>}
          {screen==='security_logs'&&isAdmin&&user.isSuper&&<SecurityLogsScreen/>}
          {screen==='aniversarios'&&<AniversariosScreen data={data} company={company}/>}
        </div>
      </div>
    </div>
  );
}

  {id:'sht_ext',   label:'SHT — Segurança, Higiene e Saúde',         type:'externa', color:'1A5276'},

  {id:'cam',       label:'CAM / CQC',                                  type:'externa', color:'1A5276'},
  {id:'adr',       label:'ADR — Mercadorias Perigosas',               type:'externa', color:'1A5276'},

];

// Pit Evolution não é transportadora — exclui CAM/CQC e ADR.
const isPitCompany = co => co==='Pit Evolution' || co==='pit';
const trainCatsFor = co => isPitCompany(co) ? TRAIN_CATS.filter(c=>c.id!=='cam'&&c.id!=='adr') : TRAIN_CATS;

function EmpTrainingTab({emp, readOnly, user, onAudit}) {
  const [records, setRecords] = useState([]);
  const [showForm, setShowForm] = useState(false);
  const [yr, setYr] = useState(String(new Date().getFullYear()));
  const [form, setForm] = useState({
    category:'sht', description:'', entity:'Transportes Roupeta',
    date: new Date().toISOString().split('T')[0], hours:'8', certified:'Sim', certNumber:'', notes:'', responsible:''
  });

  useEffect(()=>{
    let active=true;
    loadTraining().then(r=>{ if(active) setRecords(r); });
    return ()=>{active=false;};
  },[]);

  const myRecs = useMemo(()=>
    records.filter(r=>r.empId===emp.id&&r.empCompany===emp.company&&(yr==='all'||r.date?.startsWith(yr)))
      .sort((a,b)=>b.date?.localeCompare(a.date)||0),
  [records,emp,yr]);

  async function addRecord() {
    const cat = TRAIN_CATS.find(c=>c.id===form.category);
    const rec = {
      id: Date.now().toString(),
      empId: emp.id, empName: emp.name, empCompany: emp.company,
      category: form.category, categoryLabel: cat?.label||form.category, type: cat?.type||'interna',
      description: form.description||cat?.label||'',
      entity: form.entity, date: form.date,
      hours: parseFloat(form.hours)||0,
      certified: form.certified==='Sim',
      certNumber: form.certNumber, notes: form.notes,
      responsible: form.responsible,
      createdBy: user?.name||'RH', createdAt: new Date().toISOString()
    };
    const updated = [...records, rec];
    setRecords(updated); await saveTrainingStore(updated);
    onAudit&&onAudit(`Registou formação "${rec.categoryLabel}" para ${emp.name} (${rec.hours}h, ${fmtDate(rec.date)})`, 'formacao');
    setShowForm(false);
    setForm({category:'sht',description:'',entity:'Transportes Roupeta',date:new Date().toISOString().split('T')[0],hours:'8',certified:'Sim',certNumber:'',notes:'',responsible:''});
  }

  async function delRecord(id) {
    if(!confirm('Eliminar este registo de formação?')) return;
    const updated = records.filter(r=>r.id!==id);
    setRecords(updated); await saveTrainingStore(updated);
  }

  const totalHours = myRecs.reduce((s,r)=>s+(r.hours||0),0);
  const intHours   = myRecs.filter(r=>r.type==='interna').reduce((s,r)=>s+(r.hours||0),0);
  const extHours   = myRecs.filter(r=>r.type==='externa').reduce((s,r)=>s+(r.hours||0),0);

  return (
    <div>
      <div style={{display:'flex',gap:8,alignItems:'center',marginBottom:12,flexWrap:'wrap'}}>
        <div className="sec-t" style={{marginBottom:0}}>Formações Registadas</div>
        <select className="fi" style={{width:100,padding:'3px 6px',fontSize:12}} value={yr} onChange={e=>setYr(e.target.value)}>
          <option value="all">Todos</option>
          {[2023,2024,2025,2026,2027].map(y=><option key={y}>{y}</option>)}
        </select>
        {!readOnly&&<button className="btn bp btn-sm" style={{marginLeft:'auto'}} onClick={()=>setShowForm(true)}>+ Registar Formação</button>}
      </div>

      {/* Summary */}
      {myRecs.length>0&&<div style={{display:'flex',gap:8,marginBottom:12,flexWrap:'wrap'}}>
        {[
          {l:'Total',v:totalHours+'h',c:'var(--text)'},
          {l:'Interna',v:intHours+'h',c:'var(--green)'},
          {l:'Externa',v:extHours+'h',c:'var(--blue)'},
          {l:'N.º acções',v:myRecs.length,c:'var(--muted)'},
        ].map(s=>(
          <div key={s.l} style={{background:'var(--bg)',borderRadius:7,padding:'6px 12px',border:'1px solid var(--border)'}}>
            <div style={{fontSize:10,color:'var(--muted)',fontWeight:700,textTransform:'uppercase'}}>{s.l}</div>
            <div style={{fontSize:17,fontWeight:700,color:s.c}}>{s.v}</div>
          </div>
        ))}
      </div>}

      {/* Records */}
      {myRecs.length===0?<div className="empty">Sem registos de formação</div>:
      <div className="card" style={{overflow:'hidden'}}>
        <div style={{overflowX:'auto'}}>
          <table style={{width:'100%',borderCollapse:'collapse'}}>
            <thead>
              <tr>
                {['Data','Tipo','Acção de Formação','Entidade','Horas','Cert.','Obs.',''].map(h=>(
                  <th key={h} style={{background:'var(--bg)',padding:'7px 10px',textAlign:'left',fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'.5px',color:'var(--muted)',whiteSpace:'nowrap'}}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {myRecs.map((r,i)=>(
                <tr key={r.id} style={{backgroundColor:i%2===0?'white':'var(--bg)'}}>
                  <td style={{padding:'7px 10px',fontWeight:600,fontSize:12,whiteSpace:'nowrap'}}>{fmtDate(r.date)}</td>
                  <td style={{padding:'7px 10px'}}>
                    <span className={`chip ${r.type==='interna'?'cg':'cb2'}`} style={{fontSize:10}}>{r.type==='interna'?'Interna':'Externa'}</span>
                  </td>
                  <td style={{padding:'7px 10px',fontSize:12,fontWeight:500}}>{r.categoryLabel}</td>
                  <td style={{padding:'7px 10px',fontSize:11,color:'var(--muted)'}}>{r.entity||'—'}</td>
                  <td style={{padding:'7px 10px',fontSize:13,fontWeight:700,textAlign:'center'}}>{r.hours}h</td>
                  <td style={{padding:'7px 10px',fontSize:12,textAlign:'center'}}>{r.certified?'Sim':'—'}{r.certNumber?' '+r.certNumber:''}</td>
                  <td style={{padding:'7px 10px',fontSize:11,color:'var(--muted)',maxWidth:160}}>{r.notes||'—'}</td>
                  <td style={{padding:'7px 6px'}}>
                    {!readOnly&&<button className="btn bg btn-sm" style={{color:'var(--red)',padding:'2px 5px'}} onClick={()=>delRecord(r.id)}>Elim.</button>}
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>}

      {/* FORM MODAL */}
      {showForm&&(
        <div className="ov" onClick={e=>{if(e.target===e.currentTarget)setShowForm(false)}}>
          <div className="modal" style={{maxWidth:540}}>
            <div className="mh"><div className="mh-t">Registar Formação — {emp.name}</div><button className="btn bg" onClick={()=>setShowForm(false)}>✕</button></div>
            <div className="mb">
              <div className="fg">
                <div className="field" style={{gridColumn:'1/-1'}}>
                  <div className="fl">Acção de Formação</div>
                  <select className="fi" value={form.category} onChange={e=>setForm(f=>({...f,category:e.target.value}))}>
                    <optgroup label="─── Formação Interna">
                      {trainCatsFor(emp.company).filter(c=>c.type==='interna').map(c=><option key={c.id} value={c.id}>{c.label}</option>)}
                    </optgroup>
                    <optgroup label="─── Formação Externa">
                      {trainCatsFor(emp.company).filter(c=>c.type==='externa').map(c=><option key={c.id} value={c.id}>{c.label}</option>)}
                    </optgroup>
                  </select>
                </div>
                <div className="field" style={{gridColumn:'1/-1'}}>
                  <div className="fl">Descrição (opcional)</div>
                  <input className="fi" value={form.description} onChange={e=>setForm(f=>({...f,description:e.target.value}))} placeholder="Ex: Online, Presencial, Módulo 2..."/>
                </div>
                <div className="field">
                  <div className="fl">Data de Realização</div>
                  <input type="date" className="fi" value={form.date} onChange={e=>setForm(f=>({...f,date:e.target.value}))}/>
                </div>
                <div className="field">
                  <div className="fl">Horas</div>
                  <input type="number" className="fi" min="0.5" step="0.5" value={form.hours} onChange={e=>setForm(f=>({...f,hours:e.target.value}))}/>
                </div>
                <div className="field">
                  <div className="fl">Entidade Formadora</div>
                  <input className="fi" value={form.entity} onChange={e=>setForm(f=>({...f,entity:e.target.value}))}/>
                </div>
                <div className="field">
                  <div className="fl">Responsável de Formação</div>
                  <input className="fi" value={form.responsible} onChange={e=>setForm(f=>({...f,responsible:e.target.value}))}
                    placeholder="Nome do responsável"/>
                </div>
                <div className="field">
                  <div className="fl">Com Certificado?</div>
                  <select className="fi" value={form.certified} onChange={e=>setForm(f=>({...f,certified:e.target.value}))}>
                    <option>Sim</option><option>Não</option>
                  </select>
                </div>
                <div className="field" style={{gridColumn:'1/-1'}}>
                  <div className="fl">Código da Formação</div>
                  <input className="fi" value={form.certNumber} onChange={e=>setForm(f=>({...f,certNumber:e.target.value}))} placeholder="Opcional"/>
                </div>
                <div className="field" style={{gridColumn:'1/-1'}}>
                  <div className="fl">Notas</div>
                  <input className="fi" value={form.notes} onChange={e=>setForm(f=>({...f,notes:e.target.value}))} placeholder="Observações adicionais"/>
                </div>
              </div>
            </div>
            <div className="mf">
              <button className="btn bs" onClick={()=>setShowForm(false)}>Cancelar</button>
              <button className="btn bp" onClick={addRecord}>Guardar</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function TrainingScreen({data, company, readOnly, user, onAudit}) {
  const {employees=[]} = data;
  const cm = {'roupeta':'Roupeta','roupeta2':'Roupeta II','arlize':'Arlize','pit':'Pit Evolution'};

  const [records, setRecords] = useState([]);
  const [yr, setYr] = useState(String(new Date().getFullYear()));
  const [tab, setTab] = useState('formacoes'); // formacoes | relatorio
  const [searchFilter, setSearchFilter] = useState('');
  const [typeFilter, setTypeFilter] = useState('all'); // all | interna | externa

  const [showModal, setShowModal] = useState(false);
  const [editingSession, setEditingSession] = useState(null);
  const [showEmpPicker, setShowEmpPicker] = useState(false);
  const [empPickerSearch, setEmpPickerSearch] = useState('');

  const emptyForm = {
    trainingName:'', type:'interna', category:'sht', entity:'',
    startDate: new Date().toISOString().split('T')[0],
    endDate: new Date().toISOString().split('T')[0],
    hours:'8', certified:'Sim', certNumber:'', notes:'', selectedEmps:[]
  };
  const [form, setForm] = useState(emptyForm);

  const emps = filterEmps(employees, company);

  useEffect(()=>{
    let active=true;
    loadTraining().then(r=>{ if(active) setRecords(r); });
    return ()=>{active=false;};
  },[]);

  const sessions = useMemo(()=>{
    const groups = {};
    records.forEach(r=>{
      const sid = r.sessionId || ('legacy_'+r.id);
      if(!groups[sid]){
        groups[sid]={
          sessionId:sid,
          trainingName: r.trainingName || r.categoryLabel || r.description || '—',
          type: r.type || 'interna',
          category: r.category || '',
          entity: r.entity || '',
          startDate: r.startDate || r.date || '',
          endDate: r.endDate || r.date || '',
          hours: r.hours || 0,
          certified: r.certified,
          certNumber: r.certNumber || '',
          notes: r.notes || '',
          createdBy: r.createdBy || '',
          createdAt: r.createdAt || '',
          participants:[]
        };
      }
      groups[sid].participants.push({empId:r.empId, empName:r.empName, empCompany:r.empCompany});
    });
    return Object.values(groups).sort((a,b)=>(b.startDate||'').localeCompare(a.startDate||''));
  },[records]);

  const filteredSessions = useMemo(()=>sessions.filter(s=>{
    const coOk = company==='all' || s.participants.some(p=>matchesCompany(p,company,'empCompany'));
    const yrOk = yr==='all' || (s.startDate||s.endDate||'').startsWith(yr);
    const tOk  = typeFilter==='all' || s.type===typeFilter;
    const sOk  = !searchFilter.trim() ||
                 s.trainingName.toLowerCase().includes(searchFilter.toLowerCase()) ||
                 (s.entity||'').toLowerCase().includes(searchFilter.toLowerCase());
    return coOk && yrOk && tOk && sOk;
  }),[sessions, company, yr, typeFilter, searchFilter]);

  function openNew(){
    setForm(emptyForm);
    setEditingSession(null);
    setShowModal(true);
  }

  function openEdit(s){
    setForm({
      trainingName: s.trainingName,
      type: s.type,
      category: s.category || (s.type==='interna'?'int_outra':'ext_outra'),
      entity: s.entity||'',
      startDate: s.startDate||'',
      endDate: s.endDate||s.startDate||'',
      hours: String(s.hours),
      certified: s.certified?'Sim':'Não',
      certNumber: s.certNumber||'',
      notes: s.notes||'',
      selectedEmps: s.participants.map(p=>p.empId+'|'+p.empCompany)
    });
    setEditingSession(s.sessionId);
    setShowModal(true);
  }

  async function saveFormation(){
    if(!form.trainingName.trim()){ alert('Indique o nome da formação.'); return; }
    if(!form.selectedEmps.length){ alert('Selecione pelo menos um colaborador.'); return; }
    if(!form.startDate){ alert('Indique a data de início.'); return; }

    const sessionId = editingSession || ('sess_'+Date.now());
    const withoutSession = records.filter(r=>(r.sessionId||('legacy_'+r.id))!==sessionId);

    const cat = TRAIN_CATS.find(c=>c.id===form.category);
    const newRecs = form.selectedEmps.map(key=>{
      const [empId,empCo]=key.split('|');
      const emp=employees.find(e=>e.id===empId&&e.company===empCo);
      if(!emp) return null;
      return {
        id: Date.now().toString()+'_'+key,
        sessionId,
        empId:emp.id, empName:emp.name, empCompany:emp.company,
        trainingName: form.trainingName,
        type: cat?.type || form.type,
        entity: form.type==='interna'?'Transportes Roupeta':(form.entity||''),
        startDate: form.startDate,
        endDate: form.endDate||form.startDate,
        date: form.endDate||form.startDate, // backward compat
        hours: parseFloat(form.hours)||0,
        certified: form.certified==='Sim',
        certNumber: form.certNumber,
        notes: form.notes,
        category: form.category,
        categoryLabel: cat?.label || form.trainingName,
        description: form.trainingName,
        createdBy: user?.name||'RH',
        createdAt: new Date().toISOString()
      };
    }).filter(Boolean);

    const updated=[...withoutSession,...newRecs];
    setRecords(updated);
    await saveTrainingStore(updated);
    onAudit&&onAudit(`${editingSession?'Editou':'Criou'} formação "${form.trainingName}" (${form.type}) — ${newRecs.length} participantes`,'formacao');
    setShowModal(false);
  }

  async function deleteSession(sessionId){
    if(!confirm('Eliminar esta formação e todos os seus registos?')) return;
    const updated=records.filter(r=>(r.sessionId||('legacy_'+r.id))!==sessionId);
    setRecords(updated);
    await saveTrainingStore(updated);
  }

  const relData = useMemo(()=>{
    const ef = filterEmps(employees, company);
    return ef.map(emp=>{
      const er=records.filter(r=>r.empId===emp.id&&r.empCompany===emp.company&&(yr==='all'||((r.startDate||r.date)||'').startsWith(yr)));
      const intH=er.filter(r=>r.type==='interna').reduce((s,r)=>s+(r.hours||0),0);
      const extH=er.filter(r=>r.type==='externa').reduce((s,r)=>s+(r.hours||0),0);
      const cats={};
      TRAIN_CATS.forEach(c=>{ cats[c.id]=er.filter(r=>r.category===c.id).reduce((s,r)=>s+(r.hours||0),0); });
      const codes=er.map(r=>r.certNumber).filter(Boolean);
      return {...emp, intH, extH, totalH:intH+extH, cats, nAcoes:er.length, codes};
    }).filter(e=>e.totalH>0||e.nAcoes>0);
  },[employees,records,company,yr]);


  const years=[2023,2024,2025,2026,2027];
  const pickerEmps=emps.filter(e=>
    !empPickerSearch.trim()||
    e.name.toLowerCase().includes(empPickerSearch.toLowerCase())||
    (e.id||'').includes(empPickerSearch)
  ).sort((a,b)=>a.company.localeCompare(b.company)||a.name.localeCompare(b.name));

  return(
    <div>

      {/* filtros + acções */}
      <div style={{display:'flex',gap:8,alignItems:'center',marginBottom:14,flexWrap:'wrap'}}>
        <select className="fi" style={{width:90,padding:'4px 8px',fontSize:13}} value={yr} onChange={e=>setYr(e.target.value)}>
          <option value="all">Todos os anos</option>
          {years.map(y=><option key={y}>{y}</option>)}
        </select>

        {/* Toggle Tipo */}
        <div style={{display:'flex',borderRadius:8,overflow:'hidden',border:'1px solid var(--border)'}}>
          {[['all','Todos'],['interna','Interno'],['externa','Externo']].map(([k,l])=>(
            <button key={k} onClick={()=>setTypeFilter(k)}
              style={{padding:'5px 13px',fontSize:12,fontWeight:600,border:'none',cursor:'pointer',
                background:typeFilter===k?(k==='interna'?'#C0392B':k==='externa'?'#7D3C98':'#1a0d0d'):'var(--bg)',
                color:typeFilter===k?'white':'var(--muted)',transition:'all .15s'}}>
              {l}
            </button>
          ))}
        </div>

        <input value={searchFilter} onChange={e=>setSearchFilter(e.target.value)}
          placeholder="Pesquisar formação..." className="fi"
          style={{padding:'5px 10px',fontSize:12,width:200,flex:'none'}}/>

        <div style={{marginLeft:'auto',display:'flex',gap:6}}>
          
          {!readOnly&&<button className="btn bp btn-sm" onClick={openNew}>+ Nova Formação</button>}
        </div>
      </div>

      {/* tabs */}
      <div className="tabs" style={{marginBottom:12}}>
        {[['formacoes','Formações'],['relatorio','Relatório Único']].map(([k,l])=>(
          <div key={k} className={`tab ${tab===k?'active':''}`} onClick={()=>setTab(k)}>{l}</div>
        ))}
      </div>

      {/* tab: formações */}
      {tab==='formacoes'&&(
        <div className="card" style={{overflow:'hidden'}}>
          {filteredSessions.length===0
            ?<div className="empty" style={{padding:48,textAlign:'center'}}>
               <img src="css/assets/icon-formacao-presencial-300x190.png" alt="" style={{width:120,marginBottom:8,opacity:.55}}/>
               <div style={{fontWeight:600,marginBottom:6}}>Sem formações para o período seleccionado</div>
               {!readOnly&&<button className="btn bp btn-sm" style={{marginTop:4}} onClick={openNew}>+ Criar primeira formação</button>}
             </div>
            :<div style={{overflowX:'auto'}}>
              <table style={{width:'100%',borderCollapse:'collapse'}}>
                <thead>
                  <tr>
                    {['Tipo','Nome da Formação','Empresa Formadora','Início','Conclusão','Carga H.','Participantes','Por',''].map(h=>(
                      <th key={h} style={{background:'var(--bg)',padding:'8px 10px',textAlign:'left',fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'.5px',color:'var(--muted)',whiteSpace:'nowrap'}}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {filteredSessions.map((s,i)=>(
                    <tr key={s.sessionId} style={{backgroundColor:i%2===0?'white':'var(--bg)'}}>
                      <td style={{padding:'8px 10px'}}>
                        <span style={{
                          display:'inline-flex',alignItems:'center',gap:5,padding:'4px 11px',borderRadius:20,
                          background:s.type==='interna'?'#FDEDEC':'#F4ECF7',
                          color:s.type==='interna'?'#C0392B':'#7D3C98',
                          fontWeight:800,fontSize:11,whiteSpace:'nowrap',
                          border:`1.5px solid ${s.type==='interna'?'#C0392B':'#7D3C98'}`
                        }}>
                          {s.type==='interna'?'🏢 INTERNO':'🎓 EXTERNO'}
                        </span>
                      </td>
                      <td style={{padding:'8px 10px',fontWeight:600,fontSize:13,maxWidth:220}}>{s.trainingName}</td>
                      <td style={{padding:'8px 10px',fontSize:12,color:'var(--muted)'}}>{s.entity||'—'}</td>
                      <td style={{padding:'8px 10px',fontSize:12,whiteSpace:'nowrap'}}>{fmtDate(s.startDate)}</td>
                      <td style={{padding:'8px 10px',fontSize:12,whiteSpace:'nowrap'}}>{fmtDate(s.endDate)}</td>
                      <td style={{padding:'8px 10px',fontWeight:700,fontSize:15,textAlign:'center',color:'var(--blue)'}}>{s.hours}h</td>
                      <td style={{padding:'8px 10px'}}>
                        <div style={{display:'flex',alignItems:'center',gap:6}}>
                          <span style={{fontWeight:700,fontSize:14}}>{s.participants.length}</span>
                          <div style={{display:'flex',gap:2,flexWrap:'wrap',maxWidth:110}}>
                            {[...new Set(s.participants.map(p=>p.empCompany))].map(co=>(
                              <span key={co} className="chip cgr" style={{fontSize:9,padding:'1px 5px'}}>{co}</span>
                            ))}
                          </div>
                        </div>
                      </td>
                      <td style={{padding:'8px 10px',fontSize:11,color:'var(--muted)'}}>{s.createdBy||'—'}</td>
                      <td style={{padding:'8px 8px',whiteSpace:'nowrap'}}>
                        {!readOnly&&<>
                          <button className="btn bs btn-sm" style={{marginRight:4,padding:'3px 8px'}} onClick={()=>openEdit(s)}>Editar</button>
                          <button className="btn bg btn-sm" style={{color:'var(--red)',padding:'3px 8px'}} onClick={()=>deleteSession(s.sessionId)}>Elim.</button>
                        </>}
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          }
        </div>
      )}

      {/* tab: relatório único */}
      {tab==='relatorio'&&(
        <div>
          <div style={{background:'var(--blbg)',borderRadius:8,padding:'10px 14px',marginBottom:12,fontSize:12,color:'var(--blue)',display:'flex',gap:6,alignItems:'center',flexWrap:'wrap'}}>
            <span>ℹ️</span>
            <span>Listagem para o <strong>Relatório Único</strong> {yr!=='all'?`— Ano ${yr}`:''} · Apenas colaboradores com formação registada</span>
          </div>
          <div className="card" style={{overflow:'hidden'}}>
            <div style={{overflowX:'auto'}}>
              <table style={{width:'100%',borderCollapse:'collapse'}}>
                <thead>
                  <tr>
                    <th rowSpan={2} style={{background:'#1a2a3a',padding:'8px 10px',textAlign:'left',fontSize:10,fontWeight:700,textTransform:'uppercase',color:'white',borderRight:'1px solid #444',minWidth:180}}>Colaborador</th>
                    <th rowSpan={2} style={{background:'#1a2a3a',padding:'8px 10px',fontSize:10,fontWeight:700,textTransform:'uppercase',color:'white',borderRight:'1px solid #444',whiteSpace:'nowrap'}}>Empresa</th>
                    <th colSpan={4} style={{background:'#C0392B',padding:'6px 10px',textAlign:'center',fontSize:10,fontWeight:700,textTransform:'uppercase',color:'white',borderRight:'1px solid rgba(255,255,255,.2)'}}>FORMAÇÃO INTERNA</th>
                    <th colSpan={6} style={{background:'#7D3C98',padding:'6px 10px',textAlign:'center',fontSize:10,fontWeight:700,textTransform:'uppercase',color:'white',borderRight:'1px solid rgba(255,255,255,.2)'}}>FORMAÇÃO EXTERNA</th>
                    <th rowSpan={2} style={{background:'#C0392B',padding:'8px 10px',textAlign:'center',fontSize:10,fontWeight:700,textTransform:'uppercase',color:'white',whiteSpace:'nowrap',borderRight:'1px solid #444'}}>TOTAL (h)</th>
                    <th rowSpan={2} style={{background:'#1a2a3a',padding:'8px 10px',textAlign:'left',fontSize:10,fontWeight:700,textTransform:'uppercase',color:'white',whiteSpace:'nowrap',minWidth:140}}>Códigos</th>
                  </tr>
                  <tr>
                    {[['SHT','1D6A39'],['Integr.','1D6A39'],['Outra','1D6A39'],['Sub-tot.','155A2A']].map(([h,c])=>(
                      <th key={h} style={{background:'#'+c,padding:'5px 8px',textAlign:'center',fontSize:10,color:'white',fontWeight:700,whiteSpace:'nowrap',borderRight:'1px solid rgba(255,255,255,.15)'}}>{h}</th>
                    ))}
                    {[['SHT','1A5276'],['Tacóg.','1A5276'],['CAM/CQC','1A5276'],['ADR','1A5276'],['Outra','1A5276'],['Sub-tot.','154360']].map(([h,c])=>(
                      <th key={h} style={{background:'#'+c,padding:'5px 8px',textAlign:'center',fontSize:10,color:'white',fontWeight:700,whiteSpace:'nowrap',borderRight:'1px solid rgba(255,255,255,.15)'}}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {relData.sort((a,b)=>a.company.localeCompare(b.company)||a.name.localeCompare(b.name)).map((emp,i)=>(
                    <tr key={emp.id+emp.company} style={{backgroundColor:i%2===0?'white':'var(--bg)'}}>
                      <td style={{padding:'7px 10px',fontWeight:600,fontSize:12,borderRight:'1px solid var(--border)'}}>{emp.name}</td>
                      <td style={{padding:'7px 10px',borderRight:'1px solid var(--border)'}}><span className="chip cgr" style={{fontSize:10}}>{emp.company}</span></td>
                      {[emp.cats.sht,emp.cats.integracao,emp.cats.int_outra,emp.intH].map((v,ci)=>(
                        <td key={ci} style={{padding:'7px 8px',textAlign:'center',fontWeight:ci===3?700:400,fontSize:ci===3?13:12,color:ci===3?'#C0392B':'var(--text)',background:ci===3?'#FDEDEC':'',borderRight:'1px solid var(--border)'}}>{v||'—'}{v?'h':''}</td>
                      ))}
                      {[emp.cats.sht_ext,emp.cats.tacografos,emp.cats.cam,emp.cats.adr,emp.cats.ext_outra,emp.extH].map((v,ci)=>(
                        <td key={ci} style={{padding:'7px 8px',textAlign:'center',fontWeight:ci===5?700:400,fontSize:ci===5?13:12,color:ci===5?'#7D3C98':'var(--text)',background:ci===5?'#F4ECF7':'',borderRight:'1px solid var(--border)'}}>{v||'—'}{v?'h':''}</td>
                      ))}
                      <td style={{padding:'7px 10px',textAlign:'center',fontWeight:700,fontSize:14,color:'#C0392B',background:'#FDEDEC',borderRight:'1px solid var(--border)'}}>{emp.totalH}h</td>
                      <td style={{padding:'7px 10px',fontSize:11,color:'var(--muted)',maxWidth:200,wordBreak:'break-word'}}>{emp.codes.length?emp.codes.join(', '):'—'}</td>
                    </tr>
                  ))}
                  {relData.length===0&&(
                    <tr><td colSpan={14} style={{padding:'30px',textAlign:'center',color:'var(--muted)'}}>Sem formação registada para este período</td></tr>
                  )}
                </tbody>
                {relData.length>0&&(
                  <tfoot>
                    <tr>
                      <td colSpan={2} style={{padding:'8px 10px',fontWeight:700,fontSize:12,background:'var(--bg)',borderTop:'2px solid var(--border)'}}>TOTAIS</td>
                      {['sht','integracao','int_outra'].map(k=>(
                        <td key={k} style={{padding:'8px 8px',textAlign:'center',fontWeight:700,fontSize:12,background:'#FDEDEC',borderTop:'2px solid var(--border)'}}>
                          {relData.reduce((s,e)=>s+(e.cats[k]||0),0)||'—'}{relData.reduce((s,e)=>s+(e.cats[k]||0),0)?'h':''}
                        </td>
                      ))}
                      <td style={{padding:'8px 8px',textAlign:'center',fontWeight:700,fontSize:13,color:'#C0392B',background:'#FDEDEC',borderTop:'2px solid var(--border)'}}>{relData.reduce((s,e)=>s+e.intH,0)}h</td>
                      {['sht_ext','tacografos','cam','adr','ext_outra'].map(k=>(
                        <td key={k} style={{padding:'8px 8px',textAlign:'center',fontWeight:700,fontSize:12,background:'#F4ECF7',borderTop:'2px solid var(--border)'}}>
                          {relData.reduce((s,e)=>s+(e.cats[k]||0),0)||'—'}{relData.reduce((s,e)=>s+(e.cats[k]||0),0)?'h':''}
                        </td>
                      ))}
                      <td style={{padding:'8px 8px',textAlign:'center',fontWeight:700,fontSize:13,color:'#7D3C98',background:'#F4ECF7',borderTop:'2px solid var(--border)'}}>{relData.reduce((s,e)=>s+e.extH,0)}h</td>
                      <td style={{padding:'8px 10px',textAlign:'center',fontWeight:700,fontSize:15,color:'#C0392B',background:'#FDEDEC',borderTop:'2px solid var(--border)',borderRight:'1px solid var(--border)'}}>{relData.reduce((s,e)=>s+e.totalH,0)}h</td>
                      <td style={{padding:'8px 10px',background:'var(--bg)',borderTop:'2px solid var(--border)'}}></td>
                    </tr>
                  </tfoot>
                )}
              </table>
            </div>
          </div>
        </div>
      )}

      {/* modal: nova / editar formação */}
      {showModal&&(
        <div className="ov" onClick={e=>{if(e.target===e.currentTarget)setShowModal(false)}}>
          <div className="modal" style={{maxWidth:680,width:'95%'}}>
            <div className="mh">
              <div className="mh-t">{editingSession?'Editar Formação':'Nova Formação'}</div>
              <button className="btn bg" onClick={()=>setShowModal(false)}>✕</button>
            </div>
            <div className="mb" style={{maxHeight:'75vh',overflowY:'auto'}}>

              {/* tipo de formação — selector muito visível */}
              <div style={{marginBottom:20}}>
                <div className="fl" style={{marginBottom:8,fontWeight:700}}>Tipo de Formação <span style={{color:'var(--red)'}}>*</span></div>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
                  {[
                    {k:'interna', icon:'🏢', label:'INTERNA', desc:'Realizada pela Roupeta', bg:'#FDEDEC', border:'#C0392B', color:'#C0392B'},
                    {k:'externa', icon:'🎓', label:'EXTERNA', desc:'Realizada por entidade externa', bg:'#F4ECF7', border:'#7D3C98', color:'#7D3C98'},
                  ].map(opt=>(
                    <div key={opt.k} onClick={()=>setForm(f=>{
                      const cats=trainCatsFor(company).filter(c=>c.type===opt.k);
                      return {...f,type:opt.k,category:cats.some(c=>c.id===f.category)?f.category:(cats[0]?.id||'')};
                    })}
                      style={{
                        padding:'16px',borderRadius:10,cursor:'pointer',
                        border:`2.5px solid ${form.type===opt.k?opt.border:'var(--border)'}`,
                        background:form.type===opt.k?opt.bg:'var(--card)',
                        transition:'all .15s',display:'flex',alignItems:'center',gap:12,
                        boxShadow:form.type===opt.k?`0 0 0 3px ${opt.border}22`:''
                      }}>
                      <span style={{fontSize:28}}>{opt.icon}</span>
                      <div style={{flex:1}}>
                        <div style={{fontWeight:900,fontSize:15,letterSpacing:'.5px',color:form.type===opt.k?opt.color:'var(--text)'}}>{opt.label}</div>
                        <div style={{fontSize:11,color:'var(--muted)',marginTop:3}}>{opt.desc}</div>
                      </div>
                      {form.type===opt.k&&<span style={{color:opt.color,fontSize:20,fontWeight:700}}>✓</span>}
                    </div>
                  ))}
                </div>
              </div>

              {/* campos principais */}
              <div className="fg">
                <div className="field" style={{gridColumn:'1/-1'}}>
                  <div className="fl">Nome da Formação <span style={{color:'var(--red)'}}>*</span></div>
                  <input className="fi" value={form.trainingName}
                    onChange={e=>setForm(f=>({...f,trainingName:e.target.value}))}
                    placeholder="Ex: Segurança, Higiene e Saúde no Trabalho 2026"/>
                </div>

                <div className="field" style={{gridColumn:'1/-1'}}>
                  <div className="fl">Categoria <span style={{color:'var(--red)'}}>*</span></div>
                  <select className="fi" value={form.category}
                    onChange={e=>setForm(f=>({...f,category:e.target.value}))}>
                    {trainCatsFor(company).filter(c=>c.type===form.type).map(c=>(
                      <option key={c.id} value={c.id}>{c.label}</option>
                    ))}
                  </select>
                </div>

                {form.type==='externa'&&(
                  <div className="field" style={{gridColumn:'1/-1'}}>
                    <div className="fl">Empresa / Entidade Formadora <span style={{color:'var(--red)'}}>*</span></div>
                    <input className="fi" value={form.entity}
                      onChange={e=>setForm(f=>({...f,entity:e.target.value}))}
                      placeholder="Ex: IEFP, Cegoc, ATCUD, EDP Formação..."/>
                  </div>
                )}

                <div className="field">
                  <div className="fl">Data de Início <span style={{color:'var(--red)'}}>*</span></div>
                  <input type="date" className="fi" value={form.startDate}
                    onChange={e=>setForm(f=>({...f,startDate:e.target.value}))}/>
                </div>
                <div className="field">
                  <div className="fl">Data de Conclusão</div>
                  <input type="date" className="fi" value={form.endDate}
                    onChange={e=>setForm(f=>({...f,endDate:e.target.value}))}/>
                </div>
                <div className="field">
                  <div className="fl">Carga Horária (h) <span style={{color:'var(--red)'}}>*</span></div>
                  <input type="number" className="fi" min="0.5" step="0.5" value={form.hours}
                    onChange={e=>setForm(f=>({...f,hours:e.target.value}))} placeholder="Ex: 8"/>
                </div>
                <div className="field">
                  <div className="fl">Com Certificado?</div>
                  <select className="fi" value={form.certified} onChange={e=>setForm(f=>({...f,certified:e.target.value}))}>
                    <option>Sim</option><option>Não</option>
                  </select>
                </div>
                <div className="field" style={{gridColumn:'1/-1'}}>
                  <div className="fl">Código da Formação</div>
                  <input className="fi" value={form.certNumber}
                    onChange={e=>setForm(f=>({...f,certNumber:e.target.value}))}
                    placeholder="Opcional"/>
                </div>
                <div className="field" style={{gridColumn:'1/-1'}}>
                  <div className="fl">Notas</div>
                  <input className="fi" value={form.notes}
                    onChange={e=>setForm(f=>({...f,notes:e.target.value}))}
                    placeholder="Observações adicionais"/>
                </div>
              </div>

              {/* colaboradores */}
              <div style={{marginTop:18,paddingTop:16,borderTop:'1px solid var(--border)'}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
                  <div className="fl" style={{marginBottom:0}}>
                    Colaboradores participantes
                    <span style={{color:'var(--muted)',fontWeight:400,marginLeft:6}}>({form.selectedEmps.length} selecionados)</span>
                  </div>
                  <button className="btn bp btn-sm" onClick={()=>{setEmpPickerSearch('');setShowEmpPicker(true);}}>
                    + Adicionar / Gerir colaboradores
                  </button>
                </div>
                {form.selectedEmps.length===0
                  ?<div style={{padding:'14px 16px',background:'var(--bg)',borderRadius:8,border:'1.5px dashed var(--border)',textAlign:'center',fontSize:13,color:'var(--muted)'}}>
                     Nenhum colaborador adicionado. Clique em <strong>"+ Adicionar / Gerir colaboradores"</strong>.
                   </div>
                  :<div style={{display:'flex',flexWrap:'wrap',gap:6}}>
                    {form.selectedEmps.map(key=>{
                      const [eId,eCo]=key.split('|');
                      const emp=employees.find(e=>e.id===eId&&e.company===eCo);
                      if(!emp) return null;
                      return(
                        <div key={key} style={{display:'flex',alignItems:'center',gap:6,background:'var(--bg)',border:'1px solid var(--border)',borderRadius:20,padding:'4px 10px 4px 6px',fontSize:12}}>
                          <div className="av" style={{background:COMP_COLORS[emp.company]||'#1a0d0d',width:22,height:22,fontSize:9,flexShrink:0}}>{initials(emp.name)}</div>
                          <span style={{fontWeight:600}}>{emp.name}</span>
                          <span style={{fontSize:10,color:'var(--muted)'}}>{emp.company}</span>
                          <button onClick={()=>setForm(f=>({...f,selectedEmps:f.selectedEmps.filter(k=>k!==key)}))}
                            style={{background:'none',border:'none',cursor:'pointer',color:'var(--red)',padding:0,marginLeft:2,fontSize:14,lineHeight:1}}>×</button>
                        </div>
                      );
                    })}
                  </div>
                }
              </div>
            </div>
            <div className="mf">
              <button className="btn bs" onClick={()=>setShowModal(false)}>Cancelar</button>
              <button className="btn bp" onClick={saveFormation}>
                {editingSession?'Guardar Alterações':'Criar Formação'}
              </button>
            </div>
          </div>
        </div>
      )}

      {/* modal picker: selecionar colaboradores */}
      {showEmpPicker&&(
        <div className="ov" style={{zIndex:1100}} onClick={e=>{if(e.target===e.currentTarget)setShowEmpPicker(false)}}>
          <div className="modal" style={{maxWidth:500,width:'95%'}}>
            <div className="mh">
              <div className="mh-t">Selecionar Colaboradores</div>
              <button className="btn bg" onClick={()=>setShowEmpPicker(false)}>✕</button>
            </div>
            <div className="mb">
              <input value={empPickerSearch}
                onChange={e=>setEmpPickerSearch(e.target.value)}
                placeholder="Pesquisar por nome ou n.º..."
                className="fi" style={{marginBottom:10}}/>
              <div style={{display:'flex',gap:6,marginBottom:10,alignItems:'center'}}>
                <button className="btn bs btn-sm" onClick={()=>setForm(f=>({...f,selectedEmps:emps.map(e=>e.id+'|'+e.company)}))}>Selecionar todos</button>
                <button className="btn bs btn-sm" onClick={()=>setForm(f=>({...f,selectedEmps:[]}))}>Limpar</button>
                <span style={{fontSize:11,color:'var(--muted)',marginLeft:'auto'}}>{form.selectedEmps.length}/{emps.length}</span>
              </div>
              <div style={{maxHeight:340,overflow:'auto',border:'1px solid var(--border)',borderRadius:8}}>
                {pickerEmps.length===0
                  ?<div style={{padding:24,textAlign:'center',color:'var(--muted)',fontSize:13}}>Sem resultados</div>
                  :pickerEmps.map((emp,i)=>{
                    const key=emp.id+'|'+emp.company;
                    const checked=form.selectedEmps.includes(key);
                    return(
                      <label key={key} style={{display:'flex',alignItems:'center',gap:10,padding:'9px 12px',borderTop:i>0?'1px solid var(--border)':'none',cursor:'pointer',background:checked?'rgba(26,82,118,.07)':'transparent',transition:'background .1s'}}>
                        <input type="checkbox" checked={checked}
                          onChange={e=>setForm(f=>({...f,selectedEmps:e.target.checked?[...f.selectedEmps,key]:f.selectedEmps.filter(k=>k!==key)}))}/>
                        <div className="av" style={{background:COMP_COLORS[emp.company]||'#1a0d0d',width:30,height:30,fontSize:11,flexShrink:0}}>{initials(emp.name)}</div>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{fontWeight:600,fontSize:13,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{emp.name}</div>
                          <div style={{fontSize:11,color:'var(--muted)'}}>N.º {emp.id||'—'}</div>
                        </div>
                        <span className="chip cgr" style={{fontSize:10,flexShrink:0}}>{emp.company}</span>
                      </label>
                    );
                  })
                }
              </div>
            </div>
            <div className="mf">
              <span style={{fontSize:12,color:'var(--muted)',marginRight:'auto'}}>{form.selectedEmps.length} selecionado(s)</span>
              <button className="btn bp" onClick={()=>setShowEmpPicker(false)}>Confirmar</button>
            </div>
          </div>
        </div>
      )}

    </div>
  );
}

const EPI_ITEMS = [
  {id:'capacete',  label:'Capacete',           icon:'⛑'},
  {id:'colete',    label:'Colete Refletor',     icon:'🦺'},
  {id:'botas',     label:'Botas de Segurança',  icon:'👢'},
  {id:'luvas',     label:'Luvas',               icon:'🧤'},
  {id:'oculos',    label:'Óculos de Proteção',  icon:'🥽'},
  {id:'auricular', label:'Proteção Auricular',  icon:'👂'},
  {id:'fato',      label:'Fato de Trabalho',    icon:'👔'},
];

function EpiTab({emp, readOnly, user, onAudit}) {
  const [epiData, setEpiData] = useState(null);
  const [adding, setAdding] = useState(null);
  const [form, setForm] = useState({date:'', notes:''});
  const [saving, setSaving] = useState(false);

  useEffect(() => {
    let active = true;
    loadEpi(emp.id, emp.company).then(d => { if(active) setEpiData(d||{}); });
    return () => { active = false; };
  }, [emp.id, emp.company]);

  async function addEntry(itemId) {
    if(!form.date) return;
    setSaving(true);
    const hist = epiData?.[itemId] || [];
    const entry = {date: form.date, notes: form.notes, by: user?.name || ''};
    const nd = {...epiData, [itemId]: [...hist, entry]};
    await saveEpiStore(emp.id, emp.company, nd);
    if(onAudit) onAudit(`EPI "${EPI_ITEMS.find(i=>i.id===itemId)?.label}" registado para ${emp.name} em ${form.date}`, 'update');
    setEpiData(nd);
    setAdding(null);
    setForm({date:'', notes:''});
    setSaving(false);
  }

  if(!epiData) return <div style={{padding:20,color:'var(--muted)',fontSize:13,textAlign:'center'}}>A carregar dados EPI...</div>;

  return (
    <div style={{display:'flex',flexDirection:'column',gap:10}}>
      {EPI_ITEMS.map(item => {
        const hist = (epiData[item.id]||[]).slice().sort((a,b)=>b.date.localeCompare(a.date));
        const last = hist[0];
        const days = last ? daysTo(last.date) : null;
        let stBg='#FDEDEC', stColor='#C0392B', stText='Não entregue';
        if(last) {
          if(days !== null && days < -365) { stBg='#FEF9E7'; stColor='#D68910'; stText='Há mais de 1 ano'; }
          else { stBg='#EAFAF1'; stColor='#1D6A39'; stText='Em dia'; }
        }
        return (
          <div key={item.id} className="card" style={{padding:'10px 14px'}}>
            <div style={{display:'flex',alignItems:'center',gap:8}}>
              <span style={{fontSize:18}}>{item.icon}</span>
              <span style={{fontWeight:700,fontSize:13,flex:1}}>{item.label}</span>
              <span style={{fontSize:11,fontWeight:600,padding:'2px 10px',borderRadius:20,background:stBg,color:stColor}}>{stText}</span>
              {!readOnly && (
                <button className="btn bs btn-sm" onClick={()=>{setAdding(adding===item.id?null:item.id);setForm({date:new Date().toISOString().split('T')[0],notes:''});}}>
                  {adding===item.id?'Cancelar':'+ Registar'}
                </button>
              )}
            </div>
            {last && (
              <div style={{fontSize:11,color:'var(--muted)',marginTop:4}}>
                Última entrega: <strong>{fmtDate(last.date)}</strong>{last.notes?` — ${last.notes}`:''}{last.by&&<span style={{color:'var(--muted)',marginLeft:4}}>por {last.by}</span>}
              </div>
            )}
            {hist.length > 1 && (
              <details style={{marginTop:4}}>
                <summary style={{cursor:'pointer',fontSize:11,color:'var(--blue)',fontWeight:600}}>Histórico ({hist.length} entregas)</summary>
                <div style={{paddingTop:5,display:'flex',flexDirection:'column',gap:3}}>
                  {hist.map((h,i)=>(
                    <div key={i} style={{fontSize:11,padding:'3px 0',borderBottom:'1px solid var(--border)'}}>
                      📅 {fmtDate(h.date)}{h.notes?` — ${h.notes}`:''}{h.by&&<span style={{color:'var(--muted)',marginLeft:4}}>por {h.by}</span>}
                    </div>
                  ))}
                </div>
              </details>
            )}
            {adding===item.id && (
              <div style={{marginTop:8,display:'flex',gap:8,alignItems:'flex-end',flexWrap:'wrap',background:'var(--bg)',padding:'8px 10px',borderRadius:8}}>
                <div className="field" style={{flex:'0 0 150px'}}>
                  <div className="fl">Data de Entrega</div>
                  <input type="date" className="fi" value={form.date} onChange={e=>setForm(p=>({...p,date:e.target.value}))}/>
                </div>
                <div className="field" style={{flex:'1 1 180px'}}>
                  <div className="fl">Notas (opcional)</div>
                  <input type="text" className="fi" placeholder="Tamanho, modelo…" value={form.notes} onChange={e=>setForm(p=>({...p,notes:e.target.value}))}/>
                </div>
                <button className="btn bp" disabled={!form.date||saving} onClick={()=>addEntry(item.id)}>Guardar</button>
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

function EpiScreen({data, company, onUpdate, readOnly, user, onAudit, onNav}) {
  const {employees=[]} = data;
  const [selEmp, setSelEmp] = useState(null);
  const [selRow, setSelRow] = useState(null);
  const [filterMissing, setFilterMissing] = useState(false);
  const [epiCache, setEpiCache] = useState({});
  const [epiLoading, setEpiLoading] = useState(true);
  const [showHidden,setShowHidden]=useState(false);
  const emps=useMemo(()=>{
    const base=filterEmps(employees, company);
    return (showHidden||company==='escritorio') ? base : base.filter(e=>!isHidden(e,'epi'));
  },[employees,company,showHidden]);
  const hiddenCount=useMemo(()=>filterEmps(employees, company).filter(e=>isHidden(e,'epi')).length,[employees,company]);
  function toggleHiddenIn(emp, mk){
    if(readOnly||!onUpdate)return;
    const cur=isHidden(emp, mk);
    const baseObj=(emp.hidden&&typeof emp.hidden==='object')?emp.hidden:{};
    const newHidden={...baseObj, [mk]:!cur};
    const ne=employees.map(e=>e.id===emp.id&&e.company===emp.company?{...e,hidden:newHidden}:e);
    onUpdate({...data,employees:ne});
    onAudit&&onAudit(`${!cur?'Ocultou':'Mostrou'} ${emp.name} no módulo ${mk.toUpperCase()}`, 'colaborador');
    setSelRow(s=>s?{...s,hidden:newHidden}:s);
  }

  useEffect(() => {
    let active = true;
    setEpiLoading(true);
    loadAllEpi().then(map => {
      if(active) { setEpiCache(map); setEpiLoading(false); }
    });
    return () => { active = false; };
  }, []);

  function getEpiData(emp) {
    return epiCache[emp.id+'|'+emp.company] || {};
  }

  function empEpiStatus(emp) {
    const d = getEpiData(emp);
    let missing=0, old=0, ok=0;
    EPI_ITEMS.forEach(item => {
      const hist = d[item.id]||[];
      if(!hist.length) { missing++; return; }
      const last = hist.sort((a,b)=>b.date.localeCompare(a.date))[0];
      const days = daysTo(last.date);
      if(days !== null && days < -365) old++;
      else ok++;
    });
    return {missing, old, ok, total:7};
  }

  const list = emps.map(e=>({...e, _epi:empEpiStatus(e)}))
    .filter(e => !filterMissing || e._epi.missing>0 || e._epi.old>0)
    .sort((a,b)=>b._epi.missing-a._epi.missing||b._epi.old-a._epi.old);

  return (
    <div>
      <div style={{display:'flex',gap:8,marginBottom:12,alignItems:'center',flexWrap:'wrap'}}>
        <span style={{fontWeight:700,fontSize:14}}>Controlo de EPIs</span>
        <label style={{display:'flex',alignItems:'center',gap:5,fontSize:12,cursor:'pointer',marginLeft:'auto'}}>
          <input type="checkbox" checked={filterMissing} onChange={e=>setFilterMissing(e.target.checked)}/>
          Mostrar apenas com itens em falta ou desactualizados
        </label>
        {hiddenCount>0&&company!=='escritorio'&&(
          <label className="show-hidden">
            <input type="checkbox" checked={showHidden} onChange={e=>setShowHidden(e.target.checked)}/>
            Mostrar ocultos
          </label>
        )}
      </div>

      {/* Legend */}
      {epiLoading&&<div style={{padding:'12px',color:'var(--muted)',fontSize:12}}>A carregar dados EPI...</div>}
      <div style={{display:'flex',gap:10,marginBottom:12,flexWrap:'wrap'}}>
        {[['#C0392B','Não entregue','#FDEDEC','#C0392B'],['#D68910','Há mais de 1 ano','#FEF9E7','#D68910'],['#1D6A39','Em dia','#EAFAF1','#1D6A39']].map(([dot,lb,bg,tc])=>(
          <div key={lb} style={{display:'flex',alignItems:'center',gap:5,background:bg,padding:'3px 10px',borderRadius:20,fontSize:11,fontWeight:600,color:tc}}><span style={{display:'inline-block',width:8,height:8,borderRadius:'50%',background:dot}}></span>{lb}</div>
        ))}
      </div>

      <div className="card" style={{overflow:'hidden'}}>
        <div style={{overflowX:'auto'}}>
          <table style={{width:'100%',borderCollapse:'collapse'}}>
            <thead>
              <tr>
                <th style={{background:'var(--bg)',padding:'8px 10px',textAlign:'left',fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'.5px',color:'var(--muted)',position:'sticky',top:0}}>Colaborador</th>
                <th style={{background:'var(--bg)',padding:'8px 10px',textAlign:'left',fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'.5px',color:'var(--muted)',position:'sticky',top:0}}>Empresa</th>
                {EPI_ITEMS.map(item=>(
                  <th key={item.id} style={{background:'var(--bg)',padding:'8px 6px',textAlign:'center',fontSize:11,fontWeight:700,color:'var(--muted)',position:'sticky',top:0,whiteSpace:'nowrap'}} title={item.label}>{item.icon}</th>
                ))}
                <th style={{background:'var(--bg)',padding:'8px 10px',textAlign:'center',fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'.5px',color:'var(--muted)',position:'sticky',top:0}}>Estado</th>
                <th style={{background:'var(--bg)',padding:'8px 10px',position:'sticky',top:0}}></th>
              </tr>
            </thead>
            <tbody>
              {list.map((emp,ri) => {
                const d = getEpiData(emp);
                return (
                  <tr key={emp.id+emp.company} className={`row-clickable ${isHidden(emp,'epi')?'row-hidden':''}`} style={{backgroundColor:ri%2===0?'white':'var(--bg)'}} onClick={()=>setSelRow(emp)} title="Clique para ver opções">
                    <td style={{padding:'8px 10px',fontWeight:600,fontSize:13}}>{emp.name}</td>
                    <td style={{padding:'8px 10px'}}><span className="chip cgr">{emp.company}</span></td>
                    {EPI_ITEMS.map(item => {
                      const hist = d[item.id]||[];
                      let bg='#FDEDEC',color='#C0392B',sym='✕';
                      if(hist.length) {
                        const last=hist.sort((a,b)=>b.date.localeCompare(a.date))[0];
                        const days=daysTo(last.date);
                        if(days!==null&&days<-365){bg='#FEF9E7';color='#D68910';sym='!';}
                        else{bg='#EAFAF1';color='#1D6A39';sym='✓';}
                      }
                      return (
                        <td key={item.id} style={{padding:'6px',textAlign:'center'}}>
                          <span style={{display:'inline-flex',alignItems:'center',justifyContent:'center',width:22,height:22,borderRadius:'50%',background:bg,color,fontWeight:700,fontSize:13}}>{sym}</span>
                        </td>
                      );
                    })}
                    <td style={{padding:'8px 10px',textAlign:'center'}}>
                      {emp._epi.missing>0 && <span className="chip cr" style={{marginRight:3}}>{emp._epi.missing} em falta</span>}
                      {emp._epi.old>0 && <span className="chip co">{emp._epi.old} desact.</span>}
                      {emp._epi.missing===0&&emp._epi.old===0 && <span className="chip cg">OK</span>}
                    </td>
                    <td style={{padding:'8px 10px'}}>
                      <button className="btn bs btn-sm" onClick={e=>{e.stopPropagation();setSelEmp(emp);}}>Ver</button>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>

      {/* Modal de acções (clique numa linha) */}
      {selRow && <RowActionsModal
        emp={selRow} moduleKey="epi" moduleLabel="EPIs"
        onClose={()=>setSelRow(null)}
        onUpdateField={()=>{}}
        onToggleHiddenIn={mk=>toggleHiddenIn(selRow, mk)}
        onGotoFicha={onNav?(emp=>onNav('employees',emp)):null}/>}

      {/* Modal "Gerir EPIs" — aberto via botão Ver */}
      {selEmp && (
        <div className="ov" onClick={e=>{if(e.target===e.currentTarget)setSelEmp(null)}}>
          <div className="modal" style={{maxWidth:820}}>
            <div className="mh">
              <div className="mh-t">EPIs — {selEmp.name} <span style={{fontSize:12,color:'var(--muted)',fontWeight:400}}>· {selEmp.company}</span></div>
              <button className="btn bg" onClick={()=>setSelEmp(null)}>✕</button>
            </div>
            <div className="mb">
              <EpiTab emp={selEmp} readOnly={readOnly} user={user} onAudit={onAudit}/>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}
