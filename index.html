// CSRF, divisão, versão de segurança e data version partilhados via window
// — preciso de aceder a estes fora da árvore React (event listeners globais).
window.__sec = window.__sec || {csrf:'', securityVersion:0, division:'login', dataVersion:0};

async function apiCall(action, payload = {}){
  const headers = {'Content-Type':'application/json'};
  if(window.__sec.csrf) headers['X-CSRF-Token'] = window.__sec.csrf;
  const res = await fetch(API_URL, {
    method: 'POST',
    headers,
    body: JSON.stringify({action, csrf: window.__sec.csrf || undefined, ...payload}),
    credentials: 'include',
  });
  if(!res.ok) throw new Error(`HTTP ${res.status}`);
  const out = await res.json();
  if(!out.ok){
    // Sessão revogada ou CSRF inválido — recarrega para forçar novo login.
    if(/sess(a|ã)o foi terminada|Token de seguranca/i.test(out.error||'')){
      window.__sec.csrf=''; window.__sec.securityVersion=0;
      setTimeout(()=>location.reload(), 100);
    }
    throw new Error(out.error || 'Erro na API');
  }
  return out.data;
}

async function loadData(){
  try{
    const d = await apiCall('get_data');
    window.__sec.dataVersion = d?.__dataVersion__ ?? 0;
    return d;
  }catch(e){
    return null;
  }
}

async function saveData(data, user){
  try{
    const result = await apiCall('save_data', {
      data: {
        ...data,
        lastSaved: new Date().toISOString(),
        lastSavedBy: user?.name||'Sistema'
      },
      baseVersion: window.__sec.dataVersion ?? 0
    });
    if(result?.newVersion) window.__sec.dataVersion = result.newVersion;
    return result;
  }catch(e){
    // Outro utilizador gravou entretanto — alerta e recarrega.
    if(/CONFLITO_VERSAO/i.test(e.message||'')){
      alert('⚠️ As suas últimas alterações NÃO foram guardadas.\n\nOutro utilizador alterou os dados desde que abriste esta sessão.\n\nA página vai recarregar com a versão actual — repete a tua alteração por cima dos dados actualizados.');
      setTimeout(()=>location.reload(), 100);
      return;
    }
    console.error('Erro ao guardar dados:', e);
  }
}

const DOC_TYPES=[
  {id:'cc',label:'Cartão Cidadão / BI'},
  {id:'nif',label:'Documento NIF'},
  {id:'iban',label:'Comprovativo IBAN'},
  {id:'morada',label:'Declaração de Morada'},
  {id:'carta',label:'Carta de Condução'},
  {id:'cam',label:'Certificado CAM/CQC'},
  {id:'tac',label:'Cartão Condutor Tac.'},
  {id:'contrato',label:'Contrato'},
  {id:'baixa',label:'Baixa por Doença'},
  {id:'acidente',label:'Acidente de Trabalho'},
  {id:'formcert',label:'Certificado Formação'},
  {id:'recibo',label:'Recibo de Vencimento'},
  {id:'rend',label:'Declaração Rendimentos'},
  {id:'sef',label:'Declaração SEF/Porto'},
  {id:'outro',label:'Outro'},
];
function DocsTab({empId, empCompany, empName, readOnly, user, onAudit}) {
  const [docs, setDocs]       = useState([]);
  const [dtype, setDtype]     = useState('cc');
  const [dnote, setDnote]     = useState('');
  const [viewDoc, setViewDoc] = useState(null);
  const [uploading, setUploading] = useState(false);
  const fref = useRef();

  useEffect(() => {
    let active = true;
    loadDocs(empId, empCompany).then(d => { if (active) setDocs(d); });
    return () => { active = false; };
  }, [empId, empCompany]);

  async function save(d) {
    setDocs(d);
    await saveDocs(empId, empCompany, d);
  }

  async function upload(file) {
    if (!file) return;
    setUploading(true);
    try {
      const dataUrl = await new Promise((resolve, reject) => {
        const r = new FileReader();
        r.onload  = e => resolve(e.target.result);
        r.onerror = reject;
        r.readAsDataURL(file);
      });
      const docId  = Date.now().toString();
      const result = await uploadDoc(empId, empCompany, docId, file.name, file.type, dataUrl);
      const doc = {
        id:    docId,
        type:  dtype,
        label: DOC_TYPES.find(d => d.id === dtype)?.label || dtype,
        icon:  DOC_TYPES.find(d => d.id === dtype)?.label || dtype,
        note:  dnote,
        name:  file.name,
        date:  new Date().toISOString().split('T')[0],
        size:  file.size,
        mime:  file.type,
        path:  result.path,
      };
      await save([...docs, doc]);
      onAudit && onAudit(`Adicionou documento "${doc.label}" a ${empName}`, 'doc');
      setDnote('');
    } catch (e) {
      alert('Erro ao carregar ficheiro: ' + (e.message || 'Tente novamente.'));
    } finally {
      setUploading(false);
      if (fref.current) fref.current.value = '';
    }
  }

  async function del(id) {
    if (!confirm('Tem a certeza que quer eliminar este documento?')) return;
    const doc = docs.find(d => d.id === id);
    if (doc?.path) await deleteDoc(doc.path);
    await save(docs.filter(d => d.id !== id));
    onAudit && onAudit(`Eliminou documento de ${empName}`, 'doc');
  }

  // Documentos antigos têm base64 inline; novos têm path no disco.
  function docSrc(doc) {
    if (doc.path) return `${API_URL}?action=serve_doc&path=${encodeURIComponent(doc.path)}`;
    return doc.data || '';
  }

  function download(doc) {
    const a = document.createElement('a');
    a.href = docSrc(doc);
    a.download = doc.name;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  }

  function print(doc) {
    const url = docSrc(doc);
    const w = window.open('', '_blank');
    if (!w) return;
    if (doc.mime?.includes('image')) {
      w.document.write(`<html><body style="margin:0"><img src="${url}" style="max-width:100%"/></body></html>`);
    } else {
      w.document.write(`<html><body><embed src="${url}" width="100%" height="600" type="${doc.mime}"/></body></html>`);
    }
    w.document.close();
    setTimeout(() => w.print(), 800);
  }

  return (
    <div>
      {!readOnly && (
        <div className="container-filter">
          <div className="field" style={{flex:'1',minWidth:'150px'}}>
            <div className="fl">Tipo de Documento</div>
            <select className="fi" value={dtype} onChange={e => setDtype(e.target.value)}>
              {DOC_TYPES.map(t => <option key={t.id} value={t.id}>{t.icon} {t.label}</option>)}
            </select>
          </div>
          <div className="field" style={{flex:'2',minWidth:'180px'}}>
            <div className="fl">Nota</div>
            <input className="fi" value={dnote} onChange={e => setDnote(e.target.value)} placeholder="ex: Válido até ..., Jan 2026"/>
          </div>
          <button className="btn bp" onClick={() => fref.current?.click()} disabled={uploading}>
            {uploading ? 'A carregar...' : 'Adicionar Documento'}
          </button>
          <input ref={fref} type="file" style={{display:'none'}} accept=".pdf,.jpg,.jpeg,.png,.doc,.docx" onChange={e => upload(e.target.files[0])}/>
        </div>
      )}

      {docs.length === 0
        ? <div className="empty"><div>Sem documentos adicionados</div></div>
        : <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(150px,1fr))',gap:'8px'}}>
            {docs.map(doc => (
              <div key={doc.id} className="container-doc-item" onMouseOver={e => e.currentTarget.style.borderColor='var(--red)'} onMouseOut={e => e.currentTarget.style.borderColor='var(--border)'}>
                
                <div style={{fontWeight:600,fontSize:11}}>{doc.label}</div>
                {doc.note && <div style={{fontSize:10,color:'var(--muted)',marginTop:2}}>{doc.note}</div>}
                <div style={{fontSize:10,color:'var(--muted)'}}>{fmtDate(doc.date)}</div>
                <div style={{display:'flex',justifyContent:'center',gap:3,marginTop:7}}>
                  <button className="btn bs btn-sm" title="Visualizar" onClick={() => { setViewDoc(doc); onAudit && onAudit(`Visualizou documento "${doc.label}" de ${empName}`, 'doc'); }}>Ver</button>
                  <button className="btn bs btn-sm" title="Download" onClick={() => download(doc)}>Download</button>
                  <button className="btn bs btn-sm" title="Imprimir" onClick={() => print(doc)}>Imprimir</button>
                  {!readOnly && <button className="btn bg btn-sm" style={{color:'var(--red)'}} title="Eliminar" onClick={() => del(doc.id)}>Elim.</button>}
                </div>
              </div>
            ))}
          </div>
      }

      {/* Visualizador de documento */}
      {viewDoc && (
        <div className="ov" onClick={e => { if (e.target === e.currentTarget) setViewDoc(null); }}>
          <div className="modal" style={{maxWidth:'90vw',width:'auto'}}>
            <div className="mh">
              <div className="mh-t">{viewDoc.label} — {empName}</div>
              <div style={{display:'flex',gap:6,alignItems:'center'}}>
                <button className="btn bs btn-sm" onClick={() => download(viewDoc)}>Download</button>
                <button className="btn bs btn-sm" onClick={() => print(viewDoc)}>Imprimir</button>
                <button className="btn bg" onClick={() => setViewDoc(null)}>✕</button>
              </div>
            </div>
            <div style={{padding:16,overflow:'auto',flex:1,display:'flex',alignItems:'center',justifyContent:'center',minHeight:400,minWidth:500}}>
              {viewDoc.mime?.includes('image')
                ? <img src={docSrc(viewDoc)} style={{maxWidth:'100%',maxHeight:'65vh'}} alt={viewDoc.label}/>
                : viewDoc.mime?.includes('pdf')
                  ? <embed src={docSrc(viewDoc)} type="application/pdf" width="700px" height="580px"/>
                  : <div style={{textAlign:'center',color:'var(--muted)'}}>
                      
                      <div>{viewDoc.name}</div>
                      <button className="btn bp" style={{marginTop:12}} onClick={() => download(viewDoc)}>Download</button>
                    </div>
              }
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

const EmpFormCtx=React.createContext(null);
function SI({k,label,type='text',opts=null,span=false,ph=''}){
  const {form,set,readOnly}=React.useContext(EmpFormCtx);
  const val=form[k]||'';
  const style=span?{gridColumn:'1/-1'}:{};
  return(
    <div className="field" style={style}>
      <div className="fl">{label}</div>
      {opts?<select className="fi" value={val} onChange={e=>set(k,e.target.value)} disabled={readOnly}>
        {opts.map(o=><option key={o}>{o}</option>)}
      </select>:
      <input type={type} className="fi" value={val} onChange={e=>set(k,e.target.value)} readOnly={readOnly} placeholder={ph}/>}
    </div>
  );
}

function AusenciasTab({emp,absences,readOnly,user,onSaveAbsence,onDelAbsence,onAudit}){
  const myAbs=useMemo(()=>
    (absences||[]).filter(a=>a.empId===emp.id&&a.empCompany===emp.company)
      .sort((a,b)=>(b.startDate||'').localeCompare(a.startDate||'')),
  [absences,emp]);

  const [showModal,setShowModal]=useState(false);
  const [form,setForm]=useState({type:'Baixa Médica',startDate:'',endDate:'',reason:'',notes:'',indefinite:false});

  function calcDays(s,e){
    if(!s||!e) return null;
    const d=Math.round((new Date(e)-new Date(s))/86400000)+1;
    return d>0?d:null;
  }

  const totalDays=myAbs.reduce((s,a)=>s+(calcDays(a.startDate,a.endDate)||0),0);

  return(
    <div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
        <div>
          <div className="sec-t" style={{marginBottom:2}}>Histórico de Ausências</div>
          {myAbs.length>0&&<div style={{fontSize:11,color:'var(--muted)'}}>{myAbs.length} registo(s) · {totalDays} dias no total</div>}
        </div>
        {!readOnly&&<button className="btn bp btn-sm" onClick={()=>{setForm({type:'Baixa Médica',startDate:'',endDate:'',reason:'',notes:'',indefinite:false});setShowModal(true);}}>+ Registar</button>}
      </div>
      {myAbs.length===0?<div className="empty">Sem ausências registadas</div>:
      myAbs.map(ab=>{
        const days=calcDays(ab.startDate,ab.endDate);
        const indef=ab.indefinite;
        const ongoing=!ab.endDate;
        return(
          <div key={ab.id} className="eval-item">
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
              <span style={{fontWeight:700,color:ongoing?'var(--orange)':'var(--text)',fontSize:13}}>{ab.type}{indef?' — por tempo indeterminado':ongoing?' — em curso':''}</span>
              <div style={{display:'flex',gap:6,alignItems:'center'}}>
                {days&&<span style={{fontSize:11,background:'var(--grbg)',color:'var(--green)',borderRadius:4,padding:'2px 7px',fontWeight:600}}>{days}d</span>}
                {!readOnly&&<button className="btn bg btn-sm" style={{color:'var(--red)'}} onClick={()=>{
                  onDelAbsence(ab.id);
                  onAudit&&onAudit(`Eliminou registo de ausência de ${emp.name}: ${ab.type} (${ab.startDate})`,'colaborador');
                }}>Elim.</button>}
              </div>
            </div>
            <div style={{fontSize:11,color:'var(--muted)',margin:'3px 0'}}>
              {fmtDate(ab.startDate)}{ab.endDate?` → ${fmtDate(ab.endDate)}`:indef?' → por tempo indeterminado':' → (em curso)'}
              {' · Por: '}{ab.by||'RH'}
            </div>
            {ab.reason&&<div style={{fontSize:12}}>{ab.reason}</div>}
            {ab.notes&&<div style={{fontSize:12,color:'var(--muted)',marginTop:2}}>{ab.notes}</div>}
          </div>
        );
      })}
      {showModal&&(
        <div className="ov" onClick={e=>{if(e.target===e.currentTarget)setShowModal(false);}}>
          <div className="modal" style={{maxWidth:480}}>
            <div className="mh">
              <div className="mh-t">Registar Ausência — {emp.name}</div>
              <button className="btn bg" onClick={()=>setShowModal(false)}>✕</button>
            </div>

            <div className="mb">
              <div className="fg">
                <div className="field"><div className="fl">Tipo</div>
                  <select className="fi" value={form.type} onChange={e=>setForm(f=>({...f,type:e.target.value}))}>
                    {['Baixa Médica','Acidente de Trabalho','Baixa sem Vencimento','Licença de Maternidade/Paternidade','Ausência Injustificada','Outro'].map(t=><option key={t}>{t}</option>)}
                  </select>
                </div>

                <div className="field">
                  <div className="fl">Data Início</div>
                  <input type="date" className="fi" value={form.startDate} onChange={e=>setForm(f=>({...f,startDate:e.target.value}))}/>
                </div>

                <div className="field">
                  <div className="fl">Data Fim</div>
                  <input type="date" className="fi" value={form.indefinite?'':form.endDate} disabled={form.indefinite} onChange={e=>setForm(f=>({...f,endDate:e.target.value}))}/>
                  <label style={{display:'flex',alignItems:'center',gap:6,fontSize:11,color:'var(--muted)',cursor:'pointer',marginTop:5}}>
                    <input type="checkbox" checked={form.indefinite} onChange={e=>setForm(f=>({...f,indefinite:e.target.checked,endDate:e.target.checked?'':f.endDate}))}/>
                    Por tempo indeterminado
                  </label>
                </div>

                <div className="field" style={{gridColumn:'1/-1'}}>
                  <div className="fl">Motivo</div>
                  <input className="fi" value={form.reason} onChange={e=>setForm(f=>({...f,reason:e.target.value}))} placeholder="Motivo da ausência..."/>
                </div>

                <div className="field" style={{gridColumn:'1/-1'}}>
                  <div className="fl">Notas</div>
                  <textarea className="fi" rows={2} style={{resize:'vertical'}} value={form.notes} onChange={e=>setForm(f=>({...f,notes:e.target.value}))}/>
                </div>
              </div>
            </div>

            <div className="mf">
              <button className="btn bs" onClick={()=>setShowModal(false)}>Cancelar</button>
              <button className="btn bp" onClick={()=>{
                if(!form.startDate){alert('A data de início é obrigatória.');return;}
                onSaveAbsence({
                  ...form,
                  id:Date.now().toString(),
                  empId:emp.id, empCompany:emp.company, empName:emp.name,
                  days:calcDays(form.startDate,form.endDate),
                  by:user?.name||'RH',
                  createdAt:new Date().toISOString()
                });
                onAudit&&onAudit(`Registou ausência de ${emp.name}: ${form.type} (${form.startDate})`,'colaborador');
                setShowModal(false);
              }}>Guardar</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function EmpDetail({emp,onEdit,onDeactivate,onReturn,onClose,readOnly,isInactive,user,evals,onSaveEval,onDelEval,absences,onSaveAbsence,onDelAbsence,onAudit}){
  const [tab,setTab]=useState('info');
  const [showEvalModal,setShowEvalModal]=useState(false);
  const [ef,setEf]=useState({type:'',date:new Date().toISOString().split('T')[0],notes:'',nextAction:'',nextDate:''});
  const [empPdfHtml,setEmpPdfHtml]=React.useState(null);
  const [showShare,setShowShare]=React.useState(false);
  const [copied,setCopied]=React.useState(false);
  const myEvals=evals.filter(e=>e.empId===emp.id&&e.empCompany===emp.company).sort((a,b)=>b.date.localeCompare(a.date));
  const nm=nextMed(emp);
  const nd=nextDiut(emp);

  useEffect(()=>{
    if(!showShare) return;
    const close=(e)=>{ setShowShare(false); };
    // setTimeout para que o click que abre o popover não o feche logo de seguida.
    const t = setTimeout(()=>document.addEventListener('click',close,{once:true}),0);
    return()=>{ clearTimeout(t); document.removeEventListener('click',close); };
  },[showShare]);

  const _empCMETA = {
    'Roupeta':      {name:'Transportes Roupeta',    color:'#C0392B', logo:'roupeta'},
    'Roupeta II':   {name:'Transportes Roupeta II', color:'#1A5276', logo:'roupeta'},
    'Arlize':       {name:'Arlize Transportes',     color:'#1A85C2', logo:'arlize'},
    'Pit Evolution':{name:'Pit Evolution',           color:'#4B5320', logo:'pit'},
  };
  const _ecm = _empCMETA[emp.company] || _empCMETA['Roupeta'];
  const _eAccent = _ecm.color;

  function empPdfCSS(){
    return `*{box-sizing:border-box;margin:0;padding:0;}body{font-family:Arial,Helvetica,sans-serif;font-size:11px;color:#2c2c2c;background:#fff;}.ph{display:flex;align-items:center;gap:16px;border-bottom:3px solid ${_eAccent};padding-bottom:12px;margin-bottom:16px;}.ph img{height:38px;}.phi h1{font-size:15px;font-weight:800;color:#1a0d0d;margin-bottom:2px;}.phi p{font-size:10px;color:#888;}.st{font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:#1a0d0d;border-left:3px solid ${_eAccent};padding-left:8px;margin:14px 0 6px;}.tbl{width:100%;border-collapse:collapse;margin-bottom:4px;}.tbl td{padding:4px 8px;border-bottom:1px solid #f0f0f0;vertical-align:top;font-size:11px;}.tbl td.lbl{font-weight:700;color:#888;font-size:10px;width:145px;white-space:nowrap;}.badge{border-radius:8px;padding:1px 7px;font-size:9.5px;font-weight:700;display:inline-block;}.bv{background:#fdecea;color:#c0392b;}.bc{background:#fff3e0;color:#e67e22;}.ba{background:#fffde7;color:#b7950b;}.bo{background:#eafaf1;color:#1d8348;}.ft{font-size:9px;color:#bbb;text-align:center;margin-top:20px;border-top:1px solid #eee;padding-top:8px;}@media print{@page{margin:15mm 12mm;size:A4 portrait;}}`;
  }


  function buildEmpPdf(){
    const baseUrl=window.location.href.replace(/\/[^\/]*(\?.*)?$/,'/');
    const lUrl=baseUrl+'css/assets/Logo-header.svg';
    const todayFmt=new Date().toLocaleDateString('pt-PT',{day:'2-digit',month:'long',year:'numeric'});
    function dr(lbl,val){return `<tr><td class="lbl">${lbl}</td><td>${val||'&mdash;'}</td></tr>`;}
    function eb(date){
      const d=date?daysTo(date):null;
      if(d===null||d===undefined)return '';
      if(d<0)return ' <span class="badge bv">Vencido</span>';
      if(d<=60)return ` <span class="badge bc">${d}d &mdash; Urgente</span>`;
      if(d<=120)return ` <span class="badge ba">${d}d &mdash; Aten\u00e7\u00e3o</span>`;
      return ` <span class="badge bo">${d}d</span>`;
    }
    const empLogo = compLogoHtml(_ecm, _eAccent, lUrl);
    const bodyHtml = `<div class="ph">${empLogo}
      <div class="phi"><h1>${emp.name||''}</h1>
        <p>${emp.role||''} &middot; ${emp.company||''} &middot; N.&ordm; ${emp.id||''}</p>
        <p>Gerado em ${todayFmt}</p></div></div>
      <div class="st">Dados Pessoais</div>
      <table class="tbl">
        ${dr('Data de Nascimento',fmtDate(emp.birthDate))}
        ${dr('Idade',ageOf(emp.birthDate)?ageOf(emp.birthDate)+' anos':'')}
        ${dr('Naturalidade',emp.birthplace)}
        ${dr('Nacionalidade',emp.nationality)}
        ${dr('Estado Civil',emp.maritalStatus)}
        ${dr('Habilita\u00e7\u00f5es',emp.education)}
        ${dr('Morada',emp.address)}
        ${dr('Telefone Pessoal',emp.personalPhone)}
        ${dr('Telefone Empresa',emp.companyPhone)}
        ${dr('E-mail',emp.email)}
      </table>
      <div class="st">Dados Profissionais</div>
      <table class="tbl">
        ${dr('Data Admiss\u00e3o',fmtDate(emp.admissionDate))}
        ${emp.endDate?dr('Data de Sa\u00edda',fmtDate(emp.endDate)):''}
        ${emp.status==='inactive'?dr('Iniciativa de Sa\u00edda',emp.exitInitiative||'\u2014'):''}
        ${emp.status==='inactive'?dr('Motivo de Sa\u00edda',emp.exitReason||'\u2014'):''}
        ${(emp.status==='inactive'&&emp.exitNotes)?dr('Obs. Sa\u00edda',emp.exitNotes):''}
        ${emp.readmissionDate?dr('Data de Retorno',fmtDate(emp.readmissionDate)):''}
        ${dr('Tipo Contrato',emp.contractType||emp.contractEndDate)}
        ${dr('Estado Contrato',emp.contractStatus)}
        ${dr('NIF',emp.nif)}
        ${dr('NISS',emp.niss)}
        ${dr('IBAN',emp.iban)}
        ${dr('Ordenado Base',(()=>{const s=emp.baseSalary;const n=parseFloat(s);return (s&&!isNaN(n)&&!String(s).startsWith('='))?n.toFixed(2)+'&euro;':'';})())}
        ${dr('Titular IRS',(()=>{const v=emp.incomeHolder;return (v!==undefined&&v!==''&&!String(v).startsWith('='))?v+'\u00a0titular(es)':'\u2014';})())}
        ${dr('Dependentes',(()=>{const v=emp.dependents;return (v!==undefined&&v!==''&&!String(v).startsWith('='))?String(v):'0';})())}
        ${dr('N.&ordm; Diuturnidades',String(calcDiut(emp)))}
        ${emp.status!=='inactive'?dr('Pr&oacute;x. Diuturnidade',fmtDate(nd)+eb(nd)):''}
      </table>
      <div class="st">Documentos</div>
      <table class="tbl">
        ${dr('N.&ordm; CC',emp.ccNumber)}
        ${dr('Validade CC',fmtDate(emp.ccExpiry)+eb(emp.ccExpiry))}
        ${dr('Carta de Condu\u00e7\u00e3o',emp.driverLicense)}
        ${dr('Validade Carta',fmtDate(emp.driverLicenseExpiry)+eb(emp.driverLicenseExpiry))}
        ${dr('Validade CAM/CQC',fmtDate(emp.camExpiry)+eb(emp.camExpiry))}
        ${dr('Cart\u00e3o Tac\u00f3grafo',fmtDate(emp.tachographCardExpiry)+eb(emp.tachographCardExpiry))}
        ${dr('Validade ADR',fmtDate(emp.adrExpiry)+eb(emp.adrExpiry))}
        ${dr('Validade SEF',fmtDate(emp.sefExpiry)+eb(emp.sefExpiry))}
      </table>
      <div class="st">Sa\u00fade e Vigil\u00e2ncia</div>
      <table class="tbl">
        ${dr('\u00daltima Consulta M\u00e9d.',fmtDate(emp.lastMedicalConsult))}
        ${dr('Pr\u00f3x. Consulta',fmtDate(nm)+eb(nm))}
        ${dr('Periodicidade',ageOf(emp.birthDate)>=50?'Anual (\u226550 anos)':'Bienal (&lt;50 anos)')}
      </table>
      <div class="ft">Ficha de colaborador &mdash; ${emp.name} &mdash; Gerado em ${todayFmt} &mdash; ${_ecm.name} &mdash; RH Manager</div>`;
    return `<!DOCTYPE html><html><head><meta charset="utf-8"><style>${empPdfCSS()}</style></head><body>${bodyHtml}</body></html>`;
  }

  function buildShareText(){
    const today=new Date().toLocaleDateString('pt-PT');
    return `Ficha de Colaborador — ${emp.name}\nEmpresa: ${emp.company}\nFun\u00e7\u00e3o: ${emp.role||'—'}\nEstado: ${emp.contractStatus||'—'}\nAdmiss\u00e3o: ${fmtDate(emp.admissionDate)}\nNIF: ${emp.nif||'—'}\nTelefone: ${emp.companyPhone||emp.personalPhone||'—'}\n\nGerado em ${today} via RH Manager`;
  }

  function FV({label,val,expiry=false}){
    const cls=expiry?expClass(daysTo(val)):'';
    return<div className="field"><div className="fl">{label}</div><div className={`fv ${cls}`}>{expiry?fmtDate(val):val||'—'}</div></div>;
  }

  if(empPdfHtml!==null){
    return(
      <div style={{position:'fixed',top:0,left:0,width:'100%',height:'100%',zIndex:9999,background:'white',overflowY:'auto'}}>
        <style dangerouslySetInnerHTML={{__html:`@media print{.rh-noprint{display:none!important;}}`}}/>
        <div className="rh-noprint" style={{position:'sticky',top:0,zIndex:10,background:'white',borderBottom:'3px solid '+_eAccent,padding:'10px 20px',display:'flex',alignItems:'center',justifyContent:'space-between',boxShadow:'0 2px 8px rgba(0,0,0,.12)'}}>
          <span style={{fontWeight:800,fontSize:14,color:'#1a0d0d'}}>Ficha de Colaborador — {emp.name}</span>
          <div style={{display:'flex',gap:10,alignItems:'center'}}>
            <button onClick={()=>window.print()}
              style={{display:'flex',alignItems:'center',gap:8,background:`linear-gradient(135deg,${_eAccent} 0%,${_eAccent}cc 100%)`,color:'white',border:'none',padding:'9px 22px',borderRadius:8,fontWeight:700,fontSize:13,cursor:'pointer',boxShadow:`0 3px 12px ${_eAccent}55`,letterSpacing:'.3px',transition:'filter .15s'}} onMouseOver={e=>e.currentTarget.style.filter='brightness(1.12)'} onMouseOut={e=>e.currentTarget.style.filter='none'}>
              Transferir PDF

            <button onClick={()=>generateAndSharePdf(empPdfHtml,'Ficha — '+emp.name,'share').catch(()=>{})}

              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.3" strokeLinecap="round" strokeLinejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
              Partilhar
            </button>
            <button onClick={()=>{setEmpPdfHtml(null);setShowShare(false);}}
              style={{display:'flex',alignItems:'center',gap:6,background:'white',border:'1.5px solid #ddd',padding:'9px 18px',borderRadius:8,fontWeight:600,fontSize:13,cursor:'pointer',color:'#555',transition:'border-color .15s,color .15s'}} onMouseOver={e=>{e.currentTarget.style.borderColor='#999';e.currentTarget.style.color='#222';}} onMouseOut={e=>{e.currentTarget.style.borderColor='#ddd';e.currentTarget.style.color='#555';}}>
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
              Fechar
            </button>
          </div>
        </div>
        <div className="container-modal-content">
          <style dangerouslySetInnerHTML={{__html:empPdfCSS()}}/>
          <div dangerouslySetInnerHTML={{__html:empPdfHtml}}/>
        </div>
      </div>
    );
  }

  return(
    <div style={{display:'flex',flexDirection:'column',height:'100%'}}>
      <div style={{display:'flex',alignItems:'center',gap:'12px',marginBottom:'12px',flexShrink:0}}>
        <div className="av" style={{width:50,height:50,background:COMP_COLORS[emp.company]||'#1a0d0d',fontSize:18}}>{initials(emp.name)}</div>
        <div style={{flex:1}}>
          <div style={{fontWeight:700,fontSize:17}}>{emp.name}</div>
          <div style={{fontSize:12,color:'var(--muted)'}}>{emp.role} · {emp.company} · #{emp.id}</div>
          <div style={{display:'flex',gap:5,marginTop:3,flexWrap:'wrap'}}>
            <Chip label={emp.contractStatus} type={emp.contractStatus==='Ativo'?'green':emp.contractStatus?.includes('baixa')?'orange':'gr'}/>

        <div style={{display:'flex',gap:6,flexShrink:0,flexWrap:'wrap',justifyContent:'flex-end'}}>
          {onEdit&&<button className="btn bs btn-sm" onClick={onEdit}>Editar</button>}

          {onReturn&&<button className="btn btn-sm" style={{background:'var(--green)',color:'#fff',borderColor:'var(--green)'}} onClick={onReturn}>Retomar à Empresa</button>}
          <button title="Exportar ficha em PDF" onClick={()=>setEmpPdfHtml(buildEmpPdf())} style={{display:'flex',alignItems:'center',background:'transparent',border:'none',padding:0,cursor:'pointer',transition:'opacity .15s'}} onMouseOver={e=>e.currentTarget.style.opacity='.75'} onMouseOut={e=>e.currentTarget.style.opacity='1'}>

          <FV label="Data Nascimento" val={fmtDate(emp.birthDate)}/><FV label="Idade" val={ageOf(emp.birthDate)?ageOf(emp.birthDate)+' anos':''}/>
          <FV label="Naturalidade" val={emp.birthplace}/><FV label="Nacionalidade" val={emp.nationality}/>
          <FV label="Estado Civil" val={emp.maritalStatus}/><FV label="Habilitações" val={emp.education}/>
          <FV label="N.º CC" val={emp.ccNumber}/>
          <div className="field"><div className="fl">Validade CC</div><div className={`fv ${expClass(daysTo(emp.ccExpiry))}`}>{fmtDate(emp.ccExpiry)} <ExpiryChip date={emp.ccExpiry}/></div></div>
          <FV label="NIF" val={emp.nif}/><FV label="NISS" val={emp.niss}/>
          <FV label="Titular IRS" val={(()=>{const v=emp.incomeHolder;return (v!==undefined&&v!==''&&!String(v).startsWith('='))?v:'—';})()}/><FV label="Dependentes" val={(()=>{const v=emp.dependents;return (v!==undefined&&v!==''&&!String(v).startsWith('='))?String(v):'0';})()}/>
          <FV label="IBAN" val={emp.iban}/><FV label="Ordenado Base" val={(()=>{const s=emp.baseSalary;const n=parseFloat(s);return (s&&!isNaN(n)&&!String(s).startsWith('='))?n.toFixed(2)+'€':'';})()}/>  
          <div className="field" style={{gridColumn:'1/-1'}}><div className="fl">Morada</div><div className="fv">{emp.address||'—'}</div></div>
          <FV label="Telefone Pessoal" val={emp.personalPhone}/><FV label="Telefone Empresa" val={emp.companyPhone}/>
          <div className="field" style={{gridColumn:'1/-1'}}><div className="fl">E-mail</div><div className="fv">{emp.email||'—'}</div></div>
          <hr className="divider" style={{gridColumn:'1/-1'}}/>
          <div style={{gridColumn:'1/-1',fontWeight:600,fontSize:11,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'.5px'}}>Documentos Profissionais</div>
          <FV label="Carta de Condução" val={emp.driverLicense}/>
          <div className="field"><div className="fl">Validade Carta</div><div className={`fv ${expClass(daysTo(emp.driverLicenseExpiry))}`}>{fmtDate(emp.driverLicenseExpiry)} <ExpiryChip date={emp.driverLicenseExpiry}/></div></div>
          <div className="field"><div className="fl">Validade CAM/CQC</div><div className={`fv ${expClass(daysTo(emp.camExpiry))}`}>{fmtDate(emp.camExpiry)} <ExpiryChip date={emp.camExpiry}/></div></div>
          <div className="field"><div className="fl">Cartão Condutor Tac.</div><div className={`fv ${expClass(daysTo(emp.tachographCardExpiry))}`}>{fmtDate(emp.tachographCardExpiry)} <ExpiryChip date={emp.tachographCardExpiry}/></div></div>
          <div className="field"><div className="fl">Validade ADR</div><div className={`fv ${expClass(daysTo(emp.adrExpiry))}`}>{fmtDate(emp.adrExpiry)} <ExpiryChip date={emp.adrExpiry}/></div></div>
        </div>}
        {tab==='docs'&&<DocsTab empId={emp.id} empCompany={emp.company} empName={emp.name} readOnly={readOnly} user={user} onAudit={onAudit}/>}
        {tab==='medical'&&<div className="fg">
          <FV label="Última Consulta" val={fmtDate(emp.lastMedicalConsult)}/>
          <div className="field"><div className="fl">Próxima Consulta</div><div className={`fv ${expClass(daysTo(nm))}`}>{fmtDate(nm)} <ExpiryChip date={nm}/></div></div>
          <FV label="Periodicidade" val={ageOf(emp.birthDate)>=50?'Anual (≥50 anos)':'Bienal (<50 anos)'}/>
          <FV label="Dias Restantes" val={nm?(daysTo(nm)+'d'):'—'}/>
          <div className="field" style={{gridColumn:'1/-1'}}><div className="fl">Notas</div><div className="fv">{emp.medicalNotes||'—'}</div></div>
        </div>}
        {tab==='sef'&&<div className="fg">

          <FV label="Dias Restantes" val={emp.sefExpiry?daysTo(emp.sefExpiry)+'d':'—'}/>

          <div style={{gridColumn:'1/-1',background:'var(--blbg)',borderRadius:7,padding:'10px 12px',fontSize:'12px',color:'var(--blue)'}}>Validade de 1 ano. Alerta activado com 60 dias de antecedência.</div>
        </div>}
        {tab==='training'&&<div>
          <div className="fg" style={{marginBottom:14}}>
            <div className="field"><div className="fl">SHT (Seg. Hig. Trabalho)</div><div className="fv">{emp.training?.sht||'—'}</div></div>
            <div className="field"><div className="fl">Tacógrafos</div><div className="fv">{emp.training?.tacografo||'—'}</div></div>
            <div className="field"><div className="fl">Formação Interna</div><div className="fv">{emp.training?.interna||'—'}</div></div>
          </div>
          <div style={{background:'var(--grbg)',borderRadius:7,padding:'10px 12px',fontSize:'12px',color:'var(--green)'}}>Para certificados de formação, use o separador "Docs".</div>
        </div>}
        {tab==='diut'&&<div className="fg">
          <FV label="N.º Diuturnidades Actuais" val={String(calcDiut(emp))}/>
          <FV label="Data Admissão" val={fmtDate(emp.admissionDate)}/>
          <div className="field"><div className="fl">Próxima Diuturnidade</div><div className={`fv ${expClass(daysTo(nd))}`}>{fmtDate(nd)} <ExpiryChip date={nd}/></div></div>
          <FV label="Faltam" val={nd?daysTo(nd)+'d':'—'}/>
          <div style={{gridColumn:'1/-1',background:'var(--orbg)',borderRadius:7,padding:'10px 12px',fontSize:'12px',color:'var(--orange)'}}>Alerta activado antes do dia 15 do mês anterior ao vencimento. Ciclos de 3 anos.</div>
        </div>}
        {tab==='epi'&&<EpiTab emp={emp} readOnly={readOnly} user={user} onAudit={onAudit}/>}
        {tab==='farda'&&<FardaTab emp={emp} readOnly={readOnly} user={user} onAudit={onAudit}/>}
        {tab==='ausencias'&&<AusenciasTab emp={emp} absences={absences} readOnly={readOnly} user={user} onSaveAbsence={onSaveAbsence} onDelAbsence={onDelAbsence} onAudit={onAudit}/>}
        {tab==='evals'&&<div>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
            <div className="sec-t" style={{marginBottom:0}}>Registos de Avaliação e Conversas</div>
            {!readOnly&&<button className="btn bp btn-sm" onClick={()=>setShowEvalModal(true)}>+ Nova Entrada</button>}
          </div>
          {myEvals.length===0?<div className="empty">Sem registos</div>:
          myEvals.map(ev=>(
            <div key={ev.id} className="eval-item">
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                <span style={{fontWeight:700,color:'var(--blue)',fontSize:13}}>{ev.type}</span>
                {!readOnly&&<button className="btn bg btn-sm" style={{color:'var(--red)'}} onClick={()=>onDelEval(ev.id)}>Elim.</button>}
              </div>
              <div style={{fontSize:11,color:'var(--muted)',margin:'2px 0'}}>{fmtDate(ev.date)} · Registado por: {ev.by||'RH'}</div>
              <div style={{fontSize:13}}>{ev.notes}</div>
              {ev.nextAction&&<div style={{marginTop:5,fontSize:12,color:'var(--blue)',background:'var(--blbg)',borderRadius:5,padding:'4px 8px'}}>→ Acção: {ev.nextAction}{ev.nextDate?` (${fmtDate(ev.nextDate)})`:''}</div>}
            </div>
          ))}
          {showEvalModal&&(
            <div className="ov" onClick={e=>{if(e.target===e.currentTarget)setShowEvalModal(false)}}>
              <div className="modal" style={{maxWidth:520}}>
                <div className="mh"><div className="mh-t">Nova Entrada — {emp.name}</div><button className="btn bg" onClick={()=>setShowEvalModal(false)}>✕</button></div>
                <div className="mb">
                  <div className="fg">
                    <div className="field"><div className="fl">Tipo</div>
                      <select className="fi" value={ef.type} onChange={e=>setEf(f=>({...f,type:e.target.value}))}>
                        <option value="">Seleccionar...</option>
                        {['Avaliação 1.º mês','Avaliação trimestral','Conversa de desempenho','Sensibilização comportamental','Advertência verbal','Advertência escrita','Elogio','Registo de ocorrência','Outra'].map(t=><option key={t}>{t}</option>)}
                      </select>
                    </div>
                    <div className="field"><div className="fl">Data</div><input type="date" className="fi" value={ef.date} onChange={e=>setEf(f=>({...f,date:e.target.value}))}/></div>
                    <div className="field" style={{gridColumn:'1/-1'}}><div className="fl">Notas / Conteúdo</div><textarea className="fi" rows={4} style={{resize:'vertical'}} value={ef.notes} onChange={e=>setEf(f=>({...f,notes:e.target.value}))}/></div>
                    <div className="field"><div className="fl">Acção seguinte</div><input className="fi" value={ef.nextAction} onChange={e=>setEf(f=>({...f,nextAction:e.target.value}))}/></div>
                    <div className="field"><div className="fl">Data da acção</div><input type="date" className="fi" value={ef.nextDate} onChange={e=>setEf(f=>({...f,nextDate:e.target.value}))}/></div>
                  </div>
                </div>
                <div className="mf">
                  <button className="btn bs" onClick={()=>setShowEvalModal(false)}>Cancelar</button>
                  <button className="btn bp" onClick={()=>{
                    if(!ef.type||!ef.notes){alert('Tipo e Notas são obrigatórios.');return;}
                    onSaveEval({...ef,empId:emp.id,empCompany:emp.company,id:Date.now().toString(),by:user?.name||'RH'});
                    onAudit&&onAudit(`Registou avaliação "${ef.type}" para ${emp.name}`, 'avaliacao');
                    setShowEvalModal(false);
                    setEf({type:'',date:new Date().toISOString().split('T')[0],notes:'',nextAction:'',nextDate:''});
                  }}>Guardar</button>
                </div>
              </div>
            </div>
          )}
        </div>}
      </div>
    </div>
  );
}

function EmpScreen({data,company,onUpdate,readOnly,user,onAudit,evals,onSaveEval,onDelEval,absences,onSaveAbsence,onDelAbsence,initSel}){
  const {employees=[],inactive=[]}=data;
  const [search,setSearch]=useState('');
  const [sf,setSf]=useState('all');
  const [sel,setSel]=useState(initSel||null);
  const [showForm,setShowForm]=useState(false);
  const [editEmp,setEditEmp]=useState(null);
  const [archive,setArchive]=useState(initSel?.goToArchive||false);
  const [exitModal,setExitModal]=useState(null);
  const [returnModal,setReturnModal]=useState(null);
  const detailRef=useRef(null);

  useEffect(()=>{
    if(!sel) return;
    if(detailRef.current) detailRef.current.scrollTop=0;
    document.querySelector('.content')?.scrollTo({top:0,behavior:'instant'});
  },[sel?.id,sel?.company]);

  const compMap={'roupeta':'Roupeta','roupeta2':'Roupeta II','arlize':'Arlize','pit':'Pit Evolution'};
  const todayStr=new Date().toISOString().split('T')[0];
  // Ausente = ausência sem data de fim ou cuja data de fim ainda não chegou.
  const isAbsent=e=>(absences||[]).some(a=>a.empId===e.id&&a.empCompany===e.company&&(a.indefinite||!a.endDate||a.endDate>=todayStr));
  const filtered=useMemo(()=>{
    let l=filterEmps(archive?inactive:employees, company);
    if(sf==='ausencia') l=l.filter(isAbsent);
    else if(sf!=='all') l=l.filter(e=>e.contractStatus?.toLowerCase().includes(sf));
    if(search){const s=search.toLowerCase();l=l.filter(e=>e.name?.toLowerCase().includes(s)||e.id?.includes(s)||e.nif?.includes(s));}
    return l;
  },[employees,inactive,company,search,sf,archive,absences]);

  function handleSave(f){
    let ne=[...employees],ni=[...inactive];
    if(f.status==='inactive'){
      const i=ni.findIndex(e=>e.id===f.id&&e.company===f.company);
      if(i>=0) ni[i]=f; else ni.push(f);
    } else {
      const i=ne.findIndex(e=>e.id===f.id&&e.company===f.company);
      if(i>=0) ne[i]=f; else ne.push({...f,status:'active'});
    }
    onAudit(`${editEmp?.id==='new'?'Criou colaborador':'Editou colaborador'} ${f.name}`, 'colaborador');
    onUpdate({...data,employees:ne,inactive:ni});
    setShowForm(false); setEditEmp(null); setSel(f);
  }

  function confirmDeactivate(emp, exitData){
    const deactivated={...emp, status:'inactive', contractStatus:'Inativo',
      exitDate:exitData.exitDate, exitReason:exitData.exitReason,
      exitInitiative:exitData.exitInitiative, exitNotes:exitData.exitNotes||''};
    onUpdate({...data,
      employees:employees.filter(e=>!(e.id===emp.id&&e.company===emp.company)),
      inactive:[deactivated,...inactive]
    });
    onAudit(`Desativou colaborador ${emp.name} — ${exitData.exitReason||'motivo não especificado'} (iniciativa: ${exitData.exitInitiative})`, 'colaborador');
    setExitModal(null); setSel(null);
  }

  function confirmReturn(emp, returnData){
    const reactivated={...emp, status:'active', contractStatus:'Ativo',
      baseSalary:returnData.baseSalary||emp.baseSalary,
      iban:returnData.iban||emp.iban,
      admissionDate:returnData.readmissionDate,
      readmissionDate:returnData.readmissionDate,
      driverLicenseExpiry:returnData.driverLicenseExpiry||emp.driverLicenseExpiry,
      contractEndDate:returnData.contractEndDate||emp.contractEndDate,
      exitDate:null, exitReason:null, exitInitiative:null, exitNotes:null
    };
    onUpdate({...data,
      employees:[...employees, reactivated],
      inactive:inactive.filter(e=>!(e.id===emp.id&&e.company===emp.company))
    });
    onAudit(`Reintegrou colaborador ${emp.name} (readmissão em ${returnData.readmissionDate})`, 'colaborador');
    setReturnModal(null); setSel(reactivated); setArchive(false);
  }

  const isMobile=useMobile();
  return(
    <div className={`emp-layout${(isMobile&&sel)?" emp-detail-open":""}`}>
      <div className="card emp-list">
        <div style={{padding:'10px',borderBottom:'1px solid var(--border)'}}>
          <div style={{display:'flex',gap:6,marginBottom:7}}>
            <button className={`btn btn-sm ${!archive?'bp':'bs'}`} onClick={()=>{setArchive(false);setSel(null);}}>Activos ({employees.length})</button>
            <button className={`btn btn-sm ${archive?'bp':'bs'}`} onClick={()=>{setArchive(true);setSel(null);}}>Inativos ({inactive.length})</button>
            {!readOnly&&!archive&&<button className="btn bp btn-sm" style={{marginLeft:'auto'}} onClick={()=>{setEditEmp({id:'new'});setShowForm(true);}}>+</button>}
          </div>
          <input className="fi" style={{marginBottom:6}} placeholder="Nome, NIF, n.º..." value={search} onChange={e=>setSearch(e.target.value)}/>
          <div style={{display:'flex',gap:4,flexWrap:'wrap'}}>
            {[['all','Todos'],['ativo','Ativo'],['ausencia','Ausências'],['seguro','Seguro'],['férias','Férias']].map(([s,lbl])=>(
              <button key={s} className={`btn btn-sm ${sf===s?'bp':'bs'}`} style={{padding:'2px 7px',fontSize:'10px'}} onClick={()=>setSf(s)}>{lbl}</button>
            ))}
          </div>
        </div>
        <div className="list-body">
          {filtered.length===0?<div className="empty" style={{padding:24}}>Sem resultados</div>:
          filtered.map(emp=>(
            <div key={emp.id+emp.company} className={`li ${sel?.id===emp.id&&sel?.company===emp.company?'sel':''}`} onClick={()=>{setSel(emp);onAudit&&onAudit(`Consultou ficha de ${emp.name}`, 'consulta');}}>
              <div className="av" style={{background:COMP_COLORS[emp.company]||'#1a0d0d',fontSize:12}}>{initials(emp.name)}</div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontWeight:600,fontSize:13,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{emp.name}</div>
                <div style={{fontSize:11,color:'var(--muted)'}}>{emp.company} · #{emp.id}</div>
              </div>
              {archive
                ? <span className="chip cgr" style={{fontSize:10}}>Inativo</span>
                : (emp.contractStatus&&emp.contractStatus!=='Ativo'&&emp.contractStatus!=='ativo')
                  ? <span className={`chip ${emp.contractStatus?.includes('baixa')?'co':'cgr'}`} style={{fontSize:10}}>{emp.contractStatus}</span>
                  : null
              }
            </div>
          ))}
        </div>
      </div>
      <div ref={detailRef} className="card" style={{padding:16,overflow:'auto'}}>
        {!sel?<div className="empty" style={{paddingTop:70}}>Seleccione um colaborador</div>:
        <>{isMobile&&<button className="btn bs btn-sm" style={{marginBottom:8,display:'flex',alignItems:'center',gap:4}} onClick={()=>setSel(null)}>← Voltar</button>}
        <EmpDetail emp={sel} readOnly={readOnly} isInactive={archive} user={user} evals={evals} onSaveEval={onSaveEval} onDelEval={onDelEval} absences={absences} onSaveAbsence={onSaveAbsence} onDelAbsence={onDelAbsence} onAudit={onAudit}
          onEdit={!readOnly?()=>{setEditEmp(sel);setShowForm(true);}:null}
          onDeactivate={!readOnly&&!archive?()=>setExitModal(sel):null}
          onReturn={!readOnly&&archive?()=>setReturnModal(sel):null}
          onClose={()=>setSel(null)}/></>}
      </div>
      {showForm&&editEmp&&<EmpModal emp={editEmp} onSave={handleSave} onClose={()=>{setShowForm(false);setEditEmp(null);}} readOnly={false}/>}
      {exitModal&&<ExitModal emp={exitModal} onConfirm={confirmDeactivate} onClose={()=>setExitModal(null)}/>}
      {returnModal&&<ReturnModal emp={returnModal} onConfirm={confirmReturn} onClose={()=>setReturnModal(null)}/>}
    </div>
  );
}

function Dashboard({data,company,ferias,feriasConfig,onNav}){
  const {employees=[],inactive=[]}=data;
  const cm={'roupeta':'Roupeta','roupeta2':'Roupeta II','arlize':'Arlize','pit':'Pit Evolution'};
  const emps=filterEmps(employees, company);
  const cy=new Date().getFullYear();
  const alerts=useMemo(()=>{
    const sef=[],med=[],diut=[],cc=[],adr=[],cartas=[];
    emps.forEach(emp=>{
      const sd=daysTo(emp.sefExpiry); if(sd!==null&&sd<=60) sef.push({...emp,days:sd});
      const nm=nextMed(emp),md=daysTo(nm); if(md!==null&&md<=60) med.push({...emp,days:md,nextDate:nm});
      const nd=nextDiut(emp),dd=daysTo(nd); if(dd!==null&&dd>=0&&dd<=45) diut.push({...emp,days:dd,nextDate:nd});
      const cd=daysTo(emp.ccExpiry); if(cd!==null&&cd<=60) cc.push({...emp,days:cd});
      const ad=daysTo(emp.adrExpiry); if(ad!==null&&ad<=60) adr.push({...emp,days:ad});
      if(isDriver(emp)){
        const checks=[
          {field:'driverLicenseExpiry', label:'Carta', d:daysTo(emp.driverLicenseExpiry)},
          {field:'camExpiry',           label:'CAM',   d:daysTo(emp.camExpiry)},
          {field:'tachographCardExpiry',label:'Tac.',  d:daysTo(emp.tachographCardExpiry)},
        ].filter(c=>c.d!==null);
        if(checks.length){
          const m=checks.reduce((a,b)=>a.d<b.d?a:b);
          if(m.d<=90) cartas.push({...emp,days:m.d,docType:m.label,nextDate:emp[m.field]});
        }
      }
    });
    return {sef,med,diut,cc,adr,cartas};
  },[emps]);
  const feriasStats=useMemo(()=>{
    const yr=cy;
    function usedDays(empId,empCo){return(ferias||[]).filter(f=>f.empId===empId&&f.empCompany===empCo&&Number(f.year)===yr).reduce((s,f)=>s+(f.days||0),0);}
    function getCfg(empId,empCo){return(feriasConfig||[]).find(c=>c.empId===empId&&c.empCompany===empCo&&Number(c.year)===yr)||{estado:'Por Fechar'};}
    const list=emps.map(e=>({...e,used:usedDays(e.id,e.company),cfg:getCfg(e.id,e.company)}));
    const porFechar=list.filter(e=>e.cfg.estado!=='Fechado');
    const semGozar=list.filter(e=>e.used===0);
    const recentes=list.filter(e=>e.used>0).sort((a,b)=>b.used-a.used).slice(0,5);
    return {porFechar,semGozar,recentes,total:list.length};
  },[emps,ferias,feriasConfig,cy]);
  const stats={total:emps.length,ativo:emps.filter(e=>e.contractStatus==='Ativo').length,baixa:emps.filter(e=>e.contractStatus?.toLowerCase().includes('baixa')).length,seguro:emps.filter(e=>e.contractStatus?.toLowerCase().includes('seguro')).length,motoristas:emps.filter(e=>e.role?.toLowerCase().includes('mot')).length};
  const totalAlerts=alerts.sef.length+alerts.med.length+alerts.diut.length+alerts.cc.length+alerts.adr.length+alerts.cartas.length;
  const byComp=Object.entries({'Roupeta':0,'Roupeta II':0,'Arlize':0,'Pit Evolution':0}).map(([n,_])=>({n,c:employees.filter(e=>e.company===n).length}));
  return(
    <div>
      <div style={{display:'grid',gridTemplateColumns:company==='all'?'1fr 1fr':'1fr',gap:16,marginBottom:24,alignItems:'start'}}>
        <div>
          <div style={{fontSize:'11px',fontWeight:700,textTransform:'uppercase',letterSpacing:'.8px',color:'var(--muted)',marginBottom:'10px',paddingBottom:'6px',borderBottom:'1px solid var(--border)'}}>Visão Geral</div>
          <div className="stats" style={{marginBottom:0}}>
            <div className="stat" style={{cursor:'pointer'}} onClick={()=>onNav('employees')}><div className="stat-n">{stats.total}</div><div className="stat-l">Colaboradores</div><div className="stat-s">{stats.motoristas} motoristas</div></div>
            {stats.baixa>0&&<div className="stat"><div className="stat-n" style={{color:'var(--orange)'}}>{stats.baixa}</div><div className="stat-l">De baixa</div></div>}
            {stats.seguro>0&&<div className="stat"><div className="stat-n" style={{color:'var(--blue)'}}>{stats.seguro}</div><div className="stat-l">De seguro</div></div>}
            <div className="stat" style={{borderColor:totalAlerts>0?'var(--red)':''}}><div className="stat-n" style={{color:'var(--red)'}}>{totalAlerts}</div><div className="stat-l">Alertas</div><div className="stat-s">Requerem atenção</div></div>
          </div>
        </div>
        {company==='all'&&<div>
          <div style={{fontSize:'11px',fontWeight:700,textTransform:'uppercase',letterSpacing:'.8px',color:'var(--muted)',marginBottom:'10px',paddingBottom:'6px',borderBottom:'1px solid var(--border)'}}>Por Empresa</div>
          <div className="stats" style={{marginBottom:0}}>
            {byComp.map(b=><div key={b.n} className="stat" style={{borderLeft:`3px solid ${COMP_COLORS[b.n]||'#999'}`}}><div className="stat-n" style={{color:COMP_COLORS[b.n]||'#999'}}>{b.c}</div><div className="stat-l">{b.n}</div></div>)}
          </div>
        </div>}
      </div>
      <div className="ag">
        {[
          {title:'SEF / Declarações Porto',items:alerts.sef,color:'var(--orbg)',tc:'var(--orange)',field:'sefExpiry',screen:'sef'},
          {title:'Medicina do Trabalho',items:alerts.med,color:'var(--blbg)',tc:'var(--blue)',field:'nextDate',screen:'medicina'},
          {title:'Diuturnidades — Mês seguinte',items:alerts.diut,color:'var(--grbg)',tc:'var(--green)',field:'nextDate',screen:'diuturnidades'},
          {title:'Cartas de Condução (Carta · CAM · Tac.)',items:alerts.cartas,color:'#fef3c7',tc:'#92400e',field:'nextDate',screen:'cartas',showDocType:true},
          {title:'Cartão de Cidadão',items:alerts.cc,color:'var(--red-l)',tc:'var(--red)',field:'ccExpiry',screen:'employees'},
          {title:'ADR — Mercadorias Perigosas',items:alerts.adr,color:'#f5eef8',tc:'#7D3C98',field:'adrExpiry',screen:'cartas'},
        ].map(({title,items,color,tc,field,screen,showDocType})=>{
          const MAX=4;
          const sorted=items.slice().sort((a,b)=>a.days-b.days);
          const visible=sorted.slice(0,MAX);
          const hidden=sorted.length-MAX;
          return(
          <div key={title} className="ac" style={{cursor:'pointer'}} onClick={()=>onNav(screen)}>
            <div className="ac-h" style={{background:color,color:tc,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <span>{title} ({items.length})</span>
              <span style={{fontSize:10,fontWeight:400,opacity:.7}}>clique para gerir →</span>
            </div>
            <div className="ac-list">
              {visible.length===0?<div style={{padding:'12px',color:'var(--muted)',fontSize:12,textAlign:'center'}}>Sem alertas</div>:
              visible.map(emp=>(
                <div className="ac-item" key={emp.id+emp.company} onClick={e=>{e.stopPropagation();onNav(screen,{...emp,_highlight:true});}}>
                  <span style={{display:'inline-block',width:8,height:8,borderRadius:'50%',background:emp.days<0?'var(--red)':emp.days<=30?'var(--orange)':'var(--green)',flexShrink:0}}></span>
                  <span style={{flex:1,fontWeight:500}}>{emp.name}</span>
                  {showDocType&&emp.docType&&<span style={{fontSize:10,fontWeight:700,color:tc,background:color,padding:'1px 6px',borderRadius:8}}>{emp.docType}</span>}
                  <span style={{color:'var(--muted)',fontSize:11}}>{emp.days===0?'Hoje':emp.days+'d'}</span>
                  <ExpiryChip date={emp[field]}/>
                </div>
              ))}
              {hidden>0&&(
                <div style={{padding:'6px 14px',fontSize:11,color:tc,fontWeight:600,textAlign:'center',background:color,borderTop:'1px solid var(--border)'}}>
                  + {hidden} mais — ver todos →
                </div>
              )}
            </div>
          </div>
          );
        })}
        {/* Painel Aniversários */}
        {(()=>{const bdays=emps.map(e=>({...e,daysLeft:daysToBirthday(e.birthDate)})).filter(e=>e.daysLeft!==null&&e.daysLeft<=30).sort((a,b)=>a.daysLeft-b.daysLeft);return(
          <div className="ac" style={{cursor:'pointer'}} onClick={()=>onNav('aniversarios')}>
            <div className="ac-h" style={{background:'#fff3e0',color:'#e67e22',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <span style={{display:'flex',alignItems:'center',gap:6}}><img src="css/assets/bolo.png" alt="" style={{height:20,width:'auto'}}/>Aniversários — 30 dias ({bdays.length})</span>
              <span style={{fontSize:10,fontWeight:400,opacity:.7}}>ver todos →</span>
            </div>
            <div className="ac-list">
              {bdays.length===0
                ?<div style={{padding:'12px',color:'var(--muted)',fontSize:12,textAlign:'center'}}>Sem aniversários nos próximos 30 dias</div>
                :bdays.slice(0,6).map(emp=>(
                  <div className="ac-item" key={emp.id+emp.company}>
                    <span style={{display:'inline-block',width:8,height:8,borderRadius:'50%',background:emp.daysLeft===0?'#E74C3C':emp.daysLeft<=7?'#E67E22':'#27AE60',flexShrink:0}}></span>
                    <span style={{flex:1,fontWeight:500}}>{emp.name}</span>
                    <span style={{color:'var(--muted)',fontSize:11,whiteSpace:'nowrap'}}>{emp.daysLeft===0?'Hoje!':emp.daysLeft===1?'Amanhã':emp.daysLeft+'d'}</span>
                  </div>
                ))
              }
              {bdays.length>6&&<div style={{padding:'4px 14px',fontSize:11,color:'var(--muted)',textAlign:'right'}}>+{bdays.length-6} mais...</div>}
            </div>
          </div>
        );})()}
        {/* Painel Férias */}
        <div className="ac" style={{cursor:'pointer'}} onClick={()=>onNav('ferias')}>
          <div className="ac-h" style={{background:'#f0faf4',color:'var(--green)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <span>Férias {cy}</span>
            <span style={{fontSize:10,fontWeight:400,opacity:.7}}>clique para gerir →</span>
          </div>
          <div className="ac-list">
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:0}}>
              <div style={{padding:'10px 14px',borderRight:'1px solid var(--border)'}}>

                <div style={{fontSize:11,color:'var(--muted)'}}>Por Fechar</div>
              </div>
              <div style={{padding:'10px 14px'}}>
                <div style={{fontSize:22,fontWeight:800,color:'var(--green)'}}>{feriasStats.total-feriasStats.porFechar.length}</div>
                <div style={{fontSize:11,color:'var(--muted)'}}>Fechados</div>
              </div>
            </div>
            <div style={{borderTop:'1px solid var(--border)',padding:'6px 0'}}>
              {feriasStats.semGozar.length>0&&<div style={{padding:'4px 14px',fontSize:12,color:'var(--muted)'}}>
                <span style={{fontWeight:600,color:'var(--orange)'}}>{feriasStats.semGozar.length}</span> ainda sem dias gozados
              </div>}
              {feriasStats.recentes.slice(0,3).map(e=>(
                <div key={e.id+e.company} style={{padding:'4px 14px',display:'flex',justifyContent:'space-between',fontSize:12}}>
                  <span style={{fontWeight:500,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',flex:1}}>{e.name}</span>
                  <span style={{color:'var(--green)',fontWeight:700,marginLeft:8}}>{e.used}d</span>
                </div>
              ))}
              {feriasStats.recentes.length===0&&<div style={{padding:'8px 14px',color:'var(--muted)',fontSize:12,textAlign:'center'}}>Sem dias registados em {cy}</div>}
            </div>
          </div>
        </div>
      </div>
      {data.lastSavedBy&&<div style={{fontSize:11,color:'var(--muted)',textAlign:'right',marginTop:4}}>Última actualização: {data.lastSavedBy} em {new Date(data.lastSaved).toLocaleString('pt-PT')}</div>}
    </div>
  );
}

const COMP_META={
  roupeta:  {label:'Roupeta',      color:'#C0392B', bg:'#fdecea'},
  roupeta2: {label:'Roupeta II',   color:'#2E86C1', bg:'#e8f4fc'},
  arlize:   {label:'Arlize',       color:'#1D6A39', bg:'#e6f4ec'},
  pit:      {label:'Pit Evolution', color:'#7D3C98', bg:'#f3e8fb'},
};
const CO_KEY={'Roupeta':'roupeta','Roupeta II':'roupeta2','Arlize':'arlize','Pit Evolution':'pit'};
const DIREITO_DIAS=22;

function FeriasScreen({data,ferias,feriasConfig,onSaveFerias,onSaveConfig,readOnly,user,onAudit,company,initSel,onNav}){
  const year=new Date().getFullYear();
  const CO_MAP={'all':'all','roupeta':'Roupeta','roupeta2':'Roupeta II','arlize':'Arlize','pit':'Pit Evolution'};
  const [search,setSearch]=React.useState('');
  const [selEmp,setSelEmp]=React.useState(initSel||null);
  const [showModal,setShowModal]=React.useState(false);
  const [editEntry,setEditEntry]=React.useState(null);
  const [form,setForm]=React.useState({startDate:'',endDate:'',notes:''});
  const [formErr,setFormErr]=React.useState('');
  const [cfgForm,setCfgForm]=React.useState({diasDireitoSubsidio:22,estado:'Por Fechar',observacoes:''});
  const [cfgDirty,setCfgDirty]=React.useState(false);
  const [feriaPdfHtml,setFeriaPdfHtml]=React.useState(null);
  const [showFeriasShare,setShowFeriasShare]=React.useState(false);
  React.useEffect(()=>{
    if(!showFeriasShare)return;
    const t=setTimeout(()=>document.addEventListener('click',()=>setShowFeriasShare(false),{once:true}),0);
    return()=>clearTimeout(t);
  },[showFeriasShare]);

  const {employees:allEmps=[],inactive:inactiveEmps=[]}=data||{};
  const employees=allEmps.filter(e=>e.status!=='inactive');
  const COMP_ORDER=['Roupeta','Roupeta II','Arlize','Pit Evolution'];

  function countDays(s,e){
    if(!s||!e)return 0;
    const d1=new Date(s),d2=new Date(e);
    if(d2<d1)return 0;
    let count=0;
    const cur=new Date(d1);
    while(cur<=d2){
      const dow=cur.getDay();
      if(dow!==0&&dow!==6)count++;
      cur.setDate(cur.getDate()+1);
    }
    return count;
  }
  function empPeriods(empId,empCo){
    return(ferias||[]).filter(f=>f.empId===empId&&f.empCompany===empCo&&Number(f.year)===year);
  }
  function getConfig(empId,empCo){
    return(feriasConfig||[]).find(c=>c.empId===empId&&c.empCompany===empCo&&Number(c.year)===year)||
      {empId,empCompany:empCo,year,diasDireitoSubsidio:22,estado:'Por Fechar',observacoes:''};
  }
  function usedDays(empId,empCo){
    return empPeriods(empId,empCo).reduce((s,f)=>s+(f.days||0),0);
  }

  const enriched=React.useMemo(()=>employees.map(e=>{
    const cfg=getConfig(e.id,e.company);
    const used=usedDays(e.id,e.company);
    const key=CO_KEY[e.company]||'roupeta';
    return{...e,used,disponivel:DIREITO_DIAS-used,config:cfg,meta:COMP_META[key]||{label:e.company,color:'#555',bg:'#eee'}};
  }),[employees,ferias,feriasConfig,year]);

  React.useEffect(()=>{
    if(selEmp){
      const cfg=getConfig(selEmp.id,selEmp.company);
      setCfgForm({...cfg});
      setCfgDirty(false);
    }
  },[selEmp?.id,selEmp?.company,year]);

  function filterList(list){
    return list.filter(e=>{
      const coName=CO_MAP[company]||'all';
      const coOk=coName==='all'||e.company===coName;
      const s=search.trim().toLowerCase();
      return coOk&&(!s||e.name?.toLowerCase().includes(s));
    });
  }

  async function handleSavePeriod(e){
    e.preventDefault();
    if(!form.startDate||!form.endDate){setFormErr('Indique início e fim.');return;}
    if(new Date(form.endDate)<new Date(form.startDate)){setFormErr('Fim anterior ao início.');return;}
    const days=countDays(form.startDate,form.endDate);
    const entry={...form,days,year:new Date(form.startDate).getFullYear(),
      empId:selEmp.id,empCompany:selEmp.company,empName:selEmp.name,
      id:editEntry?.id||Date.now().toString(),
      createdBy:editEntry?.createdBy||(user?.name||'RH'),
      createdAt:editEntry?.createdAt||new Date().toISOString()};
    const updated=editEntry?(ferias||[]).map(f=>f.id===editEntry.id?entry:f):[...(ferias||[]),entry];
    await onSaveFerias(updated);
    onAudit&&onAudit(`${editEntry?'Editou':'Registou'} férias de ${selEmp.name} (${form.startDate}→${form.endDate})`,'ferias');
    setShowModal(false);setEditEntry(null);
  }
  async function handleDelete(id){
    if(!window.confirm('Eliminar este período?'))return;
    await onSaveFerias((ferias||[]).filter(f=>f.id!==id));
    onAudit&&onAudit(`Eliminou período de férias de ${selEmp.name}`,'ferias');
  }
  async function handleSaveConfig(){
    if(!selEmp)return;
    const empId=selEmp.id,empCo=selEmp.company;
    const updated=(feriasConfig||[]).filter(c=>!(c.empId===empId&&c.empCompany===empCo&&Number(c.year)===year));
    updated.push({...cfgForm,empId,empCompany:empCo,year});
    await onSaveConfig(updated);
    onAudit&&onAudit(`Actualizou configuração de férias de ${selEmp.name||empId}`,'ferias');
    setCfgDirty(false);
  }
  function setCfgField(k,v){setCfgForm(x=>({...x,[k]:v}));setCfgDirty(true);}

  function IndiceView(){
    const filtered=filterList(enriched);
    const byComp={};
    COMP_ORDER.forEach(co=>{const l=filtered.filter(e=>e.company===co);if(l.length)byComp[co]=l;});
    const total=filtered.length,pgz=filtered.filter(e=>e.disponivel>0).length,
          neg=filtered.filter(e=>e.disponivel<0).length,
          fec=filtered.filter(e=>e.config.estado==='Fechado').length;
    return(
      <div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(100px,1fr))',gap:8,marginBottom:14}}>
          {[{l:'Colaboradores',v:total,c:'var(--blue)'},{l:'Por gozar',v:pgz,c:'var(--green)'},
            {l:'A compensar',v:neg,c:'var(--red)'},{l:'Fechados',v:fec,c:'var(--muted)'}].map(k=>(
            <div key={k.l} style={{background:'var(--card)',border:'1px solid var(--border)',borderRadius:8,padding:'6px 10px'}}>
              <div style={{fontSize:18,fontWeight:800,color:k.c,lineHeight:1.1}}>{k.v}</div>
              <div style={{fontSize:11,color:'var(--muted)'}}>{k.l}</div>
            </div>
          ))}
        </div>
        {Object.keys(byComp).length===0
          ?<div style={{padding:40,textAlign:'center',color:'var(--muted)'}}>Sem colaboradores para mostrar.</div>
          :<div className="card" style={{overflow:'hidden',padding:0}}>
            <table style={{width:'100%',borderCollapse:'collapse'}}>
              <thead><tr style={{background:'var(--bg)'}}>
                <th style={{padding:'8px 12px',textAlign:'left',fontSize:11,color:'var(--muted)',textTransform:'uppercase',fontWeight:600}}>Colaborador</th>
                <th style={{padding:'8px 12px',textAlign:'center',fontSize:11,color:'var(--muted)',textTransform:'uppercase',fontWeight:600,whiteSpace:'nowrap'}}>Gozados</th>
                <th style={{padding:'8px 12px',textAlign:'center',fontSize:11,color:'var(--muted)',textTransform:'uppercase',fontWeight:600,whiteSpace:'nowrap'}}>Disponíveis</th>
                <th style={{padding:'8px 12px',textAlign:'left',fontSize:11,color:'var(--muted)',textTransform:'uppercase',fontWeight:600,whiteSpace:'nowrap'}}>Estado</th>
              </tr></thead>
              <tbody>
                {Object.entries(byComp).map(([co,emps])=>{
                  const meta=COMP_META[CO_KEY[co]]||{color:'#555'};
                  return[
                    <tr key={'grp-'+co}>
                      <td colSpan={4} style={{padding:'6px 12px',background:'var(--bg)',borderTop:'2px solid '+meta.color,borderBottom:'1px solid var(--border)'}}>
                        <span style={{fontWeight:700,fontSize:12,color:meta.color}}>{co}</span>
                        <span style={{fontSize:11,fontWeight:400,color:'var(--muted)',marginLeft:6}}>{emps.length} colaborador(es)</span>
                      </td>
                    </tr>,
                    ...emps.map(emp=>{
                      const dc=emp.disponivel<0?'var(--red)':emp.disponivel===0&&emp.used>0?'var(--orange)':'var(--green)';
                      const ec=emp.config.estado==='Fechado'?{bg:'#d1fae5',c:'#065f46'}:{bg:'#fef3c7',c:'#92400e'};
                      return(
                        <tr key={emp.id+emp.company} style={{borderTop:'1px solid var(--border)',cursor:'pointer'}}
                          onClick={()=>setSelEmp({id:emp.id,company:emp.company})}
                          onMouseEnter={e=>e.currentTarget.style.background='var(--bg)'}
                          onMouseLeave={e=>e.currentTarget.style.background=''}>
                          <td style={{padding:'9px 12px'}}>
                            <div style={{fontWeight:600,fontSize:13}}>{emp.name}</div>
                            <div style={{fontSize:11,color:'var(--muted)'}}>{emp.role||'—'}</div>
                          </td>
                          <td style={{padding:'9px 12px',textAlign:'center',fontWeight:700}}>{emp.used}</td>
                          <td style={{padding:'9px 12px',textAlign:'center',fontWeight:700,color:dc}}>{emp.disponivel}</td>
                          <td style={{padding:'9px 12px'}}>
                            <span style={{fontSize:11,fontWeight:700,padding:'2px 8px',borderRadius:10,background:ec.bg,color:ec.c}}>{emp.config.estado}</span>
                          </td>
                        </tr>
                      );
                    })
                  ];
                })}
              </tbody>
            </table>
          </div>
        }

        {/* atalho para colaboradores inativos no módulo colaboradores */}
        {inactiveEmps.length>0&&onNav&&(
          <div style={{marginTop:24}}>
            <button onClick={()=>onNav('employees',{goToArchive:true})}
              style={{display:'flex',alignItems:'center',gap:8,background:'none',border:'1px dashed var(--border)',
                borderRadius:8,padding:'8px 14px',cursor:'pointer',color:'var(--muted)',fontSize:12,fontWeight:600,width:'100%'}}>
              <span style={{fontSize:14}}>↗</span>
              Ver {inactiveEmps.length} Colaboradores Inativos em Colaboradores →
            </button>
          </div>
        )}
      </div>
    );
  }

  function buildFeriasPdf(){
    const emp=enriched.find(e=>e.id===selEmp?.id&&e.company===selEmp?.company);
    if(!emp)return'';
    const periods=empPeriods(emp.id,emp.company).sort((a,b)=>a.startDate.localeCompare(b.startDate));
    const salary=parseFloat(emp.baseSalary)||0;
    const valorSub=salary?(salary/22*(cfgForm.diasDireitoSubsidio||22)).toFixed(2):null;
    const today=new Date().toLocaleDateString('pt-PT',{day:'2-digit',month:'long',year:'numeric'});
    const accent=COMP_COLORS[emp.company]||'#C0392B';
    const estadoBg=cfgForm.estado==='Fechado'?'#d1fae5':'#fef3c7';
    const estadoColor=cfgForm.estado==='Fechado'?'#065f46':'#92400e';
    const rowsHtml=periods.length===0
      ?'<tr><td colspan="4" style="text-align:center;padding:20px;color:#9ca3af">Sem períodos registados</td></tr>'
      :periods.map((f,i)=>`<tr style="${i%2?'background:#f9fafb':''};border-bottom:1px solid #eaeaea">
        <td style="padding:6px 10px">${f.startDate}</td>
        <td style="padding:6px 10px">${f.endDate}</td>
        <td style="padding:6px 10px;text-align:center;font-weight:700">${f.days}</td>
        <td style="padding:6px 10px;color:#6b7280;font-size:10px">${f.notes||'—'}</td>
      </tr>`).join('');
    return`<div style="font-family:Segoe UI,Arial,sans-serif;font-size:12px;color:#1f2a37;max-width:860px;margin:0 auto">
      <div style="background:linear-gradient(135deg,${accent},${accent}cc);color:white;padding:18px 24px;border-radius:10px 10px 0 0;display:flex;justify-content:space-between;align-items:center">
        <div><div style="font-size:16px;font-weight:800">Ficha de Férias — ${year}</div><div style="font-size:10px;opacity:.7;margin-top:3px">Transportes Roupeta · RH Manager · ${today}</div></div>
        <div style="text-align:right;font-size:10px;opacity:.8">${emp.company}</div>
      </div>
      <div style="border:1px solid #e0e0e0;border-top:none;border-radius:0 0 10px 10px;padding:20px 24px">
        <div style="display:flex;gap:12px;align-items:center;margin-bottom:20px;padding-bottom:16px;border-bottom:2px solid #f0f0f0">
          <div style="width:46px;height:46px;border-radius:50%;background:${accent}22;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:${accent}">${emp.name.charAt(0)}</div>
          <div>
            <div style="font-size:16px;font-weight:800">${emp.name}</div>
            <div style="font-size:12px;color:#6b7280">${emp.role||'—'} · ${emp.company}</div>
          </div>
          <div style="margin-left:auto;background:${estadoBg};color:${estadoColor};padding:4px 14px;border-radius:20px;font-size:12px;font-weight:700">${cfgForm.estado}</div>
        </div>
        <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px">
          <div style="border:1px solid #e0e0e0;border-radius:8px;padding:12px"><div style="font-size:9px;text-transform:uppercase;letter-spacing:.5px;color:#9ca3af;margin-bottom:4px">Direito</div><div style="font-size:24px;font-weight:800">${DIREITO_DIAS}</div><div style="font-size:10px;color:#9ca3af">dias/ano</div></div>
          <div style="border:1px solid #e0e0e0;border-radius:8px;padding:12px"><div style="font-size:9px;text-transform:uppercase;letter-spacing:.5px;color:#9ca3af;margin-bottom:4px">Gozados</div><div style="font-size:24px;font-weight:800;color:${accent}">${emp.used}</div><div style="font-size:10px;color:#9ca3af">${periods.length} período(s)</div></div>
          <div style="border:1px solid #e0e0e0;border-radius:8px;padding:12px"><div style="font-size:9px;text-transform:uppercase;letter-spacing:.5px;color:#9ca3af;margin-bottom:4px">Disponíveis</div><div style="font-size:24px;font-weight:800;color:${emp.disponivel<0?'#c0392b':emp.disponivel===0?'#e67e22':'#27ae60'}">${emp.disponivel}</div><div style="font-size:10px;color:#9ca3af">dias restantes</div></div>
          <div style="border:1px solid #e0e0e0;border-radius:8px;padding:12px"><div style="font-size:9px;text-transform:uppercase;letter-spacing:.5px;color:#9ca3af;margin-bottom:4px">Subsídio</div><div style="font-size:20px;font-weight:800;color:#27ae60">${valorSub?valorSub+'€':'—'}</div><div style="font-size:10px;color:#9ca3af">${cfgForm.diasDireitoSubsidio||22} dias</div></div>
        </div>
        <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#6b7280;margin-bottom:8px">Períodos de Férias — ${year}</div>
        <table style="width:100%;border-collapse:collapse;font-size:12px">
          <thead><tr style="background:${accent};color:white">
            <th style="padding:7px 10px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase">Início</th>
            <th style="padding:7px 10px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase">Fim</th>
            <th style="padding:7px 10px;text-align:center;font-size:10px;font-weight:700;text-transform:uppercase">Dias</th>
            <th style="padding:7px 10px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase">Notas</th>
          </tr></thead>
          <tbody>${rowsHtml}</tbody>
        </table>
        ${cfgForm.observacoes?`<div style="margin-top:16px;padding:12px;background:#f9fafb;border-radius:8px;border:1px solid #e0e0e0"><span style="font-size:10px;font-weight:700;text-transform:uppercase;color:#9ca3af">Observações:</span><div style="margin-top:4px;font-size:12px">${cfgForm.observacoes}</div></div>`:''}
        <div style="margin-top:20px;padding-top:12px;border-top:1px solid #f0f0f0;display:flex;justify-content:space-between;font-size:10px;color:#9ca3af">
          <span>Transportes Roupeta — RH Manager</span><span>Gerado em ${today}</span>
        </div>
      </div>
    </div>`;
  }

          <div style={{background:'var(--card)',border:'1px solid var(--border)',borderRadius:10,padding:14}}>
            <div style={{fontSize:10,color:'var(--muted)',fontWeight:700,marginBottom:4,textTransform:'uppercase'}}>Dir. Subsídio</div>
            <div style={{fontSize:28,fontWeight:800,color:'var(--blue)'}}>{cfgForm.diasDireitoSubsidio||22}</div>

          {valorSub!==null&&(
