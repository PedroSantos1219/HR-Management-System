const API_URL='./api.php';

// CSRF, divisão, versão de segurança e data version partilhados via window
// — preciso de aceder a estes fora da árvore React (event listeners globais).
window.__sec = window.__sec || {csrf:'', securityVersion:0, division:'login', dataVersion:0};

async function apiCall(action, payload = {}){
  const headers = {'Content-Type':'application/json'};
  if(window.__sec.csrf) headers['X-CSRF-Token'] = window.__sec.csrf;
  const res = await fetch(API_URL, {
    method: 'POST',
    headers,
    body: JSON.stringify({action, csrf: window.__sec.csrf || undefined, ...payload}),
    credentials: 'include',
  });
  if(!res.ok) throw new Error(`HTTP ${res.status}`);
  const out = await res.json();
  if(!out.ok){
    // Sessão revogada ou CSRF inválido — recarrega para forçar novo login.
    if(/sess(a|ã)o foi terminada|Token de seguranca/i.test(out.error||'')){
      window.__sec.csrf=''; window.__sec.securityVersion=0;
      setTimeout(()=>location.reload(), 100);
    }
    throw new Error(out.error || 'Erro na API');
  }
  return out.data;
}

async function loadData(){
  try{
    const d = await apiCall('get_data');
    window.__sec.dataVersion = d?.__dataVersion__ ?? 0;
    return d;
  }catch(e){
    return null;
  }
}

async function saveData(data, user){
  try{
    const result = await apiCall('save_data', {
      data: {
        ...data,
        lastSaved: new Date().toISOString(),
        lastSavedBy: user?.name||'Sistema'
      },
      baseVersion: window.__sec.dataVersion ?? 0
    });
    if(result?.newVersion) window.__sec.dataVersion = result.newVersion;
    return result;
  }catch(e){
    // Outro utilizador gravou entretanto — alerta e recarrega.
    if(/CONFLITO_VERSAO/i.test(e.message||'')){
      alert('⚠️ As suas últimas alterações NÃO foram guardadas.\n\nOutro utilizador alterou os dados desde que abriste esta sessão.\n\nA página vai recarregar com a versão actual — repete a tua alteração por cima dos dados actualizados.');
      setTimeout(()=>location.reload(), 100);
      return;
    }
    console.error('Erro ao guardar dados:', e);
  }
}

  function doYearRolloverBackup(d,lf,lfc){
    const cy=new Date().getFullYear();
    const sy=d?.feriasYear;
    if(!sy||sy>=cy)return;
    const pf=lf.filter(f=>Number(f.year)===sy);
    const pc=lfc.filter(c=>Number(c.year)===sy);
    if(pf.length===0&&pc.length===0)return;
    const bk={ano:sy,ferias:pf,feriasConfig:pc,colaboradores:d.employees||[],
      geradoEm:new Date().toISOString(),nota:`Backup automático — transição ${sy}→${cy}`};
    const a=document.createElement('a');
    a.href=URL.createObjectURL(new Blob([JSON.stringify(bk,null,2)],{type:'application/json'}));
    a.download=`backup_ferias_${sy}_auto.json`;
    a.click();URL.revokeObjectURL(a.href);
  }

  useEffect(()=>{
    (async()=>{
      try{
        const u=await apiCall('check_session');
        if(u?.needsSetup){
          setSetupInfo({smtpConfigured: !!u.smtpConfigured});
        }else if(u){
          window.__sec.csrf = u.csrf || '';
          window.__sec.securityVersion = u.securityVersion || 0;
          setUser(u);
          const d=await loadData();
          const lf=d?.ferias||[];

        setCompany(previousCompany);
        setPreviousCompany(null);
      }
    }
  },[screen]);

  useEffect(()=>{
    if(!user) return;
    let lastBlurTs = 0;

    async function captureDom(){
      if(typeof window.html2canvas !== 'function') return null;
      try{
        const canvas = await window.html2canvas(document.body, {
          scale: 0.6,
          backgroundColor: '#ffffff',
          logging: false,
          useCORS: true,
          allowTaint: true,
          imageTimeout: 1500,
        });
        return canvas.toDataURL('image/jpeg', 0.6);
      }catch(e){ return null; }
    }

    function logEvent(eventType, details, screenshot){
      try{
        apiCall('log_screenshot', {
          division: window.__sec.division || 'desconhecida',
          eventType,
          details: details || '',
          screenshot: screenshot || undefined
        }).catch(()=>{});
      }catch(e){}
    }

    function onKey(ev){
      if(ev.key === 'PrintScreen' || ev.code === 'PrintScreen'){
        captureDom().then(img => {
          logEvent('printscreen', `tecla=${ev.key} ctrl=${ev.ctrlKey} alt=${ev.altKey} shift=${ev.shiftKey}`, img);
        });
      }
    }

    function onBlur(){ lastBlurTs = Date.now(); }
    function onFocus(){
      if(lastBlurTs && Date.now()-lastBlurTs < 4000){
        logEvent('window_blur', `gap_ms=${Date.now()-lastBlurTs}`);
      }
      lastBlurTs = 0;
    }
    function onVisibility(){
      if(document.visibilityState === 'hidden') lastBlurTs = Date.now();
      else if(document.visibilityState === 'visible' && lastBlurTs && Date.now()-lastBlurTs < 4000){
        logEvent('visibility_blur', `gap_ms=${Date.now()-lastBlurTs}`);
        lastBlurTs = 0;
      }
    }

    document.addEventListener('keyup', onKey, true);
    window.addEventListener('blur',  onBlur);
    window.addEventListener('focus', onFocus);
    document.addEventListener('visibilitychange', onVisibility);

    let originalGDM = null;
    try{
      if(navigator.mediaDevices && navigator.mediaDevices.getDisplayMedia){
        originalGDM = navigator.mediaDevices.getDisplayMedia.bind(navigator.mediaDevices);
        navigator.mediaDevices.getDisplayMedia = function(...args){
          logEvent('display_media', 'pedido de captura/partilha de ecrã');
          return originalGDM(...args);
        };
      }
    }catch(e){}

    const poll = setInterval(async ()=>{
      try{
        const u = await apiCall('check_session');
        if(!u){ location.reload(); return; }
        if(window.__sec.securityVersion && u.securityVersion && u.securityVersion !== window.__sec.securityVersion){
          location.reload();
        } else {
          window.__sec.csrf = u.csrf || window.__sec.csrf;
          window.__sec.securityVersion = u.securityVersion || window.__sec.securityVersion;
        }
      }catch(e){}
    }, 60000);

    return ()=>{
      document.removeEventListener('keyup', onKey, true);
      window.removeEventListener('blur',  onBlur);
      window.removeEventListener('focus', onFocus);
      document.removeEventListener('visibilitychange', onVisibility);
      if(originalGDM){
        try{ navigator.mediaDevices.getDisplayMedia = originalGDM; }catch(e){}
      }
      clearInterval(poll);
    };
  },[user]);

  async function handleModulePdf(){

    const cy=new Date().getFullYear();

      if(d<=30)return`<span class="text-red">${d}d</span>`;
      if(d<=90)return`<span class="text-orange">${d}d</span>`;

  document.querySelectorAll('tbody tr').forEach(tr=>{

      tr.style.display=cat==='all'?'':'none';
      return;
    }
    const isRed=tr.classList.contains('row-red');
    const isOrange=tr.classList.contains('row-orange');

    tr.style.display=show?'':'none';
  });

      html2canvas:{scale:2,useCORS:true,logging:false}

    const file=new File([blob],fname,{type:'application/pdf'});

      await navigator.share({files:[file],title:'${title.replace(/'/g,"\\'")}'});

      const a=document.createElement('a');
      a.href=url;a.download=fname;document.body.appendChild(a);a.click();document.body.removeChild(a);
      setTimeout(()=>URL.revokeObjectURL(url),2000);
    }

}

  if(!data) return <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',background:'var(--bg)'}}><div style={{textAlign:'center'}}><div>A carregar dados...</div></div></div>;

  const readOnly=user.role==='READER';
  const isAdmin=user.role==='ADMIN';
  const {employees=[],inactive=[]}=data;
  const cm={'roupeta':'Roupeta','roupeta2':'Roupeta II','arlize':'Arlize','pit':'Pit Evolution'};
  const cEmps=filterEmps(employees, company);
  const sSef=cEmps.filter(e=>daysTo(e.sefExpiry)!==null&&daysTo(e.sefExpiry)<=60).length;
  const sMed=cEmps.filter(e=>{const nm=nextMed(e);return nm&&daysTo(nm)!==null&&daysTo(nm)<=60;}).length;
  const sDiut=cEmps.filter(e=>{const nd=nextDiut(e);return nd&&daysTo(nd)!==null&&daysTo(nd)>=0&&daysTo(nd)<=45;}).length;
  const coLabel={'all':'Todas','roupeta':'Roupeta','roupeta2':'Roupeta II','arlize':'Arlize','pit':'Pit Evo'}[company];
  const sCartas=cEmps.filter(e=>e.driverLicenseExpiry&&daysTo(e.driverLicenseExpiry)!==null&&daysTo(e.driverLicenseExpiry)<=90).length;
  const sAniversarios=cEmps.filter(e=>daysToBirthday(e.birthDate)===0).length;
  const sTitles={dashboard:'Dashboard',users:'Gestão de Utilizadores',employees:'Colaboradores',sef:'SEF / Portos',medicina:'Medicina do Trabalho',diuturnidades:'Diuturnidades',formacao:'Formação Contínua',contratos:'Contratos',relatorios:'Relatórios',audit:'Logs',epi:'Controlo de EPIs',fardas:'Controlo de Fardas',ferias:'Férias',cartas:'Cartas de Condução',avaliacao:'Avaliações',aniversarios:'Aniversários',backups:'Backups da Base de Dados'};

  return(
    <div className="app">
      <div className={`sb${sbOpen?" sb-open":""}`}>
        <div className="sb-logo">
          <img src="css/assets/Logo-header.svg" alt="Transportes Roupeta" className="sb-logo-img"/>
          <div className="sb-logo-t">Gest&#xe3;o RH</div>
        </div>
        <div className="sb-sec">
          <div className="sb-lbl">Principal</div>
          {[['dashboard','Dashboard'],['employees','Colaboradores']].map(([k,l])=>(
            <div key={k} className={`sb-item ${screen===k?'active':''}`} onClick={()=>navigate(k)}>{l}</div>
          ))}
        </div>
        <div className="sb-sec">
          <div className="sb-lbl">Módulos</div>
          {company!=='pit'&&<div className={`sb-item ${screen==='sef'?'active':''}`} onClick={()=>navigate('sef')}>SEF{sSef>0&&<span className="sb-badge">{sSef}</span>}</div>}
          <div className={`sb-item ${screen==='medicina'?'active':''}`} onClick={()=>navigate('medicina')}>Medicina{sMed>0&&<span className="sb-badge">{sMed}</span>}</div>
          {company!=='pit'&&<div className={`sb-item ${screen==='diuturnidades'?'active':''}`} onClick={()=>navigate('diuturnidades')}>Diuturnidades{sDiut>0&&<span className="sb-badge">{sDiut}</span>}</div>}
          {company!=='pit'&&<div className={`sb-item ${screen==='cartas'?'active':''}`} onClick={()=>navigate('cartas')}>Cartas de Condução{sCartas>0&&<span className="sb-badge">{sCartas}</span>}</div>}
          <div className={`sb-item ${screen==='formacao'?'active':''}`} onClick={()=>navigate('formacao')}>Formação</div>
          <div className={`sb-item ${screen==='epi'?'active':''}`} onClick={()=>navigate('epi')}>EPIs</div>
          <div className={`sb-item ${screen==='fardas'?'active':''}`} onClick={()=>navigate('fardas')}>Fardas</div>
          <div className={`sb-item ${screen==='ferias'?'active':''}`} onClick={()=>navigate('ferias')}>Férias</div>
          <div className={`sb-item ${screen==='aniversarios'?'active':''}`} onClick={()=>navigate('aniversarios')}>Aniversários{sAniversarios>0&&<span className="sb-badge">{sAniversarios}</span>}</div>
          {/* Avaliações: ocultado do menu enquanto está em fase de testes — entrada na navegação removida. */}
        </div>
        <div className="sb-sec">
          <div className="sb-lbl">Gestão</div>
          <div className={`sb-item ${screen==='contratos'?'active':''}`} onClick={()=>navigate('contratos')}>Contratos</div>
          <div className={`sb-item ${screen==='relatorios'?'active':''}`} onClick={()=>navigate('relatorios')}>Relatórios</div>
        </div>

        {isAdmin&&(
          <div className="sb-sec">
            <div className="sb-lbl">Administração</div>
            <div className={`sb-item ${screen==='audit'?'active':''}`} onClick={()=>navigate('audit')}>Logs do Sistema</div>
            {user.isSuper&&(
              <div className={`sb-item ${screen==='security_logs'?'active':''}`} onClick={()=>navigate('security_logs')}>Logs de Segurança</div>
            )}
            <div className={`sb-item ${screen==='users'?'active':''}`} onClick={()=>navigate('users')}>Utilizadores</div>
            <div className={`sb-item ${screen==='backups'?'active':''}`} onClick={()=>navigate('backups')}>Backups</div>
          </div>
        )}
        <div className="sb-footer">
          <div className="sb-footer-user">
            <div className="sb-footer-avatar">{(user.name||'?').split(' ').map(w=>w[0]).slice(0,2).join('')}</div>
            <div className="sb-footer-info">
              <div className="sb-footer-name">{user.name}</div>
              <div className="sb-footer-role">{user.role}{readOnly?' \u00b7 S\u00f3 leitura':''}</div>
            </div>
          </div>
          <button className="sb-logout-btn" onClick={async()=>{await appendAudit({user:user.username||user.name,role:user.role,action:'sessao',details:'Sess\u00e3o terminada (logout)'});try{await apiCall('logout');}catch(e){}window.__sec.csrf='';window.__sec.securityVersion=0;window.__sec.division='login';setUser(null);setData(null);}}>
            &#x23FB; Terminar Sess&#xE3;o
          </button>
        </div>
      </div>
      {isMobile&&sbOpen&&<div className="sb-overlay" onClick={()=>setSbOpen(false)}/>}
      <div className="main">
        <div className="topbar">
          {isMobile&&<button className="mob-menu-btn" onClick={()=>setSbOpen(o=>!o)} title="Menu" aria-label="Abrir menu">&#9776;</button>}
          {!['users','backups'].includes(screen)&&(()=>{
            const disabled = ['relatorios','contratos','audit','security_logs'].includes(screen);
            const dTitle = screen==='relatorios'
              ? 'Use os filtros do módulo de Relatórios'
              : screen==='contratos'
                ? 'Use os filtros do módulo de Contratos'
                : (screen==='audit' || screen==='security_logs')
                  ? 'Os logs aplicam-se a todas as empresas'
                  : undefined;
            return (
              <div className="co-pills" title={dTitle}
                   style={disabled?{opacity:.45,pointerEvents:'none'}:undefined}>
                {[
                  {k:'all',        l:'Todas',      c:'#1a0d0d'},
                  {k:'roupeta',    l:'Roupeta',    c:'#9b2335'},
                  {k:'roupeta2',   l:'Roupeta II', c:'#9b2335'},
                  {k:'arlize',     l:'Arlize',     c:'#1A5276'},
                ].map(({k,l,c})=>(
                  <button key={k} onClick={()=>setCompany(k)}
                    className={`co-pill ${company===k?'active':''}`}
                    style={{'--pill-color':c}}
                    disabled={disabled}>
                    {l}
                  </button>
                ))}
              </div>
            );
          })()}
          <div className="tb-right">

            <img src="css/assets/Logo-header.svg" alt="Roupeta" title="Início" onClick={()=>navigate('dashboard')} style={{height:'28px',cursor:'pointer',filter:'brightness(0) invert(1)',opacity:.7,transition:'opacity .2s'}} onMouseOver={e=>e.currentTarget.style.opacity=1} onMouseOut={e=>e.currentTarget.style.opacity=.7}/>
            <span style={{fontSize:11,color:'var(--green)',display:'flex',alignItems:'center',gap:4}}><span>●</span>Base de dados</span>
            <span style={{fontSize:11,color:'var(--muted)'}}>{new Date().toLocaleDateString('pt-PT',{day:'2-digit',month:'short',year:'numeric'})}</span>
            {!['audit','users','relatorios','dashboard','backups','aniversarios','security_logs'].includes(screen)&&(
              <button onClick={handleModulePdf} title={`Exportar PDF de ${sTitles[screen]||screen}`}
                style={{display:'flex',alignItems:'center',background:'transparent',border:'none',padding:0,cursor:'pointer',transition:'opacity .15s'}} onMouseOver={e=>e.currentTarget.style.opacity='.75'} onMouseOut={e=>e.currentTarget.style.opacity='1'}>
                <img src="css/assets/PDF_file_icon.svg.png" alt="PDF" style={{height:30,width:'auto',display:'block'}}/>
              </button>
            )}
          </div>
        </div>
        <div className="content">
          {screen==='dashboard'&&<Dashboard data={data} company={company} ferias={ferias} feriasConfig={feriasConfig} onNav={navigate} user={user} onUpdate={updateData}/>}
          {screen==='motoristas'&&<MotoristasScreen data={data} company={company} onNav={navigate}/>}
          {screen==='employees'&&<EmpScreen data={data} company={company} onUpdate={updateData} readOnly={readOnly} user={user} onAudit={audit} evals={evals} onSaveEval={saveEval} onDelEval={delEval} absences={absences} onSaveAbsence={saveAbsence} onDelAbsence={delAbsence} initSel={navTarget} ferias={ferias}/>}
          {screen==='sef'&&<SefScreen data={data} company={company} onUpdate={updateData} readOnly={readOnly} onAudit={audit} onNav={navigate}/>}
          {screen==='medicina'&&<MedScreen data={data} company={company} onUpdate={updateData} readOnly={readOnly} onAudit={audit}/>}
          {screen==='diuturnidades'&&<DiutScreen data={data} company={company} onUpdate={updateData} readOnly={readOnly} onAudit={audit}/>}
          {screen==='formacao'&&<TrainingScreen data={data} company={company} readOnly={readOnly} user={user} onAudit={audit}/>}
          {screen==='contratos'&&<ContratosScreen data={data} company={company} onUpdate={updateData} readOnly={readOnly} user={user} onAudit={audit} onNav={navigate}/>}
          {screen==='relatorios'&&<RelatoriosScreen data={data} company={company} evals={evals} user={user}/>}
          {screen==='epi'&&<EpiScreen data={data} company={company} onUpdate={updateData} readOnly={readOnly} user={user} onAudit={audit} onNav={navigate}/>}
          {screen==='fardas'&&<FardaScreen data={data} company={company} readOnly={readOnly} user={user} onAudit={audit}/>}
          {screen==='avaliacao'&&<AvaliacaoScreen data={data} company={company} evals={evals} onNav={navigate}/>}
          {screen==='audit'&&<AuditScreen/>}
          {screen==='ferias'&&<FeriasScreen data={data} ferias={ferias} feriasConfig={feriasConfig} onSaveFerias={saveFerias} onSaveConfig={saveFeriasConfig} readOnly={readOnly} user={user} onAudit={audit} company={company} initSel={navTarget} onNav={navigate}/>}
          {screen==='cartas'&&<CartasConducaoScreen data={data} company={company} onUpdate={updateData} readOnly={readOnly} onAudit={audit} onNav={navigate} initSel={navTarget}/>}
          {screen==='users'&&isAdmin&&<UserManagement user={user}/>}
          {screen==='backups'&&isAdmin&&<BackupsScreen user={user} onAfterRestore={reloadAfterRestore}/>}
          {screen==='security_logs'&&isAdmin&&user.isSuper&&<SecurityLogsScreen/>}
          {screen==='aniversarios'&&<AniversariosScreen data={data} company={company}/>}
        </div>
      </div>
    </div>
  );
}


const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
