          </div>}
        </div>
        <div style={{display:'grid',gridTemplateColumns:'2fr 1fr',gap:16,alignItems:'start'}}>
          <div>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
              <div style={{fontWeight:600,fontSize:14}}>Períodos — {year}</div>
              {!readOnly&&<button className="btn bp btn-sm" onClick={()=>{setEditEntry(null);setForm({startDate:'',endDate:'',notes:''});setFormErr('');setShowModal(true);}}>+ Período</button>}
            </div>
            <div className="card" style={{overflow:'hidden',padding:0}}>
              {periods.length===0
                ?<div style={{padding:24,textAlign:'center',color:'var(--muted)',fontSize:13}}>Sem períodos registados em {year}.</div>
                :periods.map(f=>(
                  <div key={f.id} style={{padding:'10px 14px',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'center',gap:10}}>
                    <div style={{flex:1}}>
                      <div style={{fontWeight:600,fontSize:13}}>{f.startDate} → {f.endDate}</div>
                      <div style={{fontSize:12,color:'var(--muted)'}}>{f.days} dia(s){f.notes?' · '+f.notes:''}</div>
                    </div>
                    {!readOnly&&<div style={{display:'flex',gap:6}}>
                      <button className="btn btn-sm" onClick={()=>{setEditEntry(f);setForm({startDate:f.startDate,endDate:f.endDate,notes:f.notes||''});setFormErr('');setShowModal(true);}}>Editar</button>
                      <button className="btn btn-sm" style={{color:'var(--red)'}} onClick={()=>handleDelete(f.id)}>Elim.</button>
                    </div>}
                  </div>
                ))
              }
            </div>
          </div>
          <div>
            <div style={{fontWeight:600,fontSize:14,marginBottom:10}}>Configuração</div>
            <div className="card" style={{padding:14}}>
              <div className="fg">
                <label className="fl">Dias Direito a Subsídio</label>
                <input className="fi" type="number" min={0} max={30} value={cfgForm.diasDireitoSubsidio??22}
                  onChange={e=>setCfgField('diasDireitoSubsidio',parseInt(e.target.value)||22)} readOnly={readOnly}/>
              </div>
              <div className="fg" style={{marginTop:10}}>
                <label className="fl">Observações</label>
                <textarea className="fi" rows={3} style={{resize:'vertical'}} value={cfgForm.observacoes||''}
                  onChange={e=>setCfgField('observacoes',e.target.value)} readOnly={readOnly}
                  placeholder="Notas sobre as férias..."/>
              </div>
              {!readOnly&&cfgDirty&&<button className="btn bp" style={{width:'100%',marginTop:12}}
                onClick={handleSaveConfig}>Guardar</button>}
            </div>
          </div>
        </div>
      </div>
    );
  }

  return(
    <div>
      {!selEmp&&(
        <div style={{display:'flex',gap:10,alignItems:'center',flexWrap:'wrap',marginBottom:16}}>
          <div style={{display:'flex',alignItems:'center',gap:6,background:'var(--blbg)',border:'1px solid var(--blue)',borderRadius:8,padding:'4px 14px'}}>
            <span style={{fontWeight:700,fontSize:14,color:'var(--blue)'}}>{year}</span>
          </div>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Pesquisar colaborador..." className="fi" style={{flex:1,minWidth:140,padding:'5px 10px'}}/>
        </div>
      )}

      {selEmp?<EmpDetailView/>:<IndiceView/>}

      {feriaPdfHtml!==null&&(()=>{
        const emp=enriched.find(e=>e.id===selEmp?.id&&e.company===selEmp?.company);
        const accent=emp?COMP_COLORS[emp.company]||'#C0392B':'#C0392B';
        return(
          <div style={{position:'fixed',top:0,left:0,width:'100%',height:'100%',zIndex:9999,background:'white',overflowY:'auto'}}>
            <style dangerouslySetInnerHTML={{__html:`@media print{.rh-noprint{display:none!important;}.rh-printbody{padding:0!important;}}`}}/>
            <div className="rh-noprint" style={{position:'sticky',top:0,zIndex:10,background:'white',borderBottom:`3px solid ${accent}`,padding:'10px 20px',display:'flex',alignItems:'center',justifyContent:'space-between',boxShadow:'0 2px 8px rgba(0,0,0,.12)'}}>
              <span style={{fontWeight:800,fontSize:14,color:'#1a0d0d'}}>Férias {new Date().getFullYear()} — {emp?.name}</span>
              <div style={{display:'flex',gap:10,alignItems:'center'}}>
                <button onClick={()=>window.print()}
                  style={{display:'flex',alignItems:'center',gap:8,background:`linear-gradient(135deg,${accent} 0%,${accent}cc 100%)`,color:'white',border:'none',padding:'9px 22px',borderRadius:8,fontWeight:700,fontSize:13,cursor:'pointer',boxShadow:`0 3px 12px ${accent}55`}}>
                  Transferir PDF
                </button>
                <button onClick={()=>generateAndSharePdf(feriaPdfHtml,'Férias '+(new Date().getFullYear())+' — '+(emp?.name||''),'share').catch(()=>{})}
                  style={{display:'flex',alignItems:'center',gap:7,background:'white',border:'1.5px solid #ddd',padding:'9px 18px',borderRadius:8,fontWeight:600,fontSize:13,cursor:'pointer',color:'#333',transition:'border-color .15s,color .15s'}} onMouseOver={e=>{e.currentTarget.style.borderColor='#1a0d0d';e.currentTarget.style.color='#1a0d0d';}} onMouseOut={e=>{e.currentTarget.style.borderColor='#ddd';e.currentTarget.style.color='#333';}}>
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.3" strokeLinecap="round" strokeLinejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
                  Partilhar
                </button>
                <button onClick={()=>{setFeriaPdfHtml(null);setShowFeriasShare(false);}}
                  style={{display:'flex',alignItems:'center',gap:6,background:'white',border:'1.5px solid #ddd',padding:'9px 18px',borderRadius:8,fontWeight:600,fontSize:13,cursor:'pointer',color:'#555'}}>
                  <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                  Fechar
                </button>
              </div>
            </div>
            <div className="rh-printbody" style={{maxWidth:900,margin:'0 auto',padding:'28px'}}>
              <div dangerouslySetInnerHTML={{__html:feriaPdfHtml}}/>
            </div>
          </div>
        );
      })()}

      {showModal&&(
        <div className="ov" onClick={e=>{if(e.target===e.currentTarget)setShowModal(false);}}>
          <div className="modal" style={{width:380}}>
            <div className="mh"><div className="mh-t">{editEntry?'Editar Período':'Novo Período'} — {selEmp?.name}</div></div>
            <form onSubmit={handleSavePeriod}>
              <div className="mb">
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
                  <div className="fg">
                    <label className="fl">Data início</label>
                    <input className="fi" type="date" value={form.startDate} onChange={e=>setForm({...form,startDate:e.target.value})} required/>
                  </div>
                  <div className="fg">
                    <label className="fl">Data fim</label>
                    <input className="fi" type="date" value={form.endDate} onChange={e=>setForm({...form,endDate:e.target.value})} required/>
                  </div>
                </div>
                {form.startDate&&form.endDate&&new Date(form.endDate)>=new Date(form.startDate)&&(
                  <div style={{fontSize:12,color:'var(--blue)',marginTop:4}}>{countDays(form.startDate,form.endDate)} dias úteis</div>
                )}
                <div className="fg" style={{marginTop:10}}>
                  <label className="fl">Notas (opcional)</label>
                  <input className="fi" type="text" value={form.notes} onChange={e=>setForm({...form,notes:e.target.value})} placeholder="ex: férias de verão"/>
                </div>
                {formErr&&<div style={{color:'var(--red)',fontSize:12,marginTop:4}}>{formErr}</div>}
              </div>
              <div className="mf">
                <button type="button" className="btn" onClick={()=>setShowModal(false)}>Cancelar</button>
                <button type="submit" className="btn bp">Guardar</button>
              </div>
            </form>
          </div>
        </div>
      )}
    </div>
  );
}

function UserManagement({user: currentUser}){
  const [users,setUsers]=React.useState([]);
  const [loading,setLoading]=React.useState(true);
  const [loadErr,setLoadErr]=React.useState('');
  const [showModal,setShowModal]=React.useState(false);
  const [form,setForm]=React.useState({username:'',email:'',password:'',role:'READER'});
  const [formErr,setFormErr]=React.useState('');
  const [saving,setSaving]=React.useState(false);
  const [pwTarget,setPwTarget]=React.useState(null);
  const [pwStep,setPwStep]=React.useState('request'); // 'request' | 'verify' | 'done'
  const [pwCode,setPwCode]=React.useState('');
  const [pwNew,setPwNew]=React.useState('');
  const [pwNew2,setPwNew2]=React.useState('');
  const [pwErr,setPwErr]=React.useState('');
  const [pwInfo,setPwInfo]=React.useState('');
  const [pwBusy,setPwBusy]=React.useState(false);

  function openPwModal(u){
    setPwTarget(u); setPwStep('request');
    setPwCode(''); setPwNew(''); setPwNew2('');
    setPwErr(''); setPwInfo(''); setPwBusy(false);
  }
  function closePwModal(){ setPwTarget(null); }

  async function requestCode(){
    setPwBusy(true); setPwErr(''); setPwInfo('');
    try{
      await apiCall('admin_request_code',{
        actionType:'reset_user_password',
        targetUserId:pwTarget.id,
        description:`Alterar password do utilizador "${pwTarget.username}" (${pwTarget.email})`,
      });
      setPwInfo(`Código enviado para ${currentUser.email}. Válido por 10 minutos.`);
      setPwStep('verify');
    }catch(ex){ setPwErr(ex.message||'Falha ao enviar código.'); }
    setPwBusy(false);
  }

  async function verifyAndReset(){
    if(!/^\d{6}$/.test(pwCode)){ setPwErr('Código deve ter 6 dígitos.'); return; }
    if(pwNew.length<8){ setPwErr('A nova password deve ter pelo menos 8 caracteres.'); return; }
    if(pwNew!==pwNew2){ setPwErr('As passwords não coincidem.'); return; }
    setPwBusy(true); setPwErr('');
    try{
      await apiCall('admin_verify_code_and_reset',{
        code:pwCode, targetUserId:pwTarget.id, newPassword:pwNew,
      });
      setPwStep('done');
      setPwInfo(`Password de "${pwTarget.username}" actualizada.`);
    }catch(ex){ setPwErr(ex.message||'Falha ao validar código.'); }
    setPwBusy(false);
  }

  async function load(){
    setLoading(true); setLoadErr('');
    try{
      const r=await apiCall('list_users');
      setUsers(Array.isArray(r)?r:[]);
    }catch(e){
      setLoadErr(e.message||'Erro ao carregar utilizadores.');
    }
    setLoading(false);
  }
  React.useEffect(()=>{load();},[]);

  const ROLE_LABELS={ADMIN:'Administrador',EDITOR:'Editor',READER:'Leitor'};
  const ROLE_COLORS={ADMIN:'var(--red)',EDITOR:'var(--blue)',READER:'var(--green)'};

  async function handleCreate(e){
    e.preventDefault();
    if(!form.username.trim()||!form.email.trim()||!form.password){setFormErr('Preencha todos os campos.');return;}
    setSaving(true);setFormErr('');
    try{
      await apiCall('create_user',{username:form.username.trim(),email:form.email.trim(),password:form.password,role:form.role});
      setShowModal(false);
      setForm({username:'',email:'',password:'',role:'READER'});
      await load();
    }catch(ex){ setFormErr(ex.message||'Erro ao criar utilizador.'); }
    setSaving(false);
  }

  async function handleDelete(id,name){
    if(!confirm(`Eliminar utilizador "${name}"? Esta acção não pode ser desfeita.`))return;
    try{ await apiCall('delete_user',{userId:id}); await load(); }
    catch(ex){ alert(ex.message||'Erro ao eliminar.'); }
  }

  async function handleRoleChange(id,role){
    try{ await apiCall('update_user',{userId:id,role}); await load(); }
    catch(ex){ alert(ex.message||'Erro ao actualizar.'); }
  }

  async function handleResend(id){
    try{ await apiCall('resend_verification',{userId:id}); alert('Email de verificação reenviado.'); }
    catch(ex){ alert(ex.message||'Erro ao reenviar.'); }
  }

  return(
    <div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
        <div style={{fontSize:13,color:'var(--muted)'}}>Gerir contas de acesso à plataforma</div>
        <button className="btn bp btn-sm" onClick={()=>setShowModal(true)}>+ Novo utilizador</button>
      </div>

      <div className="card" style={{overflow:'hidden'}}>
        {loadErr&&<div style={{padding:'12px 16px',background:'#fef2f2',color:'var(--red)',fontSize:13,borderBottom:'1px solid #fecaca'}}>⚠ {loadErr}</div>}
        {loading?<div style={{padding:32,textAlign:'center',color:'var(--muted)'}}>A carregar...</div>:
        <table style={{width:'100%',borderCollapse:'collapse'}}>
          <thead><tr style={{background:'var(--bg)'}}>
            <th style={{padding:'10px 14px',textAlign:'left',fontSize:11,color:'var(--muted)',textTransform:'uppercase',fontWeight:600}}>Utilizador</th>
            <th style={{padding:'10px 14px',textAlign:'left',fontSize:11,color:'var(--muted)',textTransform:'uppercase',fontWeight:600}}>Email</th>
            <th style={{padding:'10px 14px',textAlign:'left',fontSize:11,color:'var(--muted)',textTransform:'uppercase',fontWeight:600}}>Função</th>
            <th style={{padding:'10px 14px',textAlign:'left',fontSize:11,color:'var(--muted)',textTransform:'uppercase',fontWeight:600}}>Estado</th>
            <th style={{padding:'10px 14px',textAlign:'left',fontSize:11,color:'var(--muted)',textTransform:'uppercase',fontWeight:600}}>Criado em</th>
            <th style={{padding:'10px 14px',textAlign:'right',fontSize:11,color:'var(--muted)',textTransform:'uppercase',fontWeight:600}}>Acções</th>
          </tr></thead>
          <tbody>
          {users.map(u=>(
            <tr key={u.id} style={{borderTop:'1px solid var(--border)'}}>
              <td style={{padding:'12px 14px'}}>
                <div style={{fontWeight:600,fontSize:14}}>{u.username}</div>
                {u.created_by&&<div style={{fontSize:11,color:'var(--muted)'}}>por {u.created_by}</div>}
              </td>
              <td style={{padding:'12px 14px',fontSize:13,color:'var(--muted)'}}>{u.email}</td>
              <td style={{padding:'12px 14px'}}>
                {(()=>{
                  const locked = u.isSuper && !currentUser.isSuper;
                  if(u.id===currentUser.id||locked){
                    return <span style={{fontSize:12,fontWeight:600,color:ROLE_COLORS[u.role]}}>{ROLE_LABELS[u.role]||u.role}</span>;
                  }
                  return (
                    <select value={u.role} onChange={ev=>handleRoleChange(u.id,ev.target.value)}
                      style={{fontSize:12,padding:'3px 6px',borderRadius:6,border:'1px solid var(--border)',background:'var(--card)',color:ROLE_COLORS[u.role],fontWeight:600,cursor:'pointer'}}>
                      <option value="ADMIN">Administrador</option>
                      <option value="EDITOR">Editor</option>
                      <option value="READER">Leitor</option>
                    </select>
                  );
                })()}
              </td>
              <td style={{padding:'12px 14px'}}>
                {u.verified
                  ? <span style={{fontSize:11,background:'#d1fae5',color:'#065f46',padding:'2px 8px',borderRadius:12,fontWeight:600}}>Verificado</span>
                  : <div style={{display:'flex',alignItems:'center',gap:6}}>
                      <span style={{fontSize:11,background:'#fef3c7',color:'#92400e',padding:'2px 8px',borderRadius:12,fontWeight:600}}>Pendente</span>
                      <button className="btn btn-sm" style={{fontSize:10,padding:'2px 8px'}} onClick={()=>handleResend(u.id)}>Reenviar</button>
                    </div>
                }
              </td>
              <td style={{padding:'12px 14px',fontSize:12,color:'var(--muted)'}}>{u.created_at?new Date(u.created_at).toLocaleDateString('pt-PT'):'-'}</td>
              <td style={{padding:'12px 14px',textAlign:'right'}}>
                {(()=>{
                  if(u.id===currentUser.id) return null;
                  if(u.isSuper && !currentUser.isSuper){
                    return <span style={{fontSize:11,color:'var(--muted)'}}>—</span>;
                  }
                  return (
                    <div style={{display:'inline-flex',gap:6,justifyContent:'flex-end'}}>
                      <button className="btn btn-sm" style={{color:'var(--blue)',borderColor:'var(--blue)',background:'transparent'}}
                        onClick={()=>openPwModal(u)}>Alterar password</button>
                      <button className="btn btn-sm" style={{color:'var(--red)',borderColor:'var(--red)',background:'transparent'}}
                        onClick={()=>handleDelete(u.id,u.username)}>Eliminar</button>
                    </div>
                  );
                })()}
              </td>
            </tr>
          ))}
          </tbody>
        </table>}
      </div>

      {showModal&&(
        <div className="ov" onClick={e=>{if(e.target===e.currentTarget)setShowModal(false);}}>
          <div className="modal" style={{width:400}}>
            <div className="mh"><div className="mh-t">Novo Utilizador</div></div>
            <form onSubmit={handleCreate}>
              <div className="mb">
                <div className="fg">
                  <label className="fl">Nome de utilizador</label>
                  <input className="fi" type="text" value={form.username} onChange={e=>setForm({...form,username:e.target.value})} required autoComplete="off" placeholder="ex: Ana Silva"/>
                </div>
                <div className="fg">
                  <label className="fl">Email</label>
                  <input className="fi" type="email" value={form.email} onChange={e=>setForm({...form,email:e.target.value})} required autoComplete="off" placeholder="ex: ana.silva@roupeta.com"/>
                </div>
                <div className="fg">
                  <label className="fl">Password inicial</label>
                  <input className="fi" type="password" value={form.password} onChange={e=>setForm({...form,password:e.target.value})} required autoComplete="new-password" minLength={8} placeholder="Mínimo 8 caracteres"/>
                  <div style={{fontSize:11,color:'var(--muted)',marginTop:4}}>Mínimo 8 caracteres. Será enviado email de verificação.</div>
                </div>
                <div className="fg">
                  <label className="fl">Função</label>
                  <select className="fi" value={form.role} onChange={e=>setForm({...form,role:e.target.value})}>
                    <option value="ADMIN">Administrador</option>
                    <option value="EDITOR">Editor</option>
                    <option value="READER">Leitor</option>
                  </select>
                </div>
                {formErr&&<div style={{color:'var(--red)',fontSize:12}}>{formErr}</div>}
              </div>
              <div className="mf">
                <button type="button" className="btn" onClick={()=>{setShowModal(false);setFormErr('');}}>Cancelar</button>
                <button type="submit" className="btn bp" disabled={saving}>{saving?'A criar…':'Criar e enviar email'}</button>
              </div>
            </form>
          </div>
        </div>
      )}

      {pwTarget&&(
        <div className="ov" onClick={e=>{if(e.target===e.currentTarget) closePwModal();}}>
          <div className="modal" style={{width:440}}>
            <div className="mh">
              <div className="mh-t">Alterar password · {pwTarget.username}</div>
              <button className="btn bg btn-sm" onClick={closePwModal}>✕</button>
            </div>
            <div className="mb">
              <div style={{fontSize:12,color:'var(--muted)',background:'var(--bg)',borderRadius:8,padding:'10px 12px',marginBottom:14,lineHeight:1.5}}>
                Por segurança, esta acção requer verificação. Enviaremos um código de 6 dígitos para o seu email
                (<strong>{currentUser.email}</strong>). Use esse código para confirmar a alteração.
              </div>

              {pwStep==='request'&&(
                <div style={{textAlign:'center'}}>
                  <div style={{fontSize:13,marginBottom:14}}>
                    Pretende alterar a password de <strong>{pwTarget.username}</strong> ({pwTarget.email})?
                  </div>
                  {pwErr&&<div style={{color:'var(--red)',background:'#fdecea',borderRadius:8,padding:'8px 12px',fontSize:13,marginBottom:12}}>{pwErr}</div>}
                  <button className="btn bp" onClick={requestCode} disabled={pwBusy}>
                    {pwBusy?'A enviar…':'Enviar código por email'}
                  </button>
                </div>
              )}

              {pwStep==='verify'&&(
                <div>
                  {pwInfo&&<div style={{color:'#1E7E34',background:'#e6f4ea',borderRadius:8,padding:'8px 12px',fontSize:13,marginBottom:12}}>{pwInfo}</div>}
                  <div className="fg">
                    <label className="fl">Código recebido (6 dígitos)</label>
                    <input className="fi" type="text" inputMode="numeric" maxLength={6}
                      value={pwCode} onChange={e=>{setPwCode(e.target.value.replace(/\D/g,''));setPwErr('');}}
                      placeholder="000000" autoFocus
                      style={{fontFamily:'Consolas, monospace',letterSpacing:'4px',textAlign:'center',fontSize:18}}/>
                  </div>
                  <div className="fg">
                    <label className="fl">Nova password</label>
                    <input className="fi" type="password" value={pwNew} onChange={e=>{setPwNew(e.target.value);setPwErr('');}}
                      autoComplete="new-password" minLength={8} placeholder="Mínimo 8 caracteres"/>
                  </div>
                  <div className="fg">
                    <label className="fl">Confirmar password</label>
                    <input className="fi" type="password" value={pwNew2} onChange={e=>{setPwNew2(e.target.value);setPwErr('');}}
                      autoComplete="new-password" minLength={8}/>
                  </div>
                  {pwErr&&<div style={{color:'var(--red)',background:'#fdecea',borderRadius:8,padding:'8px 12px',fontSize:13,marginTop:8}}>{pwErr}</div>}
                </div>
              )}

              {pwStep==='done'&&(
                <div style={{textAlign:'center',padding:'10px 0'}}>
                  <div style={{fontSize:32,marginBottom:8}}>✔</div>
                  <div style={{color:'#1E7E34',fontWeight:600,fontSize:14}}>{pwInfo}</div>
                  <div style={{fontSize:12,color:'var(--muted)',marginTop:6}}>As sessões activas deste utilizador foram terminadas.</div>
                </div>
              )}
            </div>
            <div className="mf">
              {pwStep==='verify' ? (
                <>
                  <button type="button" className="btn" onClick={closePwModal} disabled={pwBusy}>Cancelar</button>
                  <button type="button" className="btn bp" onClick={verifyAndReset} disabled={pwBusy}>
                    {pwBusy?'A validar…':'Confirmar alteração'}
                  </button>
                </>
              ) : (
                <button type="button" className="btn bp" onClick={closePwModal}>Fechar</button>
              )}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function BackupsScreen({user, onAfterRestore}){
  const [backups,setBackups]=React.useState([]);
  const [loading,setLoading]=React.useState(true);
  const [err,setErr]=React.useState('');
  const [creating,setCreating]=React.useState(false);
  const [restoring,setRestoring]=React.useState(null); // nome do backup em restauro
  const [restoreDone,setRestoreDone]=React.useState(null); // {restoredFrom, preSnapshot}
  const isSuper=!!user?.isSuper;

  async function load(){
    setLoading(true); setErr('');
    try{
      const r=await apiCall('list_backups');
      setBackups(Array.isArray(r)?r:[]);
    }catch(e){ setErr(e.message||'Erro a carregar backups.'); }
    setLoading(false);
  }
  React.useEffect(()=>{load();},[]);

  async function createNow(){
    setCreating(true);
    try{
      await apiCall('create_backup');
      await load();
    }catch(e){ alert('Erro: '+(e.message||'falha ao criar backup.')); }
    setCreating(false);
  }

  async function del(name){
    if(!confirm(`Eliminar backup "${name}"? Esta acção não pode ser desfeita.`)) return;
    try{
      await apiCall('delete_backup',{filename:name});
      await load();
    }catch(e){ alert('Erro: '+(e.message||'falha ao eliminar.')); }
  }

  async function restore(name, isPre){
    const label = dateFromName(name);
    const tipoMsg = isPre
      ? `Reverter para o snapshot pré-restauro de ${label}?\n\nIsto desfaz o restauro anterior. Será criado um novo snapshot do estado actual antes de avançar.`
      : `RESTAURAR a base de dados para o estado de ${label}?\n\n• Os dados actuais serão substituídos.\n• Antes da substituição, é criado um snapshot automático ("pré-restauro") com o estado actual — pode voltar atrás se algo correr mal.\n• Todas as sessões abertas serão recarregadas.\n\nConfirmar restauro?`;
    if(!confirm(tipoMsg)) return;
    setRestoring(name); setErr('');
    try{
      const r = await apiCall('restore_backup', {filename: name});
      setRestoreDone(r);
      await load();
      if(typeof onAfterRestore === 'function'){
        await onAfterRestore();
      }
    }catch(e){
      setErr('Erro no restauro: '+(e.message||'falha desconhecida.'));
    }
    setRestoring(null);
  }

  function fmtSize(b){
    if(b<1024) return b+' B';
    if(b<1024*1024) return (b/1024).toFixed(1)+' KB';
    return (b/(1024*1024)).toFixed(2)+' MB';
  }
  function fmtDate(s){
    try{ return new Date(s).toLocaleString('pt-PT'); }catch(e){ return s; }
  }
  // Extrai a data do nome do ficheiro: rh_backup_2026-05-07_235900.sqlite → 07/05/2026 23:59
  function dateFromName(n){
    const m=/rh_backup_(\d{4})-(\d{2})-(\d{2})_(\d{2})(\d{2})(\d{2})/.exec(n);
    if(!m) return n;
    return `${m[3]}/${m[2]}/${m[1]} ${m[4]}:${m[5]}`;
  }

  const byDay={};
  backups.forEach(b=>{
    const m=/rh_backup_(\d{4}-\d{2}-\d{2})/.exec(b.name);
    const k=m?m[1]:'desconhecido';
    if(!byDay[k]) byDay[k]=[];
    byDay[k].push(b);
  });
  const days=Object.keys(byDay).sort((a,b)=>b.localeCompare(a));
  const today=new Date().toISOString().split('T')[0];

  return (
    <div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:14,marginBottom:18,flexWrap:'wrap'}}>
        <div style={{flex:1,minWidth:260}}>
          <div style={{fontSize:13,color:'var(--muted)',lineHeight:1.55}}>
            Cópias de segurança da base de dados SQLite. Um backup automático é criado <strong>todos os dias</strong> (idealmente às <strong>23:59</strong> via Task Scheduler do Windows; em alternativa na primeira sessão do dia seguinte). Pode também criar um backup manual a qualquer momento.
          </div>
        </div>
        <div style={{display:'flex',gap:8,flexShrink:0}}>
          <button className="btn" onClick={load} disabled={loading}>↻ Actualizar</button>
          <button className="btn bp" onClick={createNow} disabled={creating}>{creating?'A criar…':'+ Criar backup agora'}</button>
        </div>
      </div>

      {restoreDone&&(
        <div style={{background:'#ecfdf5',border:'1px solid #6ee7b7',borderRadius:8,padding:'12px 14px',marginBottom:18,fontSize:12.5,color:'#065f46',lineHeight:1.55}}>
          <strong>✓ Restauro concluído.</strong> A base de dados foi revertida para <code style={{background:'rgba(0,0,0,.08)',padding:'1px 6px',borderRadius:4}}>{restoreDone.restoredFrom}</code>.
          Foi criado um snapshot pré-restauro <code style={{background:'rgba(0,0,0,.08)',padding:'1px 6px',borderRadius:4}}>{restoreDone.preSnapshot}</code> — clique nele aqui para voltar atrás se necessário. A página vai recarregar dentro de momentos.
        </div>
      )}

      <div style={{background:'#fef3c7',border:'1px solid #fcd34d',borderRadius:8,padding:'12px 14px',marginBottom:18,fontSize:12,color:'#92400e',lineHeight:1.5}}>
        <strong>Como funciona o restauro:</strong> ao clicar em <em>Restaurar</em>, é primeiro criado um <strong>snapshot pré-restauro</strong> com o estado actual da BD. Só depois o backup escolhido substitui a BD activa. Se algo correr mal, basta restaurar o snapshot pré-restauro mais recente para voltar ao ponto de partida.<br/>
        <strong>Tarefa diária (Windows):</strong> Task Scheduler → todos os dias às 23:59 com&nbsp;
        <code style={{background:'rgba(0,0,0,.08)',padding:'1px 6px',borderRadius:4,fontFamily:'Consolas,monospace'}}>{'C:\\xampp\\php\\php.exe "C:\\xampp\\htdocs\\Projeto RH Roupeta\\backup_cron.php"'}</code>.
        Backups com mais de 30 dias são removidos automaticamente.
      </div>

      <div className="card" style={{overflow:'hidden'}}>
        {err&&<div style={{padding:'12px 16px',background:'#fef2f2',color:'var(--red)',fontSize:13,borderBottom:'1px solid #fecaca'}}>⚠ {err}</div>}
        {loading?<div style={{padding:32,textAlign:'center',color:'var(--muted)'}}>A carregar...</div>
         :backups.length===0?<div style={{padding:32,textAlign:'center',color:'var(--muted)'}}>Sem backups guardados.<br/><button className="btn bp btn-sm" style={{marginTop:10}} onClick={createNow}>Criar primeiro backup</button></div>
         :<table style={{width:'100%',borderCollapse:'collapse'}}>
           <thead><tr style={{background:'var(--bg)'}}>
             <th style={{padding:'10px 14px',textAlign:'left',fontSize:11,color:'var(--muted)',textTransform:'uppercase',fontWeight:600,letterSpacing:'.4px'}}>Data / Hora</th>
             <th style={{padding:'10px 14px',textAlign:'left',fontSize:11,color:'var(--muted)',textTransform:'uppercase',fontWeight:600,letterSpacing:'.4px'}}>Nota</th>
             <th style={{padding:'10px 14px',textAlign:'right',fontSize:11,color:'var(--muted)',textTransform:'uppercase',fontWeight:600,letterSpacing:'.4px'}}>Tamanho</th>
             <th style={{padding:'10px 14px',textAlign:'right',fontSize:11,color:'var(--muted)',textTransform:'uppercase',fontWeight:600,letterSpacing:'.4px'}}>Acções</th>
           </tr></thead>
           <tbody>
             {days.map(day=>(
               <React.Fragment key={day}>
                 <tr style={{background:day===today?'#fef9e7':'#f9fafb'}}>
                   <td colSpan={4} style={{padding:'8px 14px',fontWeight:700,fontSize:12,color:'var(--muted)'}}>
                     {day===today?'📅 Hoje — ':''}{(()=>{const m=/(\d{4})-(\d{2})-(\d{2})/.exec(day);return m?`${m[3]}/${m[2]}/${m[1]}`:day;})()}
                     <span style={{marginLeft:8,fontWeight:500,color:'#9ca3af'}}>({byDay[day].length} {byDay[day].length===1?'backup':'backups'})</span>
                   </td>
                 </tr>
                 {byDay[day].map(b=>{
                   const isPre = /pre-restauro|pré-restauro/i.test(b.note||'');
                   const isRestoring = restoring === b.name;
                   return (
                   <tr key={b.name} style={{borderTop:'1px solid var(--border)',background:isPre?'#fef9c3':undefined}}>
                     <td style={{padding:'10px 14px',fontWeight:500,fontSize:13}}>
                       {isPre&&<span title="Snapshot criado automaticamente antes de um restauro" style={{display:'inline-block',padding:'1px 7px',marginRight:6,fontSize:10,fontWeight:700,color:'#854d0e',background:'#fef08a',border:'1px solid #facc15',borderRadius:10}}>↺ PRÉ-RESTAURO</span>}
                       {dateFromName(b.name)}
                     </td>
                     <td style={{padding:'10px 14px',fontSize:12,color:'var(--muted)'}}>{b.note||'—'}</td>
                     <td style={{padding:'10px 14px',textAlign:'right',fontSize:12,color:'var(--muted)',fontFamily:'Consolas,monospace'}}>{fmtSize(b.size)}</td>
                     <td style={{padding:'10px 14px',textAlign:'right'}}>
                       <button className="btn btn-sm" style={{marginRight:6,background:isPre?'#854d0e':'#1a5276',color:'white',border:'none',fontWeight:700,opacity:isRestoring?.6:1}}
                         disabled={!!restoring}
                         onClick={()=>restore(b.name, isPre)}>
                         {isRestoring?'A restaurar…':(isPre?'↺ Reverter para este':'Restaurar')}
                       </button>
                       {isSuper&&<button className="btn btn-sm" style={{color:'var(--red)',borderColor:'var(--red)',background:'transparent'}} disabled={!!restoring} onClick={()=>del(b.name)}>Eliminar</button>}
                     </td>
                   </tr>);
                 })}
               </React.Fragment>
             ))}
           </tbody>
         </table>}
      </div>

      {!isSuper&&backups.length>0&&<div style={{marginTop:10,fontSize:11,color:'var(--muted)',textAlign:'right'}}>Apenas super-administradores podem eliminar backups.</div>}
    </div>
  );
}

function ContratosScreen({data,company,onUpdate,readOnly,user,onAudit,onNav}){
  const [selEmp,setSelEmp]=useState(null);
  const [showModal,setShowModal]=useState(false);
  const [editEntry,setEditEntry]=useState(null);
  const [form,setForm]=useState({admissionDate:'',exitDate:'',contractType:'Efetivo',baseSalary:'',exitReason:'',notes:''});
  const [formErr,setFormErr]=useState('');
  const allEmps=data?.employees||[];
  const CM={'roupeta':'Roupeta','roupeta2':'Roupeta II','arlize':'Arlize','pit':'Pit Evolution'};
  const emps=company==='all'?allEmps:allEmps.filter(e=>e.company===CM[company]);

  function getHistory(emp){
    if(emp.contractHistory&&emp.contractHistory.length>0)return emp.contractHistory;
    return[{id:'init_'+emp.id,admissionDate:emp.admissionDate||'',exitDate:null,contractType:emp.contractEndDate||'Efetivo',baseSalary:emp.baseSalary||'',exitReason:'',notes:''}];
  }

  async function saveHistory(emp,history){
    const updated=allEmps.map(e=>e.id===emp.id&&e.company===emp.company?{...e,contractHistory:history}:e);
    await onUpdate({...data,employees:updated});
    onAudit&&onAudit(`Actualizou histórico contratual de ${emp.name}`,'contratos');
  }

  async function handleSave(e){
    e.preventDefault();
    if(!form.admissionDate){setFormErr('A data de admissão é obrigatória.');return;}
    const emp=allEmps.find(x=>x.id===selEmp.id&&x.company===selEmp.company);
    if(!emp)return;
    const history=getHistory(emp);
    const entry={...form,exitDate:form.exitDate||null,id:editEntry?.id||Date.now().toString()};
    const updated=editEntry?history.map(h=>h.id===editEntry.id?entry:h):[...history,entry];
    updated.sort((a,b)=>(a.admissionDate||'').localeCompare(b.admissionDate||''));
    await saveHistory(emp,updated);
    setShowModal(false);setEditEntry(null);
    setForm({admissionDate:'',exitDate:'',contractType:'Efetivo',baseSalary:'',exitReason:'',notes:''});
    setFormErr('');
  }

  async function handleDelete(entryId){
    if(!confirm('Eliminar este registo do histórico?'))return;
    const emp=allEmps.find(x=>x.id===selEmp.id&&x.company===selEmp.company);
    await saveHistory(emp,getHistory(emp).filter(h=>h.id!==entryId));
  }

  function openAdd(){
    setEditEntry(null);
    setForm({admissionDate:'',exitDate:'',contractType:'Efetivo',baseSalary:'',exitReason:'',notes:''});
    setFormErr('');setShowModal(true);
  }
  function openEdit(h){setEditEntry(h);setForm({...h,exitDate:h.exitDate||''});setFormErr('');setShowModal(true);}

  const fullEmp=selEmp?allEmps.find(e=>e.id===selEmp.id&&e.company===selEmp.company):null;
  const history=fullEmp?getHistory(fullEmp):[];
  const currentPeriod=history.find(h=>!h.exitDate);
  const totalDays=history.reduce((s,h)=>{
    const a=new Date(h.admissionDate),b=h.exitDate?new Date(h.exitDate):new Date();
    return isNaN(a)?s:s+Math.max(0,(b-a)/86400000);
  },0);

  function durStr(h){
    const a=new Date(h.admissionDate),b=h.exitDate?new Date(h.exitDate):new Date();
    if(isNaN(a))return'—';
    const days=Math.round((b-a)/86400000);
    if(days<30)return days+'d';
    const yrs=Math.floor(days/365),mos=Math.floor((days%365)/30);
    return(yrs?yrs+'a ':'')+mos+'m';
  }

  const sorted=[...emps].sort((a,b)=>(a.name||'').localeCompare(b.name||''));

  return(
    <div>
      {!selEmp?(
        <div className="card cb" style={{padding:0,overflow:'hidden'}}>
          <div style={{padding:'12px 16px',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'center',gap:10}}>
            <div className="sec-t" style={{margin:0}}>Contratos</div>
            <span style={{fontSize:12,color:'var(--muted)',marginLeft:'auto'}}>{sorted.length} colaborador{sorted.length!==1?'es':''}</span>
          </div>
          <div className="tw">
            <table>
              <thead><tr><th>N.º</th><th>Colaborador</th><th>Empresa</th><th>Admissão</th><th>Tipo</th><th>Estado</th></tr></thead>
              <tbody>
                {sorted.map(emp=>(
                  <tr key={emp.id+emp.company} style={{cursor:'pointer'}}
                    onClick={()=>setSelEmp({id:emp.id,company:emp.company})}
                    onMouseEnter={e=>e.currentTarget.style.background='var(--bg)'}
                    onMouseLeave={e=>e.currentTarget.style.background=''}>
                    <td style={{color:'var(--muted)',fontWeight:500}}>{emp.id}</td>
                    <td style={{fontWeight:600}}>{emp.name}</td>
                    <td><Chip label={emp.company} type="gr"/></td>
                    <td>{fmtDate(emp.admissionDate)}</td>
                    <td style={{color:'var(--muted)'}}>{emp.contractEndDate||'—'}</td>
                    <td><Chip label={emp.contractStatus} type={emp.contractStatus==='Ativo'?'green':emp.contractStatus==='Inativo'?'red':'orange'}/></td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      ):!fullEmp?(
        <div style={{padding:40,textAlign:'center',color:'var(--muted)'}}>
          <button className="btn" onClick={()=>setSelEmp(null)}>← Voltar</button>
        </div>
      ):(
        <div>
          {/* Cabeçalho */}
          <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:16,flexWrap:'wrap'}}>
            <button className="btn" style={{padding:'5px 14px'}} onClick={()=>setSelEmp(null)}>← Contratos</button>
            <div style={{flex:1}}>
              <div style={{fontWeight:700,fontSize:16}}>{fullEmp.name}</div>
              <div style={{fontSize:12,color:'var(--muted)'}}>{fullEmp.role||'—'} · {fullEmp.company}</div>
            </div>
            <Chip label={fullEmp.contractStatus} type={fullEmp.contractStatus==='Ativo'?'green':fullEmp.contractStatus==='Inativo'?'red':'orange'}/>
            <button className="btn bp btn-sm" onClick={()=>onNav('ferias',{id:fullEmp.id,company:fullEmp.company})}>🏖 Ver Férias</button>
          </div>

          {/* Estatísticas */}
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(120px,1fr))',gap:10,marginBottom:16}}>
            {[
              {l:'Períodos',v:history.length,c:'var(--blue)'},
              {l:'Tempo total',v:totalDays>365?Math.floor(totalDays/365)+'a '+Math.floor((totalDays%365)/30)+'m':Math.round(totalDays)+'d',c:'var(--green)'},
              {l:'Ordenado Atual',v:(currentPeriod?.baseSalary||fullEmp.baseSalary)?parseFloat(currentPeriod?.baseSalary||fullEmp.baseSalary).toFixed(2)+'€':'—',c:'var(--orange)'},
              {l:'Tipo',v:currentPeriod?.contractType||fullEmp.contractEndDate||'—',c:'var(--muted)'},
            ].map(s=>(
              <div key={s.l} style={{background:'var(--card)',border:'1px solid var(--border)',borderRadius:10,padding:14}}>
                <div style={{fontSize:10,color:'var(--muted)',fontWeight:700,textTransform:'uppercase',letterSpacing:.5,marginBottom:4}}>{s.l}</div>
                <div style={{fontSize:20,fontWeight:800,color:s.c}}>{s.v}</div>
              </div>
            ))}
          </div>

          {/* Histórico contratual */}
          <div style={{marginBottom:16}}>
            <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:10}}>
              <div style={{fontWeight:600,fontSize:14}}>Histórico Contratual</div>
              {!readOnly&&<button className="btn bp btn-sm" style={{marginLeft:'auto'}} onClick={openAdd}>+ Período</button>}
            </div>
            <div className="card" style={{padding:0,overflow:'hidden'}}>
              {[...history].sort((a,b)=>(b.admissionDate||'').localeCompare(a.admissionDate||'')).map((h,i,arr)=>{
                const isAtual=!h.exitDate;
                return(
                  <div key={h.id} style={{padding:'14px 16px',borderBottom:i<arr.length-1?'1px solid var(--border)':'none',display:'flex',alignItems:'flex-start',gap:14}}>
                    {/* Ponto da timeline */}
                    <div style={{marginTop:4,width:10,height:10,borderRadius:'50%',flexShrink:0,background:isAtual?'var(--green)':'var(--muted)'}}/>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap',marginBottom:6}}>
                        <span style={{fontWeight:700,fontSize:13}}>
                          {fmtDate(h.admissionDate)||'?'} → {isAtual?<span style={{color:'var(--green)'}}>Presente</span>:fmtDate(h.exitDate)||'?'}
                        </span>
                        {isAtual&&<span style={{fontSize:10,fontWeight:700,background:'var(--green-l)',color:'var(--green)',padding:'2px 8px',borderRadius:10}}>ATUAL</span>}
                        <span style={{fontSize:11,color:'var(--muted)'}}>{durStr(h)}</span>
                      </div>
                      <div style={{display:'flex',gap:14,flexWrap:'wrap',fontSize:12,color:'var(--muted)'}}>
                        <span>📄 {h.contractType||'—'}</span>
                        {(h.baseSalary)?<span>💶 {parseFloat(h.baseSalary).toFixed(2)} €</span>:null}
                        {h.exitReason?<span>Motivo: {h.exitReason}</span>:null}
                        {h.notes?<span style={{fontStyle:'italic'}}>{h.notes}</span>:null}
                      </div>
                    </div>
                    {!readOnly&&(
                      <div style={{display:'flex',gap:6,flexShrink:0}}>
                        <button className="btn btn-sm" onClick={()=>openEdit(h)}>Editar</button>
                        {arr.length>1&&<button className="btn btn-sm" style={{color:'var(--red)'}} onClick={()=>handleDelete(h.id)}>Elim.</button>}
                      </div>
                    )}
                  </div>
                );
              })}
              {history.length===0&&<div style={{padding:24,textAlign:'center',color:'var(--muted)',fontSize:13}}>Sem histórico. Adicione um período.</div>}
            </div>
          </div>

          {/* Documentos */}
          <div>
            <div style={{fontWeight:600,fontSize:14,marginBottom:10}}>Documentos</div>
            <DocsTab empId={fullEmp.id} empCompany={fullEmp.company} empName={fullEmp.name} readOnly={readOnly} user={user} onAudit={onAudit}/>
          </div>
        </div>
      )}

      {/* Modal de período */}
      {showModal&&(
        <div className="ov" onClick={e=>{if(e.target===e.currentTarget){setShowModal(false);setEditEntry(null);}}}>
          <div className="modal" style={{width:420}}>
            <div className="mh">
              <div className="mh-t">{editEntry?'Editar Período':'Novo Período'} — {fullEmp?.name}</div>
              <button className="btn bg" onClick={()=>{setShowModal(false);setEditEntry(null);}}>✕</button>
            </div>
            <form onSubmit={handleSave}>
              <div className="mb">
                <div className="fg">
                  <div className="field">
                    <div className="fl">Data de Admissão *</div>
                    <input className="fi" type="date" value={form.admissionDate} onChange={e=>setForm(x=>({...x,admissionDate:e.target.value}))} required/>
                  </div>
                  <div className="field">
                    <div className="fl">Data de Saída (vazio = contrato atual)</div>
                    <input className="fi" type="date" value={form.exitDate||''} onChange={e=>setForm(x=>({...x,exitDate:e.target.value||null}))}/>
                  </div>
                  <div className="field">
                    <div className="fl">Tipo de Contrato</div>
                    <select className="fi" value={form.contractType} onChange={e=>setForm(x=>({...x,contractType:e.target.value}))}>
                      <option>Efetivo</option><option>Termo Certo</option><option>Indeterminado</option>
                    </select>
                  </div>
                  <div className="field">
                    <div className="fl">Ordenado Base (€)</div>
                    <input className="fi" type="number" step="0.01" min="0" value={form.baseSalary} onChange={e=>setForm(x=>({...x,baseSalary:e.target.value}))} placeholder="ex: 958.00"/>
                  </div>
                  {form.exitDate&&(
                    <div className="field" style={{gridColumn:'1/-1'}}>
                      <div className="fl">Motivo de Saída</div>
                      <select className="fi" value={form.exitReason||''} onChange={e=>setForm(x=>({...x,exitReason:e.target.value}))}>
                        <option value="">Selecione...</option>
                        <option>Rescisão</option><option>Despedimento</option><option>Reforma</option>
                        <option>Fim de Contrato</option><option>Mútuo Acordo</option><option>Abandono</option><option>Outro</option>
                      </select>
                    </div>
                  )}
                  <div className="field" style={{gridColumn:'1/-1'}}>
                    <div className="fl">Notas</div>
                    <textarea className="fi" rows={2} style={{resize:'vertical'}} value={form.notes||''} onChange={e=>setForm(x=>({...x,notes:e.target.value}))} placeholder="Observações opcionais..."/>
                  </div>
                </div>
                {formErr&&<div style={{color:'var(--red)',fontSize:12,marginTop:8}}>{formErr}</div>}
              </div>
              <div className="mf">
                <button type="button" className="btn" onClick={()=>{setShowModal(false);setEditEntry(null);}}>Cancelar</button>
                <button type="submit" className="btn bp">Guardar</button>
              </div>
            </form>
          </div>
        </div>
      )}
    </div>
  );
}
function useMobile(){
  const [mob,setMob]=useState(()=>window.innerWidth<=768);
  useEffect(()=>{
    const mq=window.matchMedia('(max-width: 768px)');
    const h=e=>setMob(e.matches);
    mq.addEventListener('change',h);
    return ()=>mq.removeEventListener('change',h);
  },[]);
  return mob;
}

function RelatoriosScreen({data, company, evals, user}) {
  if (!user || user.role !== 'ADMIN') {
    return (
      <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:320,gap:10,color:'var(--muted)'}}>
        <div style={{width:56,height:56,borderRadius:'50%',background:'#f5f5f5',display:'flex',alignItems:'center',justifyContent:'center',fontSize:26,color:'#bbb'}}>&#x1F512;</div>
        <div style={{fontWeight:700,fontSize:16,color:'var(--fg)'}}>Acesso Restrito</div>
        <div style={{fontSize:13}}>Este módulo é exclusivo para administradores.</div>
      </div>
    );

    const suffix=(d!==null&&d!==undefined&&d>=0)?' ('+d+'d)':'';
    return '<span class="badge '+(cls[k]||'')+'">'+( lbl[k]||k)+suffix+'</span>';

          {h:'Admiss&atilde;o',fn:r=>fmtDate(r.admissionDate)||'—'},

      if(withSef.length){

          n:n++, icon:'\u{1F6C2}', title:'SEF / Autorizações de Residência',

            {h:'Empresa',fn:r=>r.company||'—'},
            {h:'Nacionalidade',fn:r=>r.nationality||'—'},

            {h:'Empresa',fn:r=>r.company||'—'},
            {h:'Carta',fn:r=>r.driverLicense||'—'},
            {h:'Val. Carta',fn:r=>fmtDate(r.driverLicenseExpiry)||'—'},

      if(cTraining.length){

          n:n++, icon:'\u{1F393}', title:'Formação Contínua',

          body:pdfTable([
            {h:'Colaborador',fn:r=>r.empName||'—'},
            {h:'Empresa',fn:r=>r.empCompany||'—'},

      const epiRows=[];
      emps.forEach(e=>{

          if(hist.length){
            const last=hist[0];
            const days=daysTo(last.date);
            const estado=(days!==null&&days<-365)?'H&aacute; mais de 1 ano':'Em dia';
            epiRows.push({empName:e.name,empCompany:e.company,item:item.label,lastDate:fmtDate(last.date),count:hist.length,estado});

        });
      });
      if(epiRows.length){
        epiRows.sort((a,b)=>(a.empName||'').localeCompare(b.empName||'')||(a.item||'').localeCompare(b.item||''));
        sections.push({
          n:n++, icon:'\u{1F9BA}', title:'EPIs &mdash; Equipamentos de Proteção Individual',
          desc:'Hist&oacute;rico de entregas registadas (capacete, colete, botas, luvas, &oacute;culos, prote&ccedil;&atilde;o auricular, fato).',
          count:epiRows.length,
          body:pdfTable([
            {h:'Colaborador',fn:r=>r.empName||'—'},
            {h:'Empresa',fn:r=>r.empCompany||'—'},
            {h:'EPI',fn:r=>r.item||'—'},
            {h:'&Uacute;ltima Entrega',fn:r=>r.lastDate||'—'},
            {h:'N.&ordm; Entregas',fn:r=>r.count},

      const ferYear    = fer.filter(f=>Number(f.year)===cy);
      const ferCfgYear = ferCfg.filter(c=>Number(c.year)===cy);
      if(ferYear.length||ferCfgYear.length){
        const ferRows = emps.map(e=>{
          const periods = ferYear.filter(p=>p.empId===e.id&&p.empCompany===e.company);
          const cfg = ferCfgYear.find(c=>c.empId===e.id&&c.empCompany===e.company)||{estado:'Por Fechar'};
          const used = periods.reduce((s,p)=>s+(p.days||0),0);
          return {
            name:e.name, company:e.company,
            used, disponivel: 22-used, estado: cfg.estado,
            periodos: periods.length
              ? periods.map(p=>`${fmtDate(p.startDate)||p.startDate} → ${fmtDate(p.endDate)||p.endDate} (${p.days}d)`).join(' | ')

          };

        sections.push({
          n:n++, icon:'\u{1F3D6}️', title:`Férias — ${cy}`,

            {h:'Empresa',fn:r=>r.company||'—'},
            {h:'Gozados',fn:r=>r.used},
            {h:'Dispon&iacute;veis',fn:r=>r.disponivel},
            {h:'Estado',fn:r=>r.estado},
            {h:'Per&iacute;odos Marcados',fn:r=>r.periodos},

      }

      const evalsLocal = company==='all' ? (evals||[]) : (evals||[]).filter(ev=>ev.empCompany===company);
      if(evalsLocal.length){
        sections.push({
          n:n++, icon:'⭐', title:'Avaliações de Desempenho',
          desc:'Registos de avalia&ccedil;&otilde;es com tipo, notas e pr&oacute;ximas a&ccedil;&otilde;es definidas pelo respons&aacute;vel.',
          count:evalsLocal.length,
          body:pdfTable([
            {h:'Colaborador',fn:r=>{const e=allActive.find(x=>x.id===r.empId&&x.company===r.empCompany)||allInactive.find(x=>x.id===r.empId&&x.company===r.empCompany); return e?e.name:(r.empName||r.empId||'—');}},
            {h:'Empresa',fn:r=>r.empCompany||'—'},
            {h:'Tipo',fn:r=>r.type||'—'},
            {h:'Data',fn:r=>fmtDate(r.date)||'—'},
            {h:'Notas',fn:r=>(r.notes||'').replace(/[<>]/g,'').slice(0,120)},
            {h:'Pr&oacute;xima A&ccedil;&atilde;o',fn:r=>r.nextAction?(r.nextAction+(r.nextDate?` (${fmtDate(r.nextDate)})`:'')):'—'},
            {h:'Por',fn:r=>r.by||'—'},
          ],evalsLocal,null)

      }

      const summaryHtml = sections.map(s=>`
        <tr>
          <td style="padding:5px 8px;font-weight:700;width:32px;color:${_accent}">${s.n}</td>
          <td style="padding:5px 8px">${s.icon||''} ${s.title}</td>
          <td style="padding:5px 8px;text-align:right;font-weight:700">${s.count}</td>
        </tr>`).join('');

      const sectionsBody = sections.map(s=>`
        <div class="section sec-sep">
          <div class="section-title">${s.icon||''} ${s.n}. ${s.title} <span style="float:right;font-size:11px;color:#888;font-weight:600">${s.count} registo${s.count===1?'':'s'}</span></div>
          <div class="section-note">${s.desc}</div>
          ${s.body}
        </div>`).join('');

      const html = pdfWrap('Backup Completo da Base de Dados',
        `Snapshot integral RH — ${todayFmt}`,
        `<div class="section">
           <div class="section-title">Sum&aacute;rio do Backup</div>
           <div class="section-note">${sections.length} sec&ccedil;&otilde;es inclu&iacute;das. Cada sec&ccedil;&atilde;o corresponde a um m&oacute;dulo do RH Manager.</div>
           <table>
             <thead><tr><th style="width:32px">#</th><th>M&oacute;dulo</th><th style="text-align:right;width:90px">Registos</th></tr></thead>
             <tbody>${summaryHtml}</tbody>
           </table>
         </div>
         ${sectionsBody}`);

      openPdf(html,'Backup Completo da Base de Dados');

      setGeneratingBackup(false);
    }
  }

  if (printOverlay!==null){

              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.3" strokeLinecap="round" strokeLinejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
              Partilhar

            <button onClick={()=>{setPrintOverlay(null);setShowShareRel(false);}}

              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
              Fechar
            </button>
          </div>
        </div>
        <div className="rh-printbody" style={{maxWidth:960,margin:'0 auto',padding:'24px 28px'}}>
          <style dangerouslySetInnerHTML={{__html:printCSS()}}/>
          <div dangerouslySetInnerHTML={{__html:printOverlay}}/>
        </div>
      </div>
    );
  }

  function UrgBadge({d}){
    const k=urgLabel(d);
    const cls={'vencido':'urgency-badge--expired','critico':'urgency-badge--urgent','atencao':'urgency-badge--attention','ok':'urgency-badge--ok','sem-data':'urgency-badge--no-date'};
    const label={vencido:'Vencido',critico:'Urgente',atencao:'Atenção',ok:'OK','sem-data':'Sem data'};
    return <span className={`urgency-badge ${cls[k]||''}`}>{label[k]}{d!==null&&d!==undefined&&d>=0?' ('+d+'d)':''}</span>;
  }

  function UrgBar({value,onChange,counts}){
    const opts=[
      {k:'all',    label:'Todos',   cnt:counts.vencido+counts.critico+counts.atencao+counts.ok},
      {k:'vencido',label:'Vermelho',cnt:counts.vencido},
      {k:'critico',label:'Laranja', cnt:counts.critico},
      {k:'atencao',label:'Amarelo', cnt:counts.atencao},
      {k:'ok',     label:'Verde',   cnt:counts.ok},
    ];
    return(
      <div className="urgency-filter-bar">
        {opts.map(o=>(
          <button key={o.k} onClick={()=>onChange(o.k)} data-type={o.k}
            className={`urgency-filter-btn ${value===o.k?'active active--'+o.k:''}`}>
            {o.label}
            <span className="urgency-counter">{o.cnt}</span>
          </button>
        ))}
      </div>
    );
  }

  function MiniTable({rows,cols,urgKey,emptyMsg}){
    if(!rows.length) return <div style={{color:'var(--muted)',fontSize:13,padding:'10px 0'}}>{emptyMsg||'Sem registos.'}</div>;
    return(
      <div style={{overflowX:'auto'}}>
        <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
          <thead>
            <tr>{cols.map(c=><th key={c.key} style={{textAlign:'left',padding:'5px 8px',borderBottom:'2px solid var(--bdr)',color:'var(--muted)',fontWeight:700,fontSize:11,textTransform:'uppercase',letterSpacing:'.5px'}}>{c.label}</th>)}</tr>
          </thead>
          <tbody>
            {rows.map((r,i)=>(
              <tr key={i} style={{borderLeft:'3px solid '+urgBorderColor(r[urgKey]),background:i%2===0?'transparent':'rgba(0,0,0,.02)'}}>
                {cols.map(c=><td key={c.key} style={{padding:'6px 8px',borderBottom:'1px solid var(--bdr)',verticalAlign:'middle'}}>
                  {c.key===urgKey
                    ? <UrgBadge d={r[c.key]}/>
                    : (['_nd','_nm','admissionDate','lastMedicalConsult','sefExpiry','birthDate'].includes(c.key)
                        ? fmtDate(r[c.key])
                        : (r[c.key]!=null?r[c.key]:'—'))
                  }
                </td>)}
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    );
  }

  function SecCard({title,description,icon,children}){
    return(
      <div className="card" style={{marginBottom:16}}>
        <div style={{display:'flex',alignItems:'center',gap:8,fontWeight:800,fontSize:14,color:'var(--fg)',marginBottom:description?4:12,paddingBottom:description?0:8,borderBottom:description?'none':'1px solid var(--bdr)'}}>
          {icon&&<span style={{fontSize:18}}>{icon}</span>}
          {title}
        </div>
        {description&&<div style={{fontSize:11.5,color:'var(--muted)',marginBottom:12,paddingBottom:10,borderBottom:'1px solid var(--bdr)',lineHeight:1.55}}>{description}</div>}
        {children}
      </div>
    );
  }

  function PdfBtn({label,onClick,color}){
    const [hov,setHov]=React.useState(false);
    const c=color||_accent;
    return(
      <button onClick={onClick} onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}
        style={{display:'flex',alignItems:'center',gap:7,padding:'8px 16px',borderRadius:7,
          border:'1.5px solid '+c,background:hov?c:'transparent',
          color:hov?'white':c,fontWeight:700,fontSize:12,cursor:'pointer',
          transition:'all .15s',whiteSpace:'nowrap'}}>
        {label}
      </button>
    );
  }

  function FilterNote({filter}){
    if(filter==='all') return null;
    const m=urgMeta[filter];
    return <div style={{fontSize:11,marginBottom:8,display:'flex',alignItems:'center',gap:6,color:'var(--muted)'}}>
      <span style={{background:m?.bg,color:m?.color,borderRadius:8,padding:'2px 9px',fontWeight:700,fontSize:11}}>{m?.label}</span>
      O PDF irá incluir apenas estes registos
    </div>;
  }

  return(
    <div style={{padding:'0 0 32px'}}>

      <div className="card" style={{marginBottom:16,padding:'14px 18px',borderLeft:`4px solid ${_accent}`}}>
        <div style={{fontWeight:800,fontSize:15,color:'var(--fg)',marginBottom:6}}>Centro de Relatórios</div>
        <div style={{fontSize:12,color:'var(--muted)',lineHeight:1.6}}>
          Visualize, filtre e exporte os dados RH organizados por módulo. Use o seletor de <strong>Empresa</strong> no topo da aplicação para restringir os dados a uma empresa específica.
          Cada secção tem uma <strong>tabela interactiva</strong> com filtros de urgência (vermelho = vencido, laranja = ≤60d, amarelo = ≤120d, verde = OK) e botões para gerar <strong>PDFs prontos a partilhar</strong>. No final encontra a opção de fazer um <strong>Backup Completo</strong> da base de dados em PDF (legível) ou JSON (técnico).
        </div>
      </div>

      {/* KPIs */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(130px,1fr))',gap:10,marginBottom:18}}>
        {[
          {label:'Colaboradores Ativos',    val:emps.length,                  color:'var(--blue)'},
          {label:'Inativos',                val:inEmps.length,                color:'var(--muted)'},
          {label:'Diut. Urgentes/Vencidas', val:dCnts.vencido+dCnts.critico, color:'#e67e22'},
          {label:'Med. Expiradas/Urgentes', val:mCnts.vencido+mCnts.critico, color:'#c0392b'},
          {label:'SEF Urgente/Vencido',     val:sCnts.vencido+sCnts.critico, color:'#8e44ad'},
        ].map(kpi=>(
          <div key={kpi.label} className="card" style={{padding:'6px 10px',textAlign:'center'}}>
            <div style={{fontSize:18,fontWeight:800,color:kpi.color,lineHeight:1.1}}>{kpi.val}</div>
            <div style={{fontSize:11,color:'var(--muted)',lineHeight:1.3}}>{kpi.label}</div>
          </div>
        ))}
      </div>

      {/* Colaboradores */}
      <SecCard title="Colaboradores" icon="👥"
        description="Lista detalhada dos colaboradores da empresa seleccionada. Permite gerar três tipos de PDF: Dados Gerais (nome, função, contrato), Dados Financeiros (NIF, NISS, IBAN, ordenado — confidencial) e listagem combinada de Ativos + Inativos. Pode ainda escolher manualmente um subconjunto de colaboradores.">
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(170px,1fr))',gap:8,marginBottom:14}}>
          {['Roupeta','Roupeta II','Arlize','Pit Evolution'].map(c=>{
            const n=allActive.filter(e=>e.company===c).length, tot=allActive.length||1;
            return(
              <div key={c} style={{display:'flex',alignItems:'center',gap:8}}>
                <span style={{width:90,fontSize:12,fontWeight:600,color:'var(--fg)'}}>{c}</span>
                <div style={{flex:1,background:'var(--bg)',borderRadius:4,height:10}}>
                  <div style={{width:`${(n/tot)*100}%`,background:COMP_COLORS[c],height:'100%',borderRadius:4}}/>
                </div>
                <span style={{fontWeight:700,fontSize:13,minWidth:22,textAlign:'right'}}>{n}</span>
              </div>
            );
          })}
        </div>

        <div style={{borderTop:'1px solid var(--bdr)',paddingTop:12,marginBottom:10}}>
          <div style={{fontSize:11,fontWeight:700,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'.4px',marginBottom:8}}>Seleção para exportação</div>
          <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:10}}>
            {[['all','Todos Ativos'],['choose','Selecionar Colaboradores'],['inactive','Inativos']].map(([k,l])=>(
              <button key={k} onClick={()=>{setColabMode(k);setSelectedIds(new Set());}}
                style={{padding:'6px 14px',borderRadius:20,border:'2px solid '+(colabMode===k?'var(--blue)':'transparent'),
                  background:colabMode===k?'var(--blbg)':'var(--bg)',color:colabMode===k?'var(--blue)':'var(--muted)',
                  fontWeight:700,fontSize:12,cursor:'pointer',transition:'all .15s'}}>
                {l}{k==='choose'&&selectedIds.size>0?' ('+selectedIds.size+')':''}
              </button>
            ))}
          </div>

          {colabMode==='all'&&(
            <label style={{display:'flex',alignItems:'center',gap:8,fontSize:12,cursor:'pointer',marginBottom:8,color:'var(--muted)'}}>
              <input type="checkbox" checked={includeInactive} onChange={e=>setIncludeInactive(e.target.checked)} style={{width:14,height:14,cursor:'pointer'}}/>

          {colabMode==='choose'&&(
            <div style={{border:'1px solid var(--bdr)',borderRadius:8,overflow:'hidden',marginBottom:8}}>
              <div style={{padding:'8px 10px',borderBottom:'1px solid var(--bdr)',display:'flex',gap:8,alignItems:'center',background:'var(--bg)'}}>
                <input value={colabSearch} onChange={e=>setColabSearch(e.target.value)}
                  placeholder="Pesquisar por nome, empresa ou n.º..."
                  className="fi" style={{flex:1,padding:'5px 10px',fontSize:12}}/>
                <button className="btn bs btn-sm" onClick={selectAll}>Todos</button>
                <button className="btn bg btn-sm" onClick={clearAll}>Limpar</button>
              </div>
              <div style={{maxHeight:220,overflowY:'auto'}}>
